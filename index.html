<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pro Modder Tool - Final Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .card-antiban { border-left: 5px solid #f87171; background: linear-gradient(to right, #450a0a, #0f172a); }
        .card-shop { border-left: 5px solid #fbbf24; background: linear-gradient(to right, #422006, #0f172a); }
        .card-hack { border-left: 5px solid #10b981; }
        .hex-box { font-family: 'Courier New', monospace; background: #000; color: #fbbf24; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase italic tracking-tighter">Pro Modder Engine <span class="text-rose-500">v3.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-2 uppercase tracking-[0.3em]">Anti-Ban | Free Shop | No Ads | Unlocked | Float Logic</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-16 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-emerald-500 transition-all cursor-pointer mb-12 shadow-2xl">
            <p class="text-xl text-slate-400">Kéo & Thả file <span class="text-emerald-500 font-bold underline">dump.cs</span> vào đây</p>
            <p class="text-[10px] text-slate-600 mt-4 uppercase font-bold tracking-widest text-center">Tự động chốt hàm chuẩn 100% - Loại bỏ rác hệ thống</p>
        </div>

        <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('results');

        // DANH SÁCH NHÓM TÍNH NĂNG "VUA"
        const categories = [
            { id: 'antiban', label: '🛡️ ANTI-BAN', keys: ['anticheat', 'integrity', 'detecthack', 'isbanned', 'jailbreak'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Vô hiệu hóa bảo mật.' },
            { id: 'shop', label: '🛒 FREE SHOP', keys: ['get_price', 'get_cost', 'isafford', 'enoughmoney'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Mua đồ giá 0đ.' },
            { id: 'ads', label: '🚫 NO ADS', keys: ['showads', 'hasads', 'isads', 'advertisement'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Tắt toàn bộ quảng cáo.' },
            { id: 'money', label: '💰 VÔ HẠN TIỀN', keys: ['gold', 'money', 'coin', 'diamond', 'gem'], hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Tiền cực đại (999,999).' },
            { id: 'health', label: '❤️ BẤT TỬ', keys: ['hp', 'health', 'maxhealth'], hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Khóa máu đầy 100%.' },
            { id: 'speed', label: '⚡ SIÊU TỐC (FLOAT)', keys: ['speed', 'velocity', 'movespeed', 'cooldown'], hex: '00 00 A0 41 C0 03 5F D6', desc: 'Giá trị số thực (20.0f).' },
            { id: 'vip', label: '🌟 VIP/UNLOCKED', keys: ['isvip', 'ispremium', 'isunlocked'], hex: '20 00 80 D2 C0 03 5F D6', desc: 'Mở khóa tính năng VIP.' }
        ];

        // DANH SÁCH ĐEN (BLACK BOX) - Loại bỏ rác 100%
        const junk = ['pattern', 'decimal', 'separator', 'symbol', 'culture', 'format', 'digits', 'group', 'negative', 'positive', 'string', 'array'];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+(get_\w+|check\w+|is\w+|show\w+)\(\)/gi;
                let match;
                let winners = {};

                while ((match = regex.exec(content)) !== null) {
                    const rva = match[1];
                    const name = match[2];
                    const nameLower = name.toLowerCase();

                    // 1. Kiểm tra rác hệ thống và độ dài tên (Hàm chuẩn thường ngắn)
                    if (junk.some(j => nameLower.includes(j)) || name.length > 30) continue;

                    // 2. Phân loại và chọn hàm Vua (Shortest name logic)
                    categories.forEach(cat => {
                        if (cat.keys.some(k => nameLower.includes(k))) {
                            if (!winners[cat.id] || name.length < winners[cat.id].name.length) {
                                winners[cat.id] = { rva, name, ...cat };
                            }
                        }
                    });
                }
                render(Object.values(winners));
            };
            reader.readAsText(file);
        }

        function render(data) {
            resultsArea.classList.remove('hidden');
            resultsArea.innerHTML = data.map(item => `
                <div class="card ${item.id === 'antiban' ? 'card-antiban' : (item.id === 'shop' ? 'card-shop' : 'card-hack')} rounded-2xl p-6 shadow-2xl flex flex-col justify-between">
                    <div>
                        <span class="text-[10px] font-black text-white bg-black/40 px-3 py-1 rounded-full uppercase tracking-widest border border-white/5">${item.label}</span>
                        <h3 class="text-xl font-bold text-white mt-4 break-all italic">${item.name}</h3>
                        <p class="text-slate-500 text-[11px] mt-1 font-bold italic">→ ${item.desc}</p>
                        <p class="text-rose-500 font-mono text-sm mt-4 font-black uppercase tracking-tighter">RVA: ${item.rva}</p>
                    </div>
                    <div class="mt-6 border-t border-white/5 pt-4">
                        <p class="text-[9px] text-gray-600 font-bold mb-2 uppercase tracking-widest">Hex Patch (ARM64)</p>
                        <div class="hex-box p-3 rounded-lg text-xs font-bold mb-4 text-center tracking-widest shadow-inner">${item.hex}</div>
                        <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Đã Copy Hex!')" class="w-full bg-slate-800 hover:bg-white hover:text-black text-white font-bold py-2 rounded-xl transition-all shadow-lg text-[10px] uppercase tracking-widest">Sao chép mã</button>
                    </div>
                </div>
            `).join('');
            if(data.length === 0) alert("Không tìm thấy hàm chuẩn nào! Game có thể đã được mã hóa.");
        }
    </script>
</body>
</html>
