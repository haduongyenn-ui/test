<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v10.1 - Ultimate Full Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.5); }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1rem; transition: 0.2s; }
        .card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .rva-box { font-family: monospace; background: #000; color: #f43f5e; border: 1px solid #1e293b; }
        .hex-display { font-family: monospace; color: #6366f1; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-4 font-sans">

    <div class="max-w-[1600px] mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-white uppercase italic">Ultimate Scanner <span class="text-indigo-500">v10.1</span></h1>
            <p class="text-slate-500 font-bold text-[10px] mt-1 uppercase tracking-[0.5em]">Tối Đa Mục Tiêu • Càn Quét RVA • Full Logic</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-2xl p-8 text-center bg-slate-900/20 hover:border-indigo-500 transition-all cursor-pointer mb-8">
            <p class="text-slate-400 font-bold uppercase tracking-widest">Thả file <span class="text-indigo-500">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="grid grid-cols-1 gap-6"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const scannerGroups = [
            { id: 'int', label: '💎 INT32 (HP, MP, GOLD, LEVEL)', type: 'Int32', color: 'text-emerald-400', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'single', label: '⚡ SINGLE/FLOAT (DAME, SPEED, CD)', type: 'Single', color: 'text-sky-400', hex: "00 00 C8 42 C0 03 5F D6" },
            { id: 'bool', label: '🛡️ BOOL (VIP, UNLOCK, ANTIBAN)', type: 'bool', color: 'text-purple-400', hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'void', label: '🚫 VOID (TAKEDAMAGE, SPEND, ANTI)', type: 'Void', color: 'text-rose-400', hex: "C0 03 5F D6" },
            { id: 'enum', label: '🧩 ENUM (STATES, TEAMS, RANKS)', type: 'Enum', color: 'text-amber-400', hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'list', label: '📦 LIST/ARRAY (ITEMS, INVENTORY)', type: ['List', '[]'], color: 'text-cyan-400', hex: "RET (C0 03 5F D6)" },
            { id: 'iap', label: '🛒 IAP/PURCHASE (BILLING, STORE)', type: 'Purchase', color: 'text-yellow-400', hex: "20 00 80 D2 C0 03 5F D6" }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1];
                const type = match[2];
                const name = match[3];
                const nameL = name.toLowerCase();

                // Lọc hằng số quan trọng (Chấp nhận tất cả mục tiêu chiến đấu)
                const keywords = ['hp', 'health', 'mp', 'mana', 'gold', 'coin', 'gem', 'diamond', 'damage', 'atk', 'attack', 'speed', 'velocity', 'move', 'cooldown', 'cd', 'delay', 'vip', 'premium', 'unlock', 'purchase', 'buy', 'price', 'cost', 'takedamage', 'spend', 'ban', 'integrity', 'cheat', 'hack', 'state', 'inventory', 'item', 'reward', 'exp'];

                if (!keywords.some(k => nameL.includes(k))) continue;

                scannerGroups.forEach(group => {
                    let typeMatch = false;
                    if (Array.isArray(group.type)) {
                        typeMatch = group.type.some(t => type.includes(t));
                    } else {
                        typeMatch = type.toLowerCase().includes(group.type.toLowerCase()) || (group.type === 'bool' && type === 'Boolean');
                    }

                    if (typeMatch || (group.id === 'iap' && nameL.includes('purchase'))) {
                        const key = group.id + rva;
                        winners[key] = { rva, name, type, ...group };
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.innerHTML = '';
            scannerGroups.forEach(group => {
                const items = data.filter(d => d.id === group.id);
                if (items.length === 0) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-xl font-black mb-4 uppercase italic ${group.color}">${group.label} (${items.length})</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            ${items.map(item => `
                                <div class="card p-4 flex flex-col justify-between">
                                    <div class="mb-3">
                                        <div class="text-[9px] text-slate-500 font-mono mb-1 truncate">${item.type}</div>
                                        <div class="text-[11px] font-bold text-white break-words leading-tight">${item.name}</div>
                                    </div>
                                    <div class="rva-box text-center py-1 rounded mb-3 text-[10px] font-bold">${item.rva}</div>
                                    <div class="flex items-center gap-2">
                                        <div class="hex-display flex-1 text-center font-bold truncate">${item.hex}</div>
                                        <button onclick="navigator.clipboard.writeText('${item.rva}');" class="bg-indigo-600 p-2 rounded hover:bg-white hover:text-black transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
