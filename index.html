<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v43.0 - Expert Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2.5rem; padding: 2rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; }
        .card:hover { border-color: #10b981; transform: translateY(-5px); }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .analysis-box { background: rgba(16, 185, 129, 0.08); border-left: 5px solid #10b981; padding: 15px; margin: 15px 0; border-radius: 6px; font-size: 13px; color: #fff; line-height: 1.6; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 14px; border-radius: 12px; text-transform: uppercase; }
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1500px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter">EXPERT <span class="text-emerald-500">TRANSLATOR</span> v43.0</h1>
            <p class="text-slate-500 font-bold text-xs mt-4 uppercase tracking-[0.5em]">Tự Động Giải Thích Chi Tiết Công Dụng Logic</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[4rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-16 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> ĐỂ DỊCH NGHĨA HÀM</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // HÀM XỬ LÝ NGÔN NGỮ TỰ ĐỘNG (LOGIC PARSER)
        function getExpertAnalysis(name, type) {
            const n = name.toLowerCase();
            const t = type.toLowerCase();
            
            // Từ điển gốc để dịch các từ khóa
            const dict = {
                'gold': 'Vàng/Tiền', 'gem': 'Kim cương', 'diamond': 'Kim cương', 'coin': 'Tiền xu',
                'hp': 'Máu', 'health': 'Máu', 'mp': 'Năng lượng/Mana', 'mana': 'Pháp lực',
                'damage': 'Sát thương gây ra', 'attack': 'Sức tấn công', 'speed': 'Tốc độ di chuyển',
                'multiplier': 'Hệ số nhân', 'received': 'nhận vào từ kẻ địch', 'persecond': 'mỗi giây',
                'isvip': 'Đặc quyền VIP', 'unlocked': 'Mở khóa vật phẩm', 'purchased': 'Trạng thái mua hàng',
                'critical': 'Chí mạng', 'range': 'Tầm đánh', 'cooldown': 'Thời gian hồi chiêu', 'level': 'Cấp độ',
                'exp': 'Kinh nghiệm', 'reward': 'Phần thưởng', 'price': 'Giá bán/Mua'
            };

            let subject = "";
            for (let key in dict) { if (n.includes(key)) subject = dict[key]; }
            if (!subject) subject = name.replace('get_', '').replace('is', '');

            let detail = "";
            let hexSuggest = "C0 03 5F D6";

            if (t.includes('int')) {
                detail = `Cấp quyền chỉnh sửa con số cụ thể cho <b>${subject}</b>. Khi dán mã Patch, bạn sẽ nhận được giá trị cực đại (ví dụ: 999.999), giúp xóa bỏ rào cản cày cuốc.`;
                hexSuggest = "00 E1 00 D2 C0 03 5F D6";
            } else if (t.includes('bool')) {
                if (n.includes('ban') || n.includes('cheat') || n.includes('detect')) {
                    detail = `Đây là hàm bảo mật kiểm tra <b>${subject}</b>. Ép về <b>False</b> sẽ khiến trình quét hack của game không hoạt động, bảo vệ tài khoản khỏi bị khóa.`;
                    hexSuggest = "00 00 80 D2 C0 03 5F D6";
                } else {
                    detail = `Điều khiển trạng thái <b>${subject}</b>. Ép về <b>True</b> để kích hoạt ngay lập tức các tính năng mà thường phải trả phí hoặc đạt điều kiện mới có.`;
                    hexSuggest = "20 00 80 D2 C0 03 5F D6";
                }
            } else if (t.includes('float') || t.includes('single')) {
                if (n.includes('received')) {
                    detail = `Điều chỉnh lượng <b>${subject}</b>. Bằng cách ép hệ số nhân về 0, bạn sẽ hoàn toàn không bị ảnh hưởng bởi sát thương từ kẻ địch (Bất tử).`;
                    hexSuggest = "00 00 00 2D C0 03 5F D6";
                } else {
                    detail = `Gấp nhiều lần lượng <b>${subject}</b> gốc của nhân vật. Patch mã Hex này sẽ biến nhân vật thành siêu nhân với chỉ số nhân lên 100 lần.`;
                    hexSuggest = "00 00 C8 42 C0 03 5F D6";
                }
            } else if (t.includes('void')) {
                detail = `Dừng ngay lập tức hành động <b>${subject}</b>. Game sẽ bỏ qua hoàn toàn quy trình này (Ví dụ: Bỏ qua bước trừ tiền khi mua đồ hoặc bỏ qua bước trừ máu khi bị đánh).`;
                hexSuggest = "C0 03 5F D6";
            }

            return { desc: detail, hex: hexSuggest };
        }

        const config = [
            { id: 'money', label: '💰 NHÓM TÀI NGUYÊN (Int32)', keys: ['gold', 'coin', 'diamond', 'gem', 'money', 'price'], type: 'int' },
            { id: 'stats', label: '❤️ NHÓM CHỈ SỐ (Int32)', keys: ['hp', 'health', 'mp', 'mana', 'level', 'exp'], type: 'int' },
            { id: 'combat', label: '⚔️ NHÓM CHIẾN ĐẤU (Float/Void)', keys: ['damage', 'attack', 'speed', 'multiplier', 'takedamage', 'critical', 'range'], type: 'all' },
            { id: 'vip', label: '🛒 NHÓM MỞ KHÓA (Boolean)', keys: ['vip', 'premium', 'unlocked', 'purchased'], type: 'bool' },
            { id: 'safety', label: '🛡️ NHÓM ANTIBAN (Boolean)', keys: ['banned', 'detect', 'check', 'integrity'], type: 'bool' }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(\)\s*\{\s*\}/gi;
            let rawMatches = []; let match;
            while ((match = regex.exec(content)) !== null) {
                rawMatches.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            config.forEach(group => {
                let items = rawMatches.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    let typeOk = false;
                    if (group.type === 'int') typeOk = tL === 'int32' || tL === 'int';
                    else if (group.type === 'bool') typeOk = tL === 'bool' || tL === 'boolean';
                    else if (group.type === 'all') typeOk = true;
                    return nameOk && typeOk;
                });

                if (items.length > 0) {
                    // Lọc trùng lặp để chỉ lấy hàm chuẩn nhất
                    let seen = new Set();
                    results[group.id] = items.filter(it => {
                        let shortName = it.nameL.replace('get_', '').replace('is', '');
                        if (seen.has(shortName)) return false;
                        seen.add(shortName);
                        return true;
                    });
                }
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            config.forEach(group => {
                const items = data[group.id];
                if (!items) return;
                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-10 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">${group.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${items.map(item => {
                                const analysis = getExpertAnalysis(item.name, item.type);
                                return `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float'))}">${item.type}</span>
                                    <div class="mb-2 text-[14px] font-black text-white italic uppercase break-all">${item.name}()</div>
                                    <div class="analysis-box">🎯 <b>Chi tiết công dụng:</b><br>${analysis.desc}</div>
                                    <div class="my-6">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center">Copy RVA sang Filza:</div>
                                        <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</span>
                                    </div>
                                    <button onclick="navigator.clipboard.writeText('${analysis.hex}'); alert('Copied Hex!')" class="hex-btn active:scale-95">Copy Mã Patch: ${analysis.hex}</button>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
