<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v36.0 - The Ultimate Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .judge-box { border-radius: 2rem; padding: 2rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .target-card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; border-left: 6px solid #10b981; }
        .target-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        .type-tag { position: absolute; top: 12px; right: 15px; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.4rem; font-weight: 900; background: #000; padding: 12px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; }
        /* Phân màu kiểu dữ liệu */
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans text-center">

    <div class="max-w-[1500px] mx-auto">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter italic">THE JUDGE <span class="text-emerald-500">v36.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Lọc Chuẩn: Int, Bool, Void, Float • Chấp Nhận Static</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-12 transition-all">
            <p class="text-2xl text-slate-400 font-black uppercase italic tracking-widest text-center">Thả <span class="text-emerald-500 underline uppercase italic">dump.cs</span> để lấy tử huyệt chuẩn nhất</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // BỘ QUY TẮC GIÁM ĐỊNH (CHỈ LẤY HÀM CHUẨN NHẤT)
        const judgeCatalog = [
            { id: 'currency', label: '💰 TIỀN TỆ (Vàng/Gem)', keys: ['get_gold', 'get_coin', 'get_diamond', 'get_gem', 'get_money'], type: 'int', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'stats', label: '❤️ CHỈ SỐ (HP/MP)', keys: ['get_hp', 'get_maxhp', 'get_health', 'get_maxhealth', 'get_mp', 'get_maxmp'], type: 'int', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'logic', label: '🛡️ ĐIỀU KIỆN (VIP/Unlock)', keys: ['isvip', 'ispremium', 'ispurchased', 'isunlocked'], type: 'bool', hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'combat', label: '⚔️ SỨC MẠNH (Dame/Speed)', keys: ['get_damage', 'get_attack', 'get_speed', 'get_movespeed'], type: 'float', hex: "00 00 C8 42 C0 03 5F D6" },
            { id: 'block', label: '🚫 HÀNH ĐỘNG (Bất Tử/Free)', keys: ['takedamage', 'spendgold', 'useitem', 'onhit'], type: 'void', hex: "C0 03 5F D6" },
            { id: 'safety', label: '🛡️ BẢO MẬT (Antiban)', keys: ['isbanned', 'detectcheat', 'checkintegrity'], type: 'bool', hex: "00 00 80 D2 C0 03 5F D6" }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            // Regex hỗ trợ cả static và các khoảng trắng dư thừa
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let rawMatches = []; let match;
            while ((match = regex.exec(content)) !== null) {
                rawMatches.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let finalWinners = {};
            judgeCatalog.forEach(rule => {
                let filtered = rawMatches.filter(m => {
                    // Kiểm tra kiểu dữ liệu
                    const tL = m.type.toLowerCase();
                    let typeOk = false;
                    if (rule.type === 'int') typeOk = (tL === 'int32' || tL === 'int');
                    if (rule.type === 'bool') typeOk = (tL === 'bool' || tL === 'boolean');
                    if (rule.type === 'void') typeOk = (tL === 'void');
                    if (rule.type === 'float') typeOk = (tL === 'single' || tL === 'float');

                    // Kiểm tra từ khóa
                    const nameOk = rule.keys.some(k => m.nameL === k || m.nameL.includes(k));
                    
                    return typeOk && nameOk;
                });
                if (filtered.length > 0) finalWinners[rule.id] = filtered;
            });
            render(finalWinners);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            judgeCatalog.forEach(rule => {
                const items = data[rule.id];
                if (!items) return;
                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="judge-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">${rule.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            ${items.map(item => `
                                <div class="target-card p-6 shadow-2xl">
                                    <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float'))}">${item.type}</span>
                                    <div class="mb-4 text-[11px] font-black text-white break-all italic uppercase">${item.name}</div>
                                    <div class="mb-6">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center">Address (Filza/Offset):</div>
                                        <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')">${item.rva}</span>
                                    </div>
                                    <button onclick="navigator.clipboard.writeText('${rule.hex}'); alert('Đã Copy Hex!')" class="hex-btn w-full py-4 rounded-xl text-[10px] uppercase tracking-widest shadow-lg">Copy Mã Hex Dứt Điểm</button>
                                    <div class="text-center text-[9px] text-slate-500 font-mono mt-3 italic">Patch: ${rule.hex}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
