<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v30.0 - Pure Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.25rem; transition: 0.3s; position: relative; }
        .type-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; color: white; background: #059669; }
        .rva-val { font-family: monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 8px; border-radius: 10px; border: 1px solid #10b981; text-align: center; display: block; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans text-center">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter">PURE SNIPER <span class="text-emerald-500">v30.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Chỉ Quét get_Gold & get_Gem • Fix Int32 Cho iOS</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-12 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">Thả <span class="text-emerald-500 underline uppercase italic">dump.cs</span> để "Bắn Tỉa"</p>
        </div>

        <div id="resultsArea" class="space-y-12 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // CHỈ QUÉT CÁC MỤC TIÊU VÀNG BẠN YÊU CẦU
        const targetRules = [
            { id: 'gold', label: 'VÀNG (Gold)', keys: ['get_gold', 'get_coin', 'get_money'], type: 'int32', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'gem', label: 'KIM CƯƠNG (Gem)', keys: ['get_diamond', 'get_gem', 'get_ruby', 'get_crystal'], type: 'int32', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'stats', label: 'HP & MP', keys: ['get_hp', 'get_maxhp', 'get_health', 'get_maxhealth', 'get_mp', 'get_maxmp', 'get_mana'], type: 'int32', hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'antiban', label: 'ANTIBAN (Toàn bộ)', keys: ['isbanned', 'detectcheat', 'checkintegrity', 'isjailbroken'], type: 'all', hex: "00 00 80 D2 C0 03 5F D6" }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let raw = []; let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            targetRules.forEach(rule => {
                let filtered = raw.filter(m => {
                    const isTargetName = rule.keys.some(k => m.nameL === k || m.nameL.includes(k));
                    if (!isTargetName) return false;
                    
                    if (rule.type === 'all') return true;
                    // Chỉ lấy đúng kiểu Int32 cho Tiền/HP
                    return m.type.toLowerCase() === 'int32' || m.type.toLowerCase() === 'int';
                });
                
                if (filtered.length > 0) results[rule.id] = filtered;
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            targetRules.forEach(rule => {
                const items = data[rule.id];
                if (!items) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">${rule.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${items.map(item => `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag">${item.type}</span>
                                    <div class="mb-4">
                                        <div class="text-[12px] font-black text-white break-all leading-tight italic uppercase">${item.name}</div>
                                    </div>
                                    <div class="mb-6">
                                        <div class="text-[10px] text-slate-600 font-bold uppercase mb-2 text-center">Offset Filza:</div>
                                        <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</span>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800">
                                        <button onclick="navigator.clipboard.writeText('${rule.hex}'); alert('Copied Hex!')" 
                                            class="hex-btn w-full py-4 rounded-xl text-[11px] uppercase tracking-widest shadow-lg">
                                            Copy Mã Hex Dứt Điểm
                                        </button>
                                        <div class="text-center text-[9px] text-slate-500 font-mono mt-3 italic">${rule.hex}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
