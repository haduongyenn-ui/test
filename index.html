<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v21.0 - Multi-Target Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-container { border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; background: #0f172a; border: 2px solid rgba(255,255,255,0.05); }
        .card-item { background: #020617; border: 1px solid #1e293b; border-radius: 1.25rem; transition: 0.2s; position: relative; }
        .card-item:hover { border-color: #10b981; }
        .hex-patch-btn { background: #059669; color: white; font-weight: 900; transition: 0.2s; }
        .hex-patch-btn:active { transform: scale(0.95); opacity: 0.8; }
        .rva-code { font-family: 'Courier New', monospace; color: #f43f5e; font-weight: 900; background: #000; padding: 4px 8px; border-radius: 6px; border: 1px solid #312e81; }
        .func-name { color: #94a3b8; font-size: 11px; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1600px] mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-white italic uppercase tracking-tighter">MULTI SNIPER <span class="text-emerald-500">v21.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.4em]">Liệt Kê Toàn Bộ RVA Chính • Phân Loại Nhóm Hack</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-10 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic">Thả file <span class="text-emerald-500 underline">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="space-y-10"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const filterLogic = [
            { id: 'hp', label: '❤️ NHÓM MÁU (HP)', keys: ['hp', 'health', 'life'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'mp', label: '💧 NHÓM NĂNG LƯỢNG (MP)', keys: ['mp', 'mana', 'energy'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'money', label: '💰 NHÓM TIỀN TỆ (GOLD/GEM)', keys: ['gold', 'coin', 'diamond', 'gem', 'ruby', 'money'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'combat', label: '⚔️ NHÓM CHIẾN ĐẤU (DAME/CD)', keys: ['damage', 'attack', 'cooldown', 'skilldelay', 'movespeed'], hex: "DAME: 00 00 C8 42... | CD: 0.0f" },
            { id: 'iap', label: '🛒 NHÓM VIP & MỞ KHÓA', keys: ['isvip', 'ispremium', 'ispurchased', 'isunlocked', 'price', 'cost'], hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'ads', label: '🚫 NHÓM ADS & ANTIBAN', keys: ['ads', 'showads', 'isbanned', 'detectcheat'], hex: "00 00 80 D2 C0 03 5F D6" }
        ];

        const blacklist = ['compare', 'tostring', 'equals', 'gethashcode', 'item', 'count', 'index', 'identity'];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], type = match[2], name = match[3], nameL = name.toLowerCase();
                if (blacklist.some(b => nameL.includes(b))) continue;

                filterLogic.forEach(group => {
                    if (group.keys.some(k => nameL.includes(k))) {
                        if (!winners[group.id]) winners[group.id] = [];
                        winners[group.id].push({ rva, name, type, hex: group.hex });
                    }
                });
            }
            render(winners);
        }

        function render(groups) {
            resultsArea.innerHTML = '';
            filterLogic.forEach(logic => {
                const items = groups[logic.id];
                if (!items || items.length === 0) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-container">
                        <h2 class="text-3xl font-black mb-6 uppercase italic text-emerald-500">${logic.label} (${items.length})</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            ${items.map(item => `
                                <div class="card-item p-5 shadow-xl">
                                    <div class="mb-4">
                                        <div class="func-name mb-1">Hàm: ${item.name}</div>
                                        <div class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest italic">${item.type}</div>
                                    </div>
                                    <div class="mb-4">
                                        <div class="text-[10px] text-slate-600 font-bold uppercase mb-1 text-center">RVA Địa Chỉ</div>
                                        <div class="rva-code text-center text-sm cursor-pointer" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</div>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800">
                                        <button onclick="navigator.clipboard.writeText('${item.hex.split(':')[0].trim()}'); alert('Copied Hex!')" 
                                            class="hex-patch-btn w-full py-3 rounded-xl text-[10px] uppercase tracking-widest mb-2 shadow-lg">
                                            COPY MÃ HEX
                                        </button>
                                        <div class="text-center text-[9px] text-slate-500 font-mono">${item.hex}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
