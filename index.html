<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Modder - Unlimited Scanner v8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: #0f172a; border: 1px solid #1e293b; transition: 0.2s; }
        .card:hover { border-color: #38bdf8; }
        .hex-select { background: #000; color: #fbbf24; border: 1px solid #334155; font-family: monospace; font-size: 11px; width: 100%; padding: 5px; border-radius: 5px; }
        .rva-box { font-family: 'Courier New', monospace; background: #1e293b; color: #f43f5e; border: 1px solid #451a03; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase italic tracking-tighter">Unlimited Scanner <span class="text-sky-500">v8.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-2 uppercase tracking-[0.2em]">Tìm tất cả hàm - Tùy chọn Hex mọi giá trị</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-sky-500 transition-all cursor-pointer mb-12 shadow-2xl">
            <p class="text-xl text-slate-400 font-bold uppercase">Thả file <span class="underline">dump.cs</span> vào đây</p>
            <p id="status" class="text-xs text-sky-500 mt-2 font-bold"></p>
        </div>

        <div class="mb-6">
            <input type="text" id="filterInput" onkeyup="filterResults()" placeholder="Lọc nhanh kết quả (Vd: Gold, Health, Speed...)" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-6 py-3 text-sm focus:outline-none focus:border-sky-500">
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('results');
        const status = document.getElementById('status');

        // THƯ VIỆN HEX TỔNG HỢP (Dùng cho mọi thẻ)
        const hexGroups = {
            "Bool (Đúng/Sai)": [
                { name: "TRUE (Bật/Bypass)", hex: "20 00 80 D2 C0 03 5F D6" },
                { name: "FALSE (Tắt/Vô hiệu)", hex: "00 00 80 D2 C0 03 5F D6" }
            ],
            "Integer (Số nguyên)": [
                { name: "999.999", hex: "00 E1 00 D2 C0 03 5F D6" },
                { name: "50.000", hex: "00 6D 81 D2 C0 03 5F D6" },
                { name: "0 (Free/Reset)", hex: "00 00 80 D2 C0 03 5F D6" },
                { name: "MAX (2 Tỷ+)", hex: "FF FF 8F D2 FF FF AF F2 C0 03 5F D6" }
            ],
            "Float (Số thực)": [
                { name: "10.0f (Mạnh)", hex: "00 00 20 41 C0 03 5F D6" },
                { name: "2.0f (Vừa)", hex: "00 00 A0 40 C0 03 5F D6" },
                { name: "0.0f (Xóa)", hex: "00 00 20 D2 00 00 28 1E C0 03 5F D6" }
            ]
        };

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            status.innerText = "Đang quét toàn bộ file... vui lòng đợi";
            const reader = new FileReader();
            reader.onload = e => processAll(e.target.result);
            reader.readAsText(file);
        }

        function processAll(content) {
            // Regex cực rộng: Tìm mọi hàm get_, is_, check_, verify_, can_
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(\w+)\s+((?:get_|is_|check_|verify_|can_)\w+)\(\)/gi;
            let match, data = [];

            while ((match = regex.exec(content)) !== null) {
                data.push({ rva: match[1], type: match[2], name: match[3] });
            }
            
            status.innerText = `Đã tìm thấy ${data.length} hàm có thể hack!`;
            render(data);
        }

        function render(data) {
            resultsArea.innerHTML = data.map(item => `
                <div class="card rounded-xl p-4 flex flex-col justify-between shadow-lg search-item">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[8px] font-bold text-sky-400 bg-sky-950 px-2 py-0.5 rounded uppercase">${item.type}</span>
                            <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA')" class="text-[9px] text-gray-500 hover:text-white uppercase font-bold">Copy RVA</button>
                        </div>
                        <h3 class="text-sm font-bold text-white break-all mb-3">${item.name}</h3>
                        <div class="rva-box p-1.5 rounded text-[10px] font-bold text-center tracking-widest mb-4">${item.rva}</div>
                    </div>

                    <div class="pt-3 border-t border-slate-800">
                        <select class="hex-select mb-2" onchange="document.getElementById('hex-${item.rva}').innerText = this.value">
                            ${Object.keys(hexGroups).map(group => `
                                <optgroup label="${group}">
                                    ${hexGroups[group].map(opt => `<option value="${opt.hex}">${opt.name}</option>`).join('')}
                                </optgroup>
                            `).join('')}
                        </select>
                        <div id="hex-${item.rva}" class="text-[9px] font-mono text-center text-yellow-500 mb-2 font-bold">${hexGroups["Bool (Đúng/Sai)"][0].hex}</div>
                        <button onclick="navigator.clipboard.writeText(document.getElementById('hex-${item.rva}').innerText); alert('Copied Hex')" class="w-full bg-sky-600 hover:bg-white hover:text-black text-white text-[10px] font-bold py-1.5 rounded-lg transition-all uppercase">Copy Hex</button>
                    </div>
                </div>
            `).join('');
        }

        function filterResults() {
            let input = document.getElementById('filterInput').value.toLowerCase();
            let items = document.getElementsByClassName('search-item');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = items[i].innerText.toLowerCase().includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
