<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v9.0 - Precision Offset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; border: 2px solid; }
        .card { background: #111827; border: 1px solid #374151; transition: 0.3s; }
        .hex-select { background: #000; color: #fbbf24; border: 1px solid #1e293b; font-size: 11px; width: 100%; padding: 8px; border-radius: 8px; outline: none; }
        .rva-box { font-family: monospace; background: #000; color: #f43f5e; border: 1px solid #1e293b; }
        .copy-btn { @apply bg-slate-800 hover:bg-white hover:text-black px-3 py-1 rounded text-[10px] font-bold transition-all; }
        .title-tag { @apply text-2xl font-black mb-8 uppercase italic tracking-tighter; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-white uppercase italic tracking-tighter">Precision <span class="text-indigo-500">v9.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-2 uppercase tracking-[0.4em]">Tách biệt 100% RVA • Không gộp nhóm • ARM64</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-indigo-500 transition-all cursor-pointer mb-12 shadow-2xl group">
            <p class="text-xl text-slate-400 group-hover:text-indigo-400 transition-colors font-bold uppercase italic tracking-widest text-center">Thả file <span class="text-indigo-500 underline uppercase">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const hexLibrary = {
            bool: [{ name: "TRUE (Bật)", hex: "20 00 80 D2 C0 03 5F D6" }, { name: "FALSE (Tắt)", hex: "00 00 80 D2 C0 03 5F D6" }],
            int: [{ name: "999.999", hex: "00 E1 00 D2 C0 03 5F D6" }, { name: "0", hex: "00 00 80 D2 C0 03 5F D6" }],
            float: [{ name: "100.0f (Mạnh)", hex: "00 00 C8 42 C0 03 5F D6" }, { name: "2.0f (Vừa)", hex: "00 00 A0 40 C0 03 5F D6" }],
            cooldown: [{ name: "0.0f (Hồi ngay)", hex: "00 00 20 D2 00 00 28 1E C0 03 5F D6" }]
        };

        // CẤU HÌNH TÁCH BIỆT HOÀN TOÀN (KHÔNG GỘP)
        const preciseGroups = [
            { id: 'bypass', label: '🛡️ BYPASS INTEGRITY', color: 'text-purple-400', border: 'border-purple-500/30', keys: ['checkintegrity', 'verifyfile', 'hashcheck'], type: 'bool' },
            { id: 'antiban', label: '🔥 ANTI-BAN', color: 'text-orange-500', border: 'border-orange-500/30', keys: ['isbanned', 'detecthack', 'jailbreak'], type: 'bool' },
            { id: 'hp', label: '❤️ HP (MÁU)', color: 'text-rose-500', border: 'border-rose-500/30', keys: ['hp', 'health', 'life'], type: 'int' },
            { id: 'mp', label: '💧 MP (NĂNG LƯỢNG)', color: 'text-sky-500', border: 'border-sky-500/30', keys: ['mp', 'mana', 'energy'], type: 'int' },
            { id: 'dame', label: '⚔️ DAMAGE (SÁT THƯƠNG)', color: 'text-red-500', border: 'border-red-500/30', keys: ['damage', 'atk', 'attackpower'], type: 'float' },
            { id: 'speed', label: '⚡ SPEED (TỐC ĐỘ)', color: 'text-cyan-400', border: 'border-cyan-400/30', keys: ['speed', 'movespeed', 'velocity'], type: 'float' },
            { id: 'cooldown', label: '⏳ HỒI CHIÊU', color: 'text-blue-400', border: 'border-blue-400/30', keys: ['cooldown', 'skilldelay'], type: 'cooldown' },
            { id: 'gold', label: '💰 VÀNG (GOLD)', color: 'text-emerald-400', border: 'border-emerald-400/30', keys: ['gold', 'coin', 'silver'], type: 'int' },
            { id: 'diamond', label: '💎 KIM CƯƠNG', color: 'text-teal-400', border: 'border-teal-400/30', keys: ['diamond', 'gem', 'ruby', 'crystal'], type: 'int' },
            { id: 'shop', label: '🛒 FREE SHOP', color: 'text-yellow-400', border: 'border-yellow-400/30', keys: ['get_price', 'isafford'], type: 'bool' },
            { id: 'ads', label: '🚫 ADS (QUẢNG CÁO)', color: 'text-gray-400', border: 'border-gray-500/30', keys: ['showads', 'hasads'], type: 'bool' }
        ];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+((?:get_|is_|check_)\w+)\(\)/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], name = match[2], nameLower = name.toLowerCase();
                if (name.length > 25) continue;

                preciseGroups.forEach(group => {
                    if (group.keys.some(k => nameLower.includes(k))) {
                        // Tách biệt theo từng nhóm cụ thể
                        if (!winners[group.id] || name.length < winners[group.id].name.length) {
                            winners[group.id] = { rva, name, ...group };
                        }
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.innerHTML = data.map(item => `
                <div class="group-box ${item.border} animate-in fade-in slide-in-from-bottom-4 duration-500 shadow-xl bg-slate-900/20">
                    <h2 class="title-tag ${item.color}">${item.label}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="card rounded-2xl p-5 shadow-2xl flex flex-col justify-between border-t-2 border-slate-700">
                            <div>
                                <h3 class="text-[11px] font-black text-white mb-4 italic tracking-widest uppercase">${item.name}</h3>
                                <div class="mb-4">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">RVA Offset</span>
                                        <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('RVA Copied!')" class="copy-btn uppercase">Copy RVA</button>
                                    </div>
                                    <div class="rva-box p-2 rounded-lg text-[11px] font-bold text-center tracking-widest">${item.rva}</div>
                                </div>
                            </div>
                            <div class="mt-2 border-t border-slate-800 pt-4">
                                <select class="hex-select mb-3" onchange="document.getElementById('hex-${item.rva}').innerText = this.value">
                                    ${hexLibrary[item.type].map(opt => `<option value="${opt.hex}">${opt.name}</option>`).join('')}
                                </select>
                                <div id="hex-${item.rva}" class="text-[10px] font-mono text-center text-indigo-400 mb-4 font-bold tracking-widest">${hexLibrary[item.type][0].hex}</div>
                                <button onclick="navigator.clipboard.writeText(document.getElementById('hex-${item.rva}').innerText); alert('Hex Copied!')" class="w-full bg-indigo-700 hover:bg-white hover:text-black text-white font-black py-2 rounded-xl transition-all text-[10px] uppercase shadow-lg tracking-widest">Copy Hex Patch</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
