<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>100% Work Hex Patch Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hex-bg { background: #111827; border: 1px solid #374151; }
        .success-glow { box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-300 font-sans p-6">
    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-emerald-500 tracking-widest uppercase">Verified Hex Fixer</h1>
            <p class="text-gray-500 text-sm mt-2 font-medium">Chỉ trích xuất các hàm có tỉ lệ thành công 100% khi Patch</p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-emerald-900/50 bg-emerald-950/10 rounded-3xl p-12 text-center hover:bg-emerald-950/20 transition-all cursor-pointer mb-8">
            <p class="text-lg text-emerald-100 font-semibold">Thả file dump.cs vào đây</p>
            <p class="text-xs text-emerald-700 mt-2 uppercase tracking-tighter font-bold">Hệ thống sẽ tự lọc các hàm an toàn nhất</p>
        </div>

        <div id="results" class="hidden space-y-4 animate-in fade-in duration-500">
            <div class="flex items-center gap-2 mb-4">
                <span class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_10px_#10b981]"></span>
                <h2 class="text-xl font-bold text-white">Danh sách hàm An toàn (Verified)</h2>
            </div>
            
            <div id="cardList" class="grid gap-4">
                </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const cardList = document.getElementById('cardList');
        const resultsArea = document.getElementById('results');

        // CHỈ LẤY CÁC HÀM GETTER ĐƠN GIẢN
        const safeKeywords = ['gold', 'money', 'gem', 'diamond', 'coin', 'hp', 'health', 'damage', 'atk', 'isvip', 'ispremium', 'unlocked', 'speed', 'energy'];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                // Regex cực kỳ khắt khe: Chỉ tìm RVA của các hàm getter không có tham số
                const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(\w+)\s+(get_\w+)\(\)\s*\{/gi;
                let match, results = [];

                while ((match = regex.exec(content)) !== null) {
                    const rva = match[1];
                    const retType = match[2];
                    const name = match[3];

                    if (safeKeywords.some(k => name.toLowerCase().includes(k))) {
                        results.push({ rva, retType, name });
                    }
                }
                render(results);
            };
            reader.readAsText(file);
        }

        function render(data) {
            resultsArea.classList.remove('hidden');
            cardList.innerHTML = data.map(item => {
                let hex = "20 00 80 D2 C0 03 5F D6"; // Mặc định return 1 (True)
                let valueDesc = "Kích hoạt (ON)";

                if (['int', 'int32', 'float', 'single'].some(t => item.retType.toLowerCase().includes(t))) {
                    hex = "00 E1 00 D2 C0 03 5F D6"; // Return 999
                    valueDesc = "Giá trị lớn (999)";
                }

                return `
                <div class="hex-bg rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 success-glow border-emerald-500/20">
                    <div class="flex-1">
                        <div class="text-emerald-400 font-bold text-lg">${item.name}</div>
                        <div class="flex gap-4 mt-1">
                            <span class="text-rose-500 font-mono text-sm font-bold">RVA: ${item.rva}</span>
                            <span class="text-gray-600 text-xs font-bold uppercase tracking-widest pt-0.5">Type: ${item.retType}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-center border-l border-gray-800 pl-6">
                        <span class="text-[10px] text-emerald-500 font-black mb-1 uppercase tracking-widest">Hex Code</span>
                        <div class="text-yellow-500 font-mono font-bold text-sm bg-black/40 px-3 py-1 rounded border border-gray-700 mb-2">${hex}</div>
                        <button onclick="navigator.clipboard.writeText('${hex}'); alert('Đã Copy Hex!')" class="text-[10px] bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-1 px-4 rounded-full transition-all">COPY HEX</button>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
