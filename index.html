<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyzer v50.1 Smart - Visual Patcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        body { background: #020617; }
        .group-box { border-radius: 1.4rem; padding: 1rem; margin-bottom: 1.25rem; background: #0f172a; border: 1px solid #10b981; }
        .card {
            background: linear-gradient(180deg, #020617 0%, #061224 100%);
            border: 1px solid #1e293b;
            border-radius: 1.2rem;
            transition: 0.22s;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .card:hover { border-color: #10b981; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(16,185,129,0.10); }
        .card.best-card {
            border: 1px solid #ef4444;
            box-shadow: 0 0 0 1px rgba(239,68,68,0.35), 0 12px 30px rgba(239,68,68,0.12);
        }
        .best-ribbon {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(90deg, #dc2626 0%, #ef4444 100%);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            z-index: 3;
        }
        .type-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 999px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .int { background: #059669; }
        .bool { background: #d97706; }
        .void { background: #7c3aed; }
        .float { background: #0891b2; }
        .drop-active { border-color: #10b981 !important; transform: scale(1.01); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }

        .pill {
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #111827;
            color: #cbd5e1;
            border: 1px solid #334155;
            font-weight: 800;
        }
        .rank-pill {
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #3f0a0a;
            color: #fecaca;
            border: 1px solid #7f1d1d;
            font-weight: 900;
        }
        .stats-chip {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 999px;
            padding: 9px 13px;
            font-weight: 800;
            color: #cbd5e1;
        }
        .profile-box {
            background: linear-gradient(180deg, rgba(59,130,246,0.12) 0%, rgba(59,130,246,0.04) 100%);
            border: 1px solid rgba(59,130,246,0.22);
            border-left: 4px solid #3b82f6;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 18px;
        }

        .analysis-box {
            background: linear-gradient(180deg, rgba(16,185,129,0.10) 0%, rgba(16,185,129,0.04) 100%);
            border: 1px solid rgba(16,185,129,0.22);
            border-left: 4px solid #10b981;
            padding: 12px;
            margin: 14px 0;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.55;
            color: #ecfeff;
        }
        .analysis-head {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .analysis-mini {
            display: grid;
            gap: 6px;
        }
        .analysis-mini div { color: #dbeafe; }
        .analysis-mini b { color: #ffffff; }

        .hex-select {
            background: #1e293b;
            color: #10b981;
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 11px 12px;
            width: 100%;
            font-weight: 800;
            font-size: 13px;
            outline: none;
        }
        .code-panel {
            margin-top: 10px;
            background: linear-gradient(180deg, #07111f 0%, #020617 100%);
            border: 1px solid #1f3a4f;
            border-radius: 14px;
            padding: 12px;
        }
        .code-label {
            font-size: 10px;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 7px;
        }
        .hex-display {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #34d399;
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            border: 1px solid #1e293b;
            word-break: break-word;
            text-align: left;
            line-height: 1.65;
            min-height: 54px;
        }
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 7px;
            margin-top: 9px;
        }
        .hex-chunk {
            background: #08111d;
            border: 1px solid #17314a;
            color: #67e8f9;
            border-radius: 10px;
            padding: 7px 6px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 700;
        }
        .rva-panel {
            margin-top: 12px;
            background: linear-gradient(180deg, #10161f 0%, #050a12 100%);
            border: 1px solid #1f3a4f;
            border-radius: 14px;
            padding: 12px;
        }
        .rva-val {
            font-family: 'Courier New', monospace;
            color: #fb7185;
            font-size: 1.15rem;
            font-weight: 900;
            background: #000;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #10b981;
            text-align: center;
            display: block;
            word-break: break-all;
            letter-spacing: 0.02em;
        }
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
            margin-top: 10px;
        }
        .hex-btn, .ghost-btn {
            font-weight: 900;
            transition: 0.2s;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            text-transform: uppercase;
            margin-top: 0;
            font-size: 12px;
            letter-spacing: 0.03em;
        }
        .hex-btn { background: #10b981; color: #000; }
        .ghost-btn { background: #0f172a; color: #d1fae5; border: 1px solid #24556c; }
        .hex-btn:hover, .ghost-btn:hover { filter: brightness(1.05); }
        .hex-btn:active, .ghost-btn:active { transform: scale(0.98); }

        @media (max-width: 768px) {
            .group-box { padding: 0.9rem; border-radius: 1.1rem; }
            .action-row { grid-template-columns: 1fr; }
            .rva-val { font-size: 1.02rem; }
        }
    </style>
</head>
<body class="text-slate-300 p-4 md:p-7 font-sans">
    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-7">
            <h1 class="text-4xl md:text-7xl font-black text-white italic uppercase tracking-tighter">
                VISUAL PATCHER <span class="text-emerald-500">v50.1 SMART</span>
            </h1>
            <p class="text-slate-500 font-bold text-[11px] mt-3 uppercase tracking-[0.35em]">
                Full Keyword • Smart Genre Guess • Dedup • Best Match
            </p>
        </header>

        <div class="mb-5 flex flex-col gap-4 items-center">
            <input id="searchBox" type="text" placeholder="Tìm theo tên hàm / type / RVA..."
                class="w-full max-w-3xl bg-slate-900 border border-slate-700 text-white px-5 py-4 rounded-2xl outline-none focus:border-emerald-500" />

            <div class="flex flex-wrap gap-3 justify-center">
                <button id="exportJsonBtn" class="hex-btn !w-auto px-5 py-3 rounded-2xl">Export JSON</button>
                <button id="exportMdBtn" class="hex-btn !w-auto px-5 py-3 rounded-2xl">Export MD</button>
                <button id="clearBtn" class="bg-slate-800 text-slate-200 font-black px-5 py-3 rounded-2xl border border-slate-700 hover:border-emerald-500 transition">Clear</button>
            </div>
        </div>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[2rem] md:rounded-[3rem] p-8 md:p-14 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-7 transition-all">
            <p class="text-lg md:text-2xl text-slate-400 font-black uppercase italic tracking-widest text-center">
                THẢ <span class="text-emerald-500 underline uppercase italic">DUMP.CS</span> HOẶC BẤM ĐỂ CHỌN
            </p>
            <p class="text-slate-600 text-xs font-bold uppercase tracking-[0.3em] mt-3">
                Hỗ trợ .cs / .txt
            </p>
        </div>

        <div id="profileArea" class="text-left"></div>
        <div id="statsBar" class="mb-7 text-slate-400 text-sm font-bold"></div>
        <div id="resultsArea" class="space-y-8 text-left"></div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-emerald-500 text-black font-black px-5 py-3 rounded-xl opacity-0 pointer-events-none transition-all duration-300 z-50">
        Đã copy
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');
        const profileArea = document.getElementById('profileArea');
        const searchBox = document.getElementById('searchBox');
        const statsBar = document.getElementById('statsBar');
        const toast = document.getElementById('toast');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const exportMdBtn = document.getElementById('exportMdBtn');
        const clearBtn = document.getElementById('clearBtn');

        let lastRenderedData = {};
        let lastRawMethods = [];
        let lastMatchedMethods = [];
        let lastProfile = null;

        const hexLibrary = {
            int: [
                { val: '1.000.000', hex: '00488852E001A072C0035FD6' },
                { val: '10.000', hex: '00E28452C0035FD6' },
                { val: '100', hex: '800C8052C0035FD6' },
                { val: '10', hex: '40018052C0035FD6' },
                { val: '1', hex: '20008052C0035FD6' },
                { val: '0', hex: '00008052C0035FD6' },
                { val: '-1', hex: '00008012C0035FD6' }
            ],
            float: [
                { val: '1.000.000', hex: '08808452882EA9720001271EC0035FD6' },
                { val: '10.000', hex: '0800885288C3A8720001271EC0035FD6' },
                { val: '100', hex: '0859A8520001271EC0035FD6' },
                { val: '10', hex: '0090241EC0035FD6' },
                { val: '1', hex: '00102E1EC0035FD6' },
                { val: '0.25', hex: '00102A1EC0035FD6' },
                { val: '0', hex: 'E003271EC0035FD6' }
            ],
            bool: [
                { val: 'TRUE', hex: '20008052C0035FD6' },
                { val: 'FALSE', hex: '00008052C0035FD6' }
            ],
            void: [
                { val: 'RET', hex: 'C0035FD6' }
            ]
        };

        const config = [
            {
                id: 'currency',
                label: '💰 CURRENCY / TÀI NGUYÊN (INT)',
                keys: ['currency','resource','gold','coin','money','cash','credit','token','point','points','score','wallet','balance','diamond','gem','ruby','emerald','crystal','crystals','star','stars','coupon','ticket','voucher','medal','medals'],
                type: 'int',
                genres: ['idle','rpg','gacha','card','sim']
            },
            {
                id: 'stats',
                label: '❤️ HP / MP / NĂNG LƯỢNG (INT)',
                keys: ['hp','health','life','maxhp','maxhealth','mp','mana','energy','stamina','rage','power','shield','armor'],
                type: 'int',
                genres: ['rpg','moba','shooter','survival']
            },
            {
                id: 'combat',
                label: '⚔️ DAMAGE / SPEED (FLOAT ONLY)',
                keys: ['damage','attack','atk','power','hit','speed','movespeed','runspeed','attackspeed','multiplier','rate','ratio','critical','crit','critdamage','critrate','received','takendamage'],
                type: 'float',
                genres: ['rpg','moba','shooter','runner','survival']
            },
            {
                id: 'cooldown',
                label: '⏱️ COOLDOWN / DELAY (FLOAT ONLY)',
                keys: ['cooldown','cd','delay','interval','reuse','reusetime','cooldowntime','skillcooldown','attackcooldown','abilitycooldown','casttime','waittime','reload','reloadtime'],
                type: 'float',
                single: false,
                genres: ['rpg','moba','shooter']
            },
            {
                id: 'vip',
                label: '🛒 VIP / UNLOCK (BOOL)',
                keys: ['vip','premium','pro','unlocked','unlock','ispurchased','purchased','owned','hasitem','isowned','isvip','ispro'],
                type: 'bool',
                genres: ['idle','gacha','card','sim']
            },
            {
                id: 'action',
                label: '🚫 ACTION (VOID)',
                keys: ['takedamage','damage','hurt','spend','use','consume','cost','pay','deduct','add','remove','give','reward'],
                type: 'void',
                genres: ['rpg','shooter','survival','idle']
            },
            {
                id: 'safety',
                label: '🛡️ CHECK / VERIFY (BOOL)',
                keys: ['banned','ban','isbanned','detect','detected','check','verify','validation','security','anticheat','cheat','isvalid','valid'],
                type: 'bool',
                single: false,
                genres: ['rpg','moba','shooter','idle','gacha','card','sim','survival']
            }
        ];

        const genreProfiles = [
            {
                id: 'shooter',
                label: 'Shooter / bắn súng',
                keys: ['ammo','bullet','reload','reloadtime','weapon','gun','fire','shoot','crosshair','recoil','magazine'],
                preferredGroups: ['combat','cooldown','stats','action']
            },
            {
                id: 'rpg',
                label: 'RPG / nhập vai',
                keys: ['skill','spell','mana','hp','health','damage','quest','level','exp','boss','inventory'],
                preferredGroups: ['stats','combat','cooldown','currency','action']
            },
            {
                id: 'moba',
                label: 'MOBA / skill combat',
                keys: ['hero','skill','cooldown','mana','ability','tower','creep','lane'],
                preferredGroups: ['cooldown','combat','stats']
            },
            {
                id: 'idle',
                label: 'Idle / clicker / afk',
                keys: ['idle','offline','reward','income','profit','earn','coin','cash','vip'],
                preferredGroups: ['currency','vip','action']
            },
            {
                id: 'gacha',
                label: 'Gacha / summon',
                keys: ['summon','gacha','draw','pull','banner','ticket','shard','star','rarity'],
                preferredGroups: ['currency','vip']
            },
            {
                id: 'card',
                label: 'Card / strategy',
                keys: ['card','deck','energy','mana','cost','turn','draw','rarity'],
                preferredGroups: ['currency','stats','vip']
            },
            {
                id: 'survival',
                label: 'Survival / sandbox',
                keys: ['hunger','thirst','stamina','health','craft','survive','armor','damage'],
                preferredGroups: ['stats','combat','action','currency']
            },
            {
                id: 'runner',
                label: 'Runner / endless',
                keys: ['run','runner','speed','jump','distance','coin','score'],
                preferredGroups: ['combat','currency']
            }
        ];

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 1500);
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function safeId(value) {
            return String(value).replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        function chunkHex(hex) {
            return String(hex || '').match(/.{1,8}/g) || [];
        }

        function typeLabel(type) {
            const t = String(type || '').toLowerCase();
            if (t === 'int' || t === 'int32') return 'số nguyên';
            if (t === 'float') return 'số thực';
            if (t === 'bool' || t === 'boolean') return 'đúng / sai';
            if (t === 'void') return 'không trả về giá trị';
            return String(type || 'không rõ');
        }

        function normalizeName(name) {
            return String(name || '')
                .toLowerCase()
                .replace(/^(get_|set_|is_|has_|get|set|is|has)/, '')
                .replace(/_/g, '')
                .replace(/(value|data|info|state)$/g, '');
        }

        function inferGameProfile(raw) {
            const haystack = raw.map(x => (x.name + ' ' + x.type + ' ' + x.args)).join(' ').toLowerCase();
            const scores = genreProfiles.map(profile => {
                let score = 0;
                for (const key of profile.keys) {
                    const count = haystack.split(key).length - 1;
                    score += count * 4;
                }
                return { ...profile, score };
            }).sort((a, b) => b.score - a.score);

            const top = scores[0];
            const confidence = top ? Math.min(95, 25 + top.score * 2) : 0;
            return {
                primary: top && top.score > 0 ? top.id : 'generic',
                primaryLabel: top && top.score > 0 ? top.label : 'Game chung / chưa rõ thể loại',
                confidence,
                topScores: scores.filter(x => x.score > 0).slice(0, 3),
                preferredGroups: top && top.score > 0 ? top.preferredGroups : ['currency','stats','combat','cooldown','vip','action','safety']
            };
        }

        function getDetailedAnalysis(name, type, item, profile) {
            const n = String(name || '').toLowerCase();
            const tLabel = typeLabel(type);
            const rules = [
                {
                    keys: ['currency','resource','gold','coin','money','cash','credit','token','point','points','score','wallet','balance','diamond','gem','ruby','emerald','crystal','crystals','star','stars','coupon','ticket','voucher','medal','medals'],
                    label: 'Tiền tệ / tài nguyên',
                    what: 'Thường là vàng, coin, gem, kim cương hoặc tài nguyên dùng để mua, đổi hoặc nâng cấp.',
                    use: 'Hay dùng để hiển thị số dư, số lượng tài nguyên hoặc điểm tích lũy.',
                    note: 'Nếu game thiên về idle/gacha thì nhóm này thường rất quan trọng.'
                },
                {
                    keys: ['hp','health','life','maxhp','maxhealth','mp','mana','energy','stamina','rage','shield','armor'],
                    label: 'HP / MP / năng lượng',
                    what: 'Thường là máu, mana, thể lực, giáp hoặc chỉ số sinh tồn.',
                    use: 'Hay xuất hiện ở thanh máu, thanh mana hoặc trạng thái chiến đấu.',
                    note: 'Life có lúc là số mạng; Energy/Stamina có thể là thể lực.'
                },
                {
                    keys: ['damage','attack','atk','power','hit','speed','movespeed','runspeed','attackspeed','multiplier','rate','ratio','critical','crit','critdamage','critrate','received','takendamage'],
                    label: 'Damage / speed',
                    what: 'Thường là sát thương, tốc độ đánh, tốc độ chạy hoặc hệ số chiến đấu.',
                    use: 'Hay dùng trong phần tính damage, crit, tốc độ hoặc hệ số buff/debuff.',
                    note: 'Nếu dump nghiêng về shooter / rpg thì nhóm này thường nằm top ưu tiên.'
                },
                {
                    keys: ['cooldown','cd','delay','interval','reuse','reusetime','cooldowntime','skillcooldown','attackcooldown','abilitycooldown','casttime','waittime','reload','reloadtime'],
                    label: 'Hồi chiêu / delay',
                    what: 'Thường là thời gian chờ giữa các kỹ năng hoặc hành động.',
                    use: 'Hay liên quan tới hồi chiêu skill, cast time, reload time hoặc khoảng chờ giữa 2 lần dùng.',
                    note: 'Nếu dump nghiêng về shooter / moba / rpg thì nhóm này rất đáng xem.'
                },
                {
                    keys: ['vip','premium','pro','unlocked','unlock','ispurchased','purchased','owned','hasitem','isowned','isvip','ispro'],
                    label: 'VIP / unlock',
                    what: 'Thường là kiểm tra đã mở khóa, đã mua hoặc đã sở hữu.',
                    use: 'Dùng để xác định trạng thái đúng/sai của quyền hoặc món đồ.',
                    note: 'Các tên bắt đầu bằng is... hoặc has... thường đáng ưu tiên hơn.'
                },
                {
                    keys: ['banned','ban','isbanned','detect','detected','check','verify','validation','security','anticheat','cheat','isvalid','valid'],
                    label: 'Check / verify',
                    what: 'Thường là hàm kiểm tra điều kiện hoặc xác minh trạng thái.',
                    use: 'Có thể là check logic bình thường hoặc xác thực nội bộ.',
                    note: 'Nhóm này dễ trúng rộng nên chỉ nên xem tên rõ nghĩa.'
                },
                {
                    keys: ['takedamage','damage','hurt','spend','use','consume','cost','pay','deduct','add','remove','give','reward'],
                    label: 'Action',
                    what: 'Thường là hàm xử lý hành động như dùng vật phẩm, trừ tài nguyên hoặc cộng thưởng.',
                    use: 'Thiên về xử lý logic thực thi hơn là chỉ đọc dữ liệu.',
                    note: 'Nếu return là void thì đây thường là hàm hành động.'
                }
            ];

            let matched = null;
            for (const rule of rules) {
                if (rule.keys.some(k => n.includes(k))) {
                    matched = rule;
                    break;
                }
            }

            const profileText = profile && profile.primaryLabel ? profile.primaryLabel : 'chưa rõ';
            if (!matched) {
                return `
                    <div class="analysis-head">🎯 Phân tích nhanh</div>
                    <div class="analysis-mini">
                        <div><b>Là gì:</b> Chưa đủ từ khóa để xếp nhóm rõ ràng.</div>
                        <div><b>Dùng làm gì:</b> Có thể là hàm lấy dữ liệu hoặc kiểm tra trạng thái.</div>
                        <div><b>Lưu ý:</b> Kiểu trả về là <b>${escapeHtml(tLabel)}</b>. Rank hiện tại <b>#${item.rankIndex}</b>, score <b>${item.rankScore}</b>. Thể loại đoán được: <b>${escapeHtml(profileText)}</b>.</div>
                    </div>
                `;
            }

            return `
                <div class="analysis-head">🎯 Phân tích nhanh · ${matched.label}</div>
                <div class="analysis-mini">
                    <div><b>Là gì:</b> ${matched.what}</div>
                    <div><b>Dùng làm gì:</b> ${matched.use}</div>
                    <div><b>Lưu ý:</b> ${matched.note} Kiểu trả về là <b>${escapeHtml(tLabel)}</b>. Rank <b>#${item.rankIndex}</b>, score <b>${item.rankScore}</b>.</div>
                </div>
            `;
        }

        function scoreMethod(method, group, profile) {
            const name = (method.name || '').toLowerCase();
            let score = 0;

            for (const key of group.keys) {
                if (name === 'get_' + key) score += 140;
                else if (name === 'is_' + key || name === 'is' + key) score += 130;
                else if (name === 'has_' + key || name === 'has' + key) score += 120;
                else if (name.startsWith('get_') && name.includes(key)) score += 115;
                else if (name.startsWith('is') && name.includes(key)) score += 108;
                else if (name.startsWith('has') && name.includes(key)) score += 102;
                else if (name.includes('_' + key)) score += 78;
                else if (name.endsWith(key)) score += 72;
                else if (name.includes(key)) score += 58;
            }

            if (method.args === '') score += 18;
            if (method.access === 'public') score += 10;
            if (!method.isStatic) score += 4;

            if (profile && profile.preferredGroups && profile.preferredGroups.includes(group.id)) score += 16;

            if (name.length > 32) score -= 8;
            if (name.includes('tmp') || name.includes('test') || name.includes('debug')) score -= 14;
            if (name.startsWith('set_') || name.startsWith('set')) score -= 40;

            return score;
        }

        function dedupeRanked(ranked) {
            const seen = new Set();
            const out = [];
            for (const item of ranked) {
                const norm = normalizeName(item.name);
                const key = norm + '|' + item.type;
                if (seen.has(key)) continue;
                seen.add(key);
                out.push(item);
            }
            return out;
        }

        function rankCandidates(candidates, group, profile) {
            const ranked = candidates.map(item => {
                const rankScore = scoreMethod(item, group, profile);
                return { ...item, rankScore };
            }).sort((a, b) => {
                if (b.rankScore !== a.rankScore) return b.rankScore - a.rankScore;
                return a.name.localeCompare(b.name);
            });

            const deduped = dedupeRanked(ranked);
            return deduped.map((item, index) => ({
                ...item,
                rankIndex: index + 1,
                isBest: index === 0
            }));
        }

        function renderProfile(profile) {
            if (!profile) {
                profileArea.innerHTML = '';
                return;
            }

            const topScores = profile.topScores.map(x =>
                `<span class="pill">${escapeHtml(x.label)} · ${x.score}</span>`
            ).join(' ');

            const preferred = config
                .filter(g => profile.preferredGroups.includes(g.id))
                .map(g => `<span class="pill">${escapeHtml(g.label)}</span>`)
                .join(' ');

            profileArea.innerHTML = `
                <div class="profile-box">
                    <div class="analysis-head">🧠 Phân tích dump</div>
                    <div class="analysis-mini">
                        <div><b>Dạng game đoán được:</b> ${escapeHtml(profile.primaryLabel)}</div>
                        <div><b>Độ tin cậy:</b> ${profile.confidence}%</div>
                        <div><b>Ưu tiên nhóm:</b> ${preferred || '<span class="pill">Không rõ</span>'}</div>
                        <div><b>Tín hiệu tìm thấy:</b> ${topScores || '<span class="pill">Không đủ dữ liệu</span>'}</div>
                        <div><b>Cách lọc:</b> Tool đang ưu tiên <b>get_</b>, tự <b>rank</b>, tự <b>bỏ hàm trùng</b>, và highlight <b>best match</b> màu đỏ để dễ tìm hơn.</div>
                    </div>
                </div>
            `;
        }

        function downloadTextFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function exportJson() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }
            const payload = {
                version: '50.1 SMART',
                gameProfile: lastProfile,
                totalRawMethods: lastRawMethods.length,
                totalMatchedMethods: lastMatchedMethods.length,
                groups: lastRenderedData
            };
            downloadTextFile('visual-patcher-results.json', JSON.stringify(payload, null, 2), 'application/json');
            showToast('Đã export JSON');
        }

        function exportMarkdown() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }

            let md = '# Visual Patcher v50.1 SMART Report\n\n';
            if (lastProfile) {
                md += `- Game Profile: ${lastProfile.primaryLabel}\n`;
                md += `- Confidence: ${lastProfile.confidence}%\n`;
            }
            md += `- Total raw methods: ${lastRawMethods.length}\n`;
            md += `- Total matched methods: ${lastMatchedMethods.length}\n\n`;

            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items || !items.length) continue;

                md += `## ${group.label}\n\n`;
                for (const item of items) {
                    md += `- **${item.name}()**\n`;
                    md += `  - RVA: ${item.rva}\n`;
                    md += `  - Type: ${item.type}\n`;
                    md += `  - Access: ${item.access || 'public'}\n`;
                    md += `  - Static: ${item.isStatic ? 'Yes' : 'No'}\n`;
                    md += `  - Rank Score: ${item.rankScore}\n`;
                    md += `  - Rank: #${item.rankIndex}\n`;
                    md += `  - Best: ${item.isBest ? 'Yes' : 'No'}\n`;
                }
                md += '\n';
            }

            downloadTextFile('visual-patcher-results.md', md, 'text/markdown;charset=utf-8');
            showToast('Đã export MD');
        }

        function clearAll() {
            lastRenderedData = {};
            lastRawMethods = [];
            lastMatchedMethods = [];
            lastProfile = null;
            searchBox.value = '';
            profileArea.innerHTML = '';
            statsBar.innerHTML = '';
            resultsArea.innerHTML = '';
            showToast('Đã clear');
        }

        function copyText(value, label) {
            navigator.clipboard.writeText(value).then(() => {
                showToast(`Đã copy ${label}`);
            }).catch(() => {
                showToast('Copy thất bại');
            });
        }

        function updateHexDisplay(selectId, displayId, gridId) {
            const select = document.getElementById(selectId);
            const display = document.getElementById(displayId);
            const grid = document.getElementById(gridId);
            if (!select || !display || !grid) return;

            const value = select.value;
            display.innerText = value;

            const parts = chunkHex(value);
            grid.innerHTML = parts.map(p => `<div class="hex-chunk">${escapeHtml(p)}</div>`).join('');
        }

        dropZone.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.cs,.txt';
            input.onchange = e => handleFile(e.target.files[0]);
            input.click();
        };

        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add('drop-active');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('drop-active');
            });
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        searchBox.addEventListener('input', () => {
            filterRendered(searchBox.value.trim().toLowerCase());
        });

        exportJsonBtn.addEventListener('click', exportJson);
        exportMdBtn.addEventListener('click', exportMarkdown);
        clearBtn.addEventListener('click', clearAll);

        function handleFile(file) {
            if (!file) return;
            const fileName = file.name.toLowerCase();
            if (!fileName.endsWith('.cs') && !fileName.endsWith('.txt')) {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        File không hợp lệ. Hãy chọn file .cs hoặc .txt
                    </div>
                `;
                resultsArea.innerHTML = '';
                profileArea.innerHTML = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.onerror = () => {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        Không thể đọc file.
                    </div>
                `;
            };
            reader.readAsText(file);
        }

        function processDump(content) {
            const raw = [];
            const regex = /\/\/\s*RVA:\s*(0x[0-9A-Fa-f]+)[^\n]*\n\s*(public|private|protected|internal)\s+(static\s+)?([\w<>\[\],\.]+)\s+(\w+)\s*\(([^)]*)\)\s*\{\s*\}/g;

            let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({
                    rva: match[1],
                    access: match[2],
                    isStatic: !!match[3],
                    type: match[4],
                    name: match[5],
                    args: (match[6] || '').trim(),
                    nameL: match[5].toLowerCase()
                });
            }

            lastRawMethods = raw;
            lastProfile = inferGameProfile(raw);
            renderProfile(lastProfile);

            if (!raw.length) {
                lastRenderedData = {};
                lastMatchedMethods = [];
                render({}, 0);
                return;
            }

            const results = {};
            const matchedFlat = [];

            config.forEach(group => {
                const candidates = raw.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    const typeOk =
                        (group.type === 'int' && (tL === 'int32' || tL === 'int')) ||
                        (group.type === 'bool' && (tL === 'bool' || tL === 'boolean')) ||
                        (group.type === 'float' && tL === 'float') ||
                        (group.type === 'void' && tL === 'void');

                    return nameOk && typeOk;
                });

                if (candidates.length > 0) {
                    const ranked = rankCandidates(candidates, group, lastProfile);
                    const maxCount = group.single === false ? 8 : 6;
                    results[group.id] = ranked.slice(0, maxCount);
                }
            });

            Object.values(results).forEach(arr => arr.forEach(item => matchedFlat.push(item)));
            lastRenderedData = results;
            lastMatchedMethods = matchedFlat;

            render(results, raw.length);
        }

        function filterRendered(q) {
            if (!q) {
                render(lastRenderedData, lastRawMethods.length);
                return;
            }

            const filtered = {};
            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items) continue;

                const matched = items.filter(item =>
                    item.name.toLowerCase().includes(q) ||
                    item.type.toLowerCase().includes(q) ||
                    item.rva.toLowerCase().includes(q) ||
                    (item.access || '').toLowerCase().includes(q) ||
                    (item.args || '').toLowerCase().includes(q)
                );

                if (matched.length) filtered[group.id] = matched;
            }

            render(filtered, lastRawMethods.length, q);
        }

        function render(data, totalRaw = 0, query = '') {
            resultsArea.innerHTML = '';

            let totalMatched = 0;
            for (const group of config) {
                const items = data[group.id];
                if (items) totalMatched += items.length;
            }

            statsBar.innerHTML = `
                <div class="flex flex-wrap gap-3 justify-center">
                    <div class="stats-chip">Tổng method quét được: <span class="text-emerald-400">${totalRaw}</span></div>
                    <div class="stats-chip">Tổng method sau lọc thông minh: <span class="text-emerald-400">${totalMatched}</span></div>
                    ${query ? `<div class="stats-chip">Search: <span class="text-emerald-400">${escapeHtml(query)}</span></div>` : ''}
                </div>
            `;

            if (!totalRaw) {
                resultsArea.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-6 rounded-3xl text-center font-bold">
                        Không đọc được method nào từ file này.
                    </div>
                `;
                return;
            }

            if (!totalMatched) {
                resultsArea.innerHTML = `
                    <div class="bg-yellow-950/30 border border-yellow-800 text-yellow-300 p-6 rounded-3xl text-center font-bold">
                        Không tìm thấy method phù hợp với rule hiện tại.
                    </div>
                `;
                return;
            }

            for (const group of config) {
                const items = data[group.id];
                if (!items || !items.length) continue;

                const groupId = safeId(group.id);

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5">
                            <h2 class="text-xl md:text-2xl font-black uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">
                                ${group.label}
                            </h2>
                            <div class="text-slate-500 text-sm font-bold">Đã chọn thông minh: ${items.length}</div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="grid-${groupId}">
                            ${items.map(item => {
                                const options = hexLibrary[group.type] || [];
                                const description = getDetailedAnalysis(item.name, item.type, item, lastProfile);
                                const itemKey = safeId(item.rva + '_' + item.name);
                                const selectId = `sel_${itemKey}`;
                                const displayId = `display_${itemKey}`;
                                const gridId = `hexgrid_${itemKey}`;
                                const defaultHex = options[0] ? options[0].hex : '';
                                const chunks = chunkHex(defaultHex);

                                return `
                                <div class="card ${item.isBest ? 'best-card' : ''} p-4 md:p-5 shadow-2xl">
                                    ${item.isBest ? `<div class="best-ribbon">🔥 HÀM CHUẨN NHẤT</div>` : ''}
                                    <span class="type-tag ${group.type}">${escapeHtml(item.type)}</span>

                                    <div class="mb-2 text-[13px] font-black text-white italic uppercase break-all leading-tight ${item.isBest ? 'pt-7' : 'pr-20'}">
                                        ${escapeHtml(item.name)}()
                                    </div>

                                    <div class="flex gap-2 flex-wrap mb-2">
                                        <span class="pill">${escapeHtml(item.access || 'public')}</span>
                                        <span class="pill">${item.isStatic ? 'static' : 'instance'}</span>
                                        <span class="pill">${escapeHtml(item.args ? 'args' : 'no args')}</span>
                                        <span class="rank-pill">RANK #${item.rankIndex}</span>
                                        <span class="rank-pill">SCORE ${item.rankScore}</span>
                                    </div>

                                    <div class="analysis-box">${description}</div>

                                    ${options.length ? `
                                    <div class="mb-1">
                                        <div class="text-[10px] text-slate-500 font-black mb-2 uppercase tracking-[0.18em]">Giá trị mẫu</div>
                                        <select onchange="updateHexDisplay('${selectId}', '${displayId}', '${gridId}')" id="${selectId}" class="hex-select">
                                            ${options.map(o => `<option value="${escapeHtml(o.hex)}">${escapeHtml(o.val)}</option>`).join('')}
                                        </select>

                                        <div class="code-panel">
                                            <div class="code-label">Mã đầy đủ</div>
                                            <div class="hex-display" id="${displayId}">${escapeHtml(defaultHex)}</div>

                                            <div class="code-label mt-3">Mã chia cụm</div>
                                            <div class="hex-grid" id="${gridId}">
                                                ${chunks.map(p => `<div class="hex-chunk">${escapeHtml(p)}</div>`).join('')}
                                            </div>
                                        </div>
                                    </div>` : ''}

                                    <div class="rva-panel">
                                        <div class="code-label">RVA</div>
                                        <span class="rva-val">${escapeHtml(item.rva)}</span>
                                    </div>

                                    <div class="action-row">
                                        <button onclick="copyText('${escapeHtml(item.rva.replace('0x',''))}', 'RVA')" class="ghost-btn">Copy RVA</button>
                                        ${options.length ? `<button onclick="copyText(document.getElementById('${selectId}').value, 'mã hex')" class="hex-btn">Copy Mã Hex</button>` : `<button class="hex-btn" disabled>Không có mã</button>`}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            }
        }
    </script>
</body>
