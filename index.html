    <style>

        body { background: #020617; }
        .group-box { border-radius: 1.2rem; padding: 1rem; margin-bottom: 1rem; background: #0f172a; border: 1px solid #10b981; }
        .card {
            background: linear-gradient(180deg, #020617 0%, #061224 100%);
            border: 1px solid #1e293b;
            border-radius: 1rem;
            transition: 0.22s;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .card:hover { border-color: #10b981; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(16,185,129,0.10); }
        .card.best-card {
            border: 1px solid #ef4444;
            box-shadow: 0 0 0 1px rgba(239,68,68,0.35), 0 12px 30px rgba(239,68,68,0.12);
        }
        .best-ribbon {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(90deg, #dc2626 0%, #ef4444 100%);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            padding: 5px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            z-index: 3;
        }
        .type-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 999px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .int { background: #059669; }
        .bool { background: #d97706; }
        .void { background: #7c3aed; }
        .float { background: #0891b2; }
        .drop-active { border-color: #10b981 !important; transform: scale(1.01); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }
        .pill {
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #111827;
            color: #cbd5e1;
            border: 1px solid #334155;
            font-weight: 800;
        }
        .rank-pill {
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 999px;
            background: #3f0a0a;
            color: #fecaca;
            border: 1px solid #7f1d1d;
            font-weight: 900;
        }
        .stats-chip {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 999px;
            padding: 9px 13px;
            font-weight: 800;
            color: #cbd5e1;
        }
        .profile-box, .controls-box {
            background: linear-gradient(180deg, rgba(59,130,246,0.12) 0%, rgba(59,130,246,0.04) 100%);
            border: 1px solid rgba(59,130,246,0.22);
            border-left: 4px solid #3b82f6;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 18px;
        }
        .controls-box { border-left-color: #10b981; border-color: rgba(16,185,129,0.22); background: linear-gradient(180deg, rgba(16,185,129,0.10) 0%, rgba(16,185,129,0.04) 100%); }
        .analysis-box {
            background: linear-gradient(180deg, rgba(16,185,129,0.10) 0%, rgba(16,185,129,0.04) 100%);
            border: 1px solid rgba(16,185,129,0.22);
            border-left: 4px solid #10b981;
            padding: 12px;
            margin: 14px 0;
            border-radius: 12px;
            font-size: 12px;
            line-height: 1.6;
            color: #ecfeff;
        }
        .analysis-head {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .analysis-mini {
            display: grid;
            gap: 6px;
        }
        .analysis-mini div { color: #dbeafe; }
        .analysis-mini b { color: #ffffff; }
        .analysis-keyline {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed rgba(255,255,255,0.15);
            color: #c7f9cc;
        }
        .hex-select {
            background: #1e293b;
            color: #10b981;
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 11px 12px;
            width: 100%;
            font-weight: 800;
            font-size: 13px;
            outline: none;
        }
        .code-panel {
            margin-top: 10px;
            background: linear-gradient(180deg, #07111f 0%, #020617 100%);
            border: 1px solid #1f3a4f;
            border-radius: 14px;
            padding: 12px;
        }
        .code-label {
            font-size: 10px;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 7px;
        }
        .hex-display {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #34d399;
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            border: 1px solid #1e293b;
            word-break: break-word;
            text-align: left;
            line-height: 1.65;
            min-height: 54px;
        }
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 7px;
            margin-top: 9px;
        }
        .hex-chunk {
            background: #08111d;
            border: 1px solid #17314a;
            color: #67e8f9;
            border-radius: 10px;
            padding: 7px 6px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 700;
        }
        .rva-panel {
            margin-top: 12px;
            background: linear-gradient(180deg, #10161f 0%, #050a12 100%);
            border: 1px solid #1f3a4f;
            border-radius: 14px;
            padding: 12px;
        }
        .rva-val {
            font-family: 'Courier New', monospace;
            color: #fb7185;
            font-size: 1.15rem;
            font-weight: 900;
            background: #000;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #10b981;
            text-align: center;
            display: block;
            word-break: break-all;
            letter-spacing: 0.02em;
        }
        .action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
            margin-top: 10px;
        }
        .hex-btn, .ghost-btn, .tiny-btn {
            font-weight: 900;
            transition: 0.2s;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.03em;
        }
        .hex-btn, .ghost-btn { width: 100%; padding: 12px; }
        .tiny-btn { padding: 10px 12px; }
        .hex-btn { background: #10b981; color: #000; }
        .ghost-btn { background: #0f172a; color: #d1fae5; border: 1px solid #24556c; }
        .tiny-btn { background: #0f172a; color: #d1fae5; border: 1px solid #24556c; }
        .hex-btn:hover, .ghost-btn:hover, .tiny-btn:hover { filter: brightness(1.05); }
        .hex-btn:active, .ghost-btn:active, .tiny-btn:active { transform: scale(0.98); }
        .toggle-chip {
            display: inline-flex; align-items: center; gap: 8px;
            background: #111827; border: 1px solid #334155; color: #e2e8f0;
            border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 800;
        }
        .toggle-chip input { accent-color: #10b981; }
        @media (max-width: 768px) {
            .group-box { padding: 0.9rem; border-radius: 1.1rem; }
            .action-row { grid-template-columns: 1fr; }
            .rva-val { font-size: 1.02rem; }
        }
    </style>
</head>

        function escapeHtml(text) {
            return String(text ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function safeId(value) { return String(value).replace(/[^a-zA-Z0-9_-]/g, '_'); }
        function chunkHex(hex) { return String(hex || '').match(/.{1,8}/g) || []; }

        function typeLabel(type) {
            const t = String(type || '').toLowerCase();
            if (t === 'int' || t === 'int32') return 'số nguyên';
            if (t === 'float') return 'số thực';
            if (t === 'bool' || t === 'boolean') return 'đúng / sai';
            if (t === 'void') return 'không trả về giá trị';
            return String(type || 'không rõ');
        }

        function splitMethodWords(name) {
            return String(name || '')
                .replace(/([a-z])([A-Z])/g, '$1 $2')
                .replace(/_/g, ' ')
                .toLowerCase()
                .split(/\s+/)
                .filter(Boolean);
        }

        function isSetter(name) {
            const n = String(name || '').toLowerCase();
            return n.startsWith('set_') || n.startsWith('set');
        }

        function normalizeName(name) {
            return String(name || '')
                .toLowerCase()
                .replace(/^(get_|set_|is_|has_|can_|on_|update_|get|set|is|has|can|on|update)/, '')
                .replace(/_/g, '')
                .replace(/(value|data|info|state)$/g, '');
        }

        function matchKeyScore(name, key) {
            if (isSetter(name)) return 0;
            const words = splitMethodWords(name);
            const n = String(name || '').toLowerCase();
            const k = String(key || '').toLowerCase();

            if (n === 'get_' + k || n === 'get' + k) return 300;
            if (n === 'is_' + k || n === 'is' + k) return 280;
            if (n === 'has_' + k || n === 'has' + k) return 260;
            if (n === 'can_' + k || n === 'can' + k) return 250;
            if (n === 'on_' + k || n === 'on' + k) return 240;
            if (n === 'update_' + k || n === 'update' + k) return 235;

            if ((n.startsWith('get_') || n.startsWith('get')) && words.includes(k)) return 220;
            if ((n.startsWith('is_') || n.startsWith('is') || n.startsWith('has_') || n.startsWith('has') || n.startsWith('can_') || n.startsWith('can') || n.startsWith('on_') || n.startsWith('on') || n.startsWith('update_') || n.startsWith('update')) && words.includes(k)) return 200;

            if (words.includes(k)) return 120;
            return 0;
        }

        function inferGameProfile(raw) {
            const haystack = raw.map(x => (x.name + ' ' + x.type + ' ' + x.args)).join(' ').toLowerCase();
            const scores = genreProfiles.map(profile => {
                let score = 0;
                for (const key of profile.keys) score += (haystack.split(key).length - 1) * 4;
                return { ...profile, score };
            }).sort((a, b) => b.score - a.score);

            const top = scores[0];
            const confidence = top ? Math.min(95, 25 + top.score * 2) : 0;
            return {
                primary: top && top.score > 0 ? top.id : 'generic',
                primaryLabel: top && top.score > 0 ? top.label : 'Game chung / chưa rõ thể loại',
                confidence,
                topScores: scores.filter(x => x.score > 0).slice(0, 3),
                preferredGroups: top && top.score > 0 ? top.preferredGroups : config.map(g => g.id)
            };
        }

        function scoreMethod(method, group, profile) {
            const name = (method.name || '').toLowerCase();
            let bestKeyScore = 0;
            let bestKey = '';
            for (const key of group.keys) {
                const s = matchKeyScore(name, key);
                if (s > bestKeyScore) {
                    bestKeyScore = s;
                    bestKey = key;
                }
            }
            if (bestKeyScore <= 0) return { score: 0, key: '' };

            let score = bestKeyScore;
            if (method.args === '') score += 18;
            if (method.access === 'public') score += 10;
            if (!method.isStatic) score += 4;
            if (profile && profile.preferredGroups && profile.preferredGroups.includes(group.id)) score += 22;
            if (name.length > 32) score -= 8;
            if (name.includes('tmp') || name.includes('test') || name.includes('debug')) score -= 14;
            if (isSetter(name)) score -= 1000;
            return { score, key: bestKey };
        }

        function dedupeRanked(ranked) {
            const seen = new Set();
            const out = [];
            for (const item of ranked) {
                const key = normalizeName(item.name) + '|' + item.type;
                if (seen.has(key)) continue;
                seen.add(key);
                out.push(item);
            }
            return out;
        }

        function rankCandidates(candidates, group, profile) {
            const ranked = candidates
                .map(item => {
                    const result = scoreMethod(item, group, profile);
                    return { ...item, rankScore: result.score, matchedKey: result.key };
                })
                .filter(item => item.rankScore > 0)
                .sort((a, b) => b.rankScore - a.rankScore || a.name.localeCompare(b.name));
            const deduped = dedupeRanked(ranked);
            return deduped.map((item, index) => ({ ...item, rankIndex: index + 1, isBest: index === 0 }));
        }

                statsBar.innerHTML = `<div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">Không thể đọc file.</div>`;

        function processDump(content) {
            const raw = [];
            const regex = /\/\/\s*RVA:\s*(0x[0-9A-Fa-f]+)[^\n]*\n\s*(public)\s+(static\s+)?([\w<>\[\],\.]+)\s+(\w+)\s*\(([^)]*)\)\s*\{\s*\}/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({
                    rva: match[1],
                    access: match[2],
                    isStatic: !!match[3],
                    type: match[4],
                    name: match[5],
                    args: (match[6] || '').trim(),
                    nameL: match[5].toLowerCase()
                });
            }

            lastRawMethods = raw;
            lastProfile = inferGameProfile(raw);
            currentEnabledGroups = new Set(lastProfile.preferredGroups || config.map(g => g.id));
            currentTopLimit = 5;

            renderProfile(lastProfile);
            renderControls();

            if (!raw.length) {
                lastRenderedData = {};
                lastMatchedMethods = [];
                render({}, 0);
                return;
            }

            const results = {};
            const matchedFlat = [];

            for (const group of config) {
                const candidates = raw.filter(m => {
                    const tL = m.type.toLowerCase();
                    const typeOk =
                        (group.type === 'int' && (tL === 'int32' || tL === 'int')) ||
                        (group.type === 'bool' && (tL === 'bool' || tL === 'boolean')) ||
                        (group.type === 'float' && tL === 'float') ||
                        (group.type === 'void' && tL === 'void');
                    if (!typeOk) return false;
                    return group.keys.some(k => matchKeyScore(m.name, k) > 0);
                });

                if (candidates.length > 0) {
                    const ranked = rankCandidates(candidates, group, lastProfile);
                    results[group.id] = ranked;
                    ranked.forEach(x => matchedFlat.push(x));
                }
            }

            lastRenderedData = results;
            lastMatchedMethods = matchedFlat;
            rerenderFromCurrent();
        }

        function render(data, totalRaw = 0, query = '') {
            resultsArea.innerHTML = '';

            let totalMatched = 0;
            for (const group of config) {
                if (!currentEnabledGroups.has(group.id)) continue;
                const items = data[group.id];
                if (!items) continue;
                const visibleItems = query
                    ? items.filter(item => item.name.toLowerCase().includes(query) || item.type.toLowerCase().includes(query) || item.rva.toLowerCase().includes(query) || (item.matchedKey || '').includes(query))
                    : items;
                if (visibleItems.length) totalMatched += visibleItems.length;
            }

            statsBar.innerHTML = `
                <div class="flex flex-wrap gap-3 justify-center">
                    <div class="stats-chip">Tổng method public/public static quét được: <span class="text-emerald-400">${totalRaw}</span></div>
                    <div class="stats-chip">Tổng method sau lọc: <span class="text-emerald-400">${totalMatched}</span></div>
                    <div class="stats-chip">Nhóm đang bật: <span class="text-emerald-400">${currentEnabledGroups.size}</span></div>
                    <div class="stats-chip">Top hiển thị: <span class="text-emerald-400">${currentTopLimit}</span></div>
                    ${query ? `<div class="stats-chip">Search: <span class="text-emerald-400">${escapeHtml(query)}</span></div>` : ''}
                </div>
            `;

            if (!totalRaw) {
                resultsArea.innerHTML = `<div class="bg-red-950/30 border border-red-800 text-red-300 p-6 rounded-3xl text-center font-bold">Không đọc được method public hoặc public static nào từ file này.</div>`;
                return;
            }

            if (!totalMatched) {
                resultsArea.innerHTML = `<div class="bg-yellow-950/30 border border-yellow-800 text-yellow-300 p-6 rounded-3xl text-center font-bold">Không tìm thấy method phù hợp với nhóm đang bật hoặc từ khóa tìm kiếm.</div>`;
                return;
            }

            for (const group of config) {
                if (!currentEnabledGroups.has(group.id)) continue;
                let items = data[group.id];
                if (!items || !items.length) continue;
                if (query) {
                    items = items.filter(item =>
                        item.name.toLowerCase().includes(query) ||
                        item.type.toLowerCase().includes(query) ||
                        item.rva.toLowerCase().includes(query) ||
                        (item.matchedKey || '').includes(query)
                    );
                    if (!items.length) continue;
                }

                const groupId = safeId(group.id);

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5">
                            <h2 class="text-xl md:text-2xl font-black uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">
                                ${group.label}
                            </h2>
                            <div class="text-slate-500 text-sm font-bold">Đang hiện: ${items.length}</div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="grid-${groupId}">
                            ${items.map(item => {
                                const options = hexLibrary[group.type] || [];
                                const itemKey = safeId(item.rva + '_' + item.name);
                                const selectId = `sel_${itemKey}`;
                                const displayId = `display_${itemKey}`;
                                const gridId = `hexgrid_${itemKey}`;
                                const defaultHex = options[0] ? options[0].hex : '';
                                const chunks = chunkHex(defaultHex);

                                return `
                                <div class="card ${item.isBest ? 'best-card' : ''} p-4 md:p-5 shadow-2xl">
                                    ${item.isBest ? `<div class="best-ribbon">🔥 HÀM CHUẨN NHẤT</div>` : ''}
                                    <span class="type-tag ${group.type}">${escapeHtml(item.type)}</span>

                                    <div class="mb-2 text-[13px] font-black text-white italic uppercase break-all leading-tight ${item.isBest ? 'pt-7' : 'pr-20'}">
                                        ${escapeHtml(item.name)}()
                                    </div>

                                    <div class="flex gap-2 flex-wrap mb-2">
                                        <span class="pill">${escapeHtml(item.access || 'public')}</span>
                                        <span class="pill">${item.isStatic ? 'static' : 'instance'}</span>
                                        <span class="pill">${escapeHtml(item.args ? 'args' : 'no args')}</span>
                                        <span class="rank-pill">RANK #${item.rankIndex}</span>
                                        <span class="rank-pill">SCORE ${item.rankScore}</span>
                                    </div>

                                    <div class="analysis-box">${getGroupSummary(group, item)}</div>

                                    ${options.length ? `
                                    <div class="mb-1">
                                        <div class="text-[10px] text-slate-500 font-black mb-2 uppercase tracking-[0.18em]">Giá trị mẫu</div>
                                        <select onchange="updateHexDisplay('${selectId}', '${displayId}', '${gridId}')" id="${selectId}" class="hex-select">
                                            ${options.map(o => `<option value="${escapeHtml(o.hex)}">${escapeHtml(o.val)}</option>`).join('')}
                                        </select>

                                        <div class="code-panel">
                                            <div class="code-label">Mã đầy đủ</div>
                                            <div class="hex-display" id="${displayId}">${escapeHtml(defaultHex)}</div>
                                            <div class="code-label mt-3">Mã chia cụm</div>
                                            <div class="hex-grid" id="${gridId}">
                                                ${chunks.map(p => `<div class="hex-chunk">${escapeHtml(p)}</div>`).join('')}
                                            </div>
                                        </div>
                                    </div>` : ''}

                                    <div class="rva-panel">
                                        <div class="code-label">RVA</div>
                                        <span class="rva-val">${escapeHtml(item.rva)}</span>
                                    </div>

                                    <div class="action-row">
                                        <button onclick="copyText('${escapeHtml(item.rva.replace('0x',''))}', 'RVA')" class="ghost-btn">Copy RVA</button>
                                        ${options.length ? `<button onclick="copyText(document.getElementById('${selectId}').value, 'mã hex')" class="hex-btn">Copy Mã Hex</button>` : `<button class="hex-btn" disabled>Không có mã</button>`}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            }
        }
    </script>
</body>
</html>
