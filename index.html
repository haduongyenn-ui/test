<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v34.0 - Core Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2rem; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1rem; position: relative; transition: 0.3s; }
        .type-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; color: white; text-transform: uppercase; }
        .rva-val { font-family: monospace; color: #f43f5e; font-size: 1.1rem; font-weight: 900; background: #000; padding: 8px; border-radius: 10px; border: 1px solid #312e81; text-align: center; display: block; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; }
        /* Màu sắc chuẩn cho 4 kiểu */
        .int { background: #059669; } .bool { background: #d97706; } 
        .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-10">
            <h1 class="text-6xl font-black text-white italic uppercase italic tracking-tighter">CORE <span class="text-emerald-500">SNIPER</span> v34.0</h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Chỉ Lọc: public int, bool, void, float</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-10 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest text-center">Thả <span class="text-emerald-500 underline uppercase">dump.cs</span> để lấy mã dứt điểm</p>
        </div>

        <div id="resultsArea" class="space-y-10 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const coreTypes = [
            { id: 'int', label: '💰 NHÓM INT (Tiền, HP, Level)', types: ['Int32', 'int'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'bool', label: '🛡️ NHÓM BOOL (VIP, Unlock, Antiban)', types: ['Boolean', 'bool'], hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'void', label: '🚫 NHÓM VOID (Add, Attack, Use)', types: ['Void', 'void'], hex: "C0 03 5F D6" },
            { id: 'float', label: '⚔️ NHÓM FLOAT (Dame, Speed)', types: ['Single', 'float'], hex: "00 00 C8 42 C0 03 5F D6" }
        ];

        // Các từ khóa quan trọng cần giữ lại
        const keys = ['gold', 'coin', 'diamond', 'gem', 'money', 'hp', 'health', 'mp', 'mana', 'vip', 'premium', 'purchased', 'unlocked', 'damage', 'attack', 'speed', 'cooldown', 'ads', 'isbanned', 'detectcheat'];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let raw = []; let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            coreTypes.forEach(rule => {
                let filtered = raw.filter(m => {
                    const typeMatch = rule.types.some(t => m.type === t);
                    const nameMatch = keys.some(k => m.nameL.includes(k));
                    return typeMatch && nameMatch;
                });
                if (filtered.length > 0) results[rule.id] = filtered.map(m => ({...m, hex: rule.hex}));
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            coreTypes.forEach(rule => {
                const items = data[rule.id];
                if (!items) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-6 uppercase italic tracking-widest text-emerald-500 pl-4 border-l-8 border-emerald-500">${rule.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${items.map(item => `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float'))}">${item.type}</span>
                                    <div class="mb-4">
                                        <div class="text-[11px] font-black text-white break-all leading-tight italic uppercase">${item.name}</div>
                                    </div>
                                    <div class="mb-6">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center">Offset Address (Filza):</div>
                                        <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</span>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800 text-center">
                                        <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Copied Hex!')" 
                                            class="hex-btn w-full py-4 rounded-xl text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                                            Copy Mã Hex Patch
                                        </button>
                                        <div class="text-center text-[9px] text-slate-500 font-mono mt-3 italic">${item.hex}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
