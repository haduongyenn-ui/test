<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyzer v49.2 - Visual Patcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        body { background: #020617; }
        .group-box { border-radius: 2rem; padding: 1.75rem; margin-bottom: 2rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: linear-gradient(180deg, #020617 0%, #041022 100%); border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.25s; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .card:hover { border-color: #10b981; transform: translateY(-3px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.12); }
        .type-tag { position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 999px; color: white; text-transform: uppercase; letter-spacing: 0.08em; }
        .int { background: #059669; }
        .bool { background: #d97706; }
        .void { background: #7c3aed; }
        .float { background: #0891b2; }
        .drop-active { border-color: #10b981 !important; transform: scale(1.01); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }

        .pill { font-size: 10px; padding: 5px 10px; border-radius: 999px; background: #111827; color: #cbd5e1; border: 1px solid #334155; font-weight: 800; }
        .stats-chip { background: #0f172a; border: 1px solid #1e293b; border-radius: 999px; padding: 10px 14px; font-weight: 800; color: #cbd5e1; }

        .analysis-box {
            background: linear-gradient(180deg, rgba(16,185,129,0.10) 0%, rgba(16,185,129,0.04) 100%);
            border: 1px solid rgba(16,185,129,0.22);
            border-left: 4px solid #10b981;
            padding: 14px;
            margin: 16px 0;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.65;
            color: #ecfeff;
        }
        .analysis-title {
            font-size: 13px;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .analysis-row { margin-top: 6px; color: #dbeafe; }
        .analysis-row b { color: #ffffff; }

        .hex-select {
            background: #1e293b;
            color: #10b981;
            border: 1px solid #10b981;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: 800;
            font-size: 13px;
            outline: none;
        }
        .code-panel {
            margin-top: 12px;
            background: linear-gradient(180deg, #07111f 0%, #020617 100%);
            border: 1px solid #1f3a4f;
            border-radius: 16px;
            padding: 14px;
        }
        .code-label {
            font-size: 10px;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 8px;
        }
        .hex-display {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #34d399;
            padding: 14px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #1e293b;
            word-break: break-word;
            text-align: left;
            line-height: 1.7;
            min-height: 62px;
        }
        .hex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .hex-chunk {
            background: #08111d;
            border: 1px solid #17314a;
            color: #67e8f9;
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 700;
        }
        .rva-panel {
            margin-top: 14px;
            background: linear-gradient(180deg, #10161f 0%, #050a12 100%);
            border: 1px solid #1f3a4f;
            border-radius: 16px;
            padding: 14px;
        }
        .rva-val {
            font-family: 'Courier New', monospace;
            color: #fb7185;
            font-size: 1.35rem;
            font-weight: 900;
            background: #000;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #10b981;
            text-align: center;
            display: block;
            cursor: pointer;
            word-break: break-all;
            letter-spacing: 0.02em;
        }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .hex-btn {
            background: #10b981;
            color: #000;
            font-weight: 900;
            transition: 0.2s;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            text-transform: uppercase;
            margin-top: 10px;
            font-size: 13px;
            letter-spacing: 0.03em;
        }
        .hex-btn:hover { filter: brightness(1.05); }
        .hex-btn:active { transform: scale(0.98); }
        .ghost-btn {
            background: #0f172a;
            color: #d1fae5;
            border: 1px solid #24556c;
            font-weight: 900;
            transition: 0.2s;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            text-transform: uppercase;
            margin-top: 10px;
            font-size: 13px;
            letter-spacing: 0.03em;
        }

        @media (max-width: 768px) {
            .group-box { padding: 1.2rem; border-radius: 1.5rem; }
            .action-row { grid-template-columns: 1fr; }
            .rva-val { font-size: 1.15rem; }
        }
    </style>
</head>
<body class="text-slate-300 p-4 md:p-8 font-sans">
    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-8">
            <h1 class="text-4xl md:text-7xl font-black text-white italic uppercase tracking-tighter">
                VISUAL PATCHER <span class="text-emerald-500">v49.2</span>
            </h1>
            <p class="text-slate-500 font-bold text-[11px] mt-4 uppercase tracking-[0.35em]">
                Analyzer • Search • Export • Better Readability
            </p>
        </header>

        <div class="mb-6 flex flex-col gap-4 items-center">
            <input id="searchBox" type="text" placeholder="Tìm theo tên hàm / type / RVA..."
                class="w-full max-w-3xl bg-slate-900 border border-slate-700 text-white px-5 py-4 rounded-2xl outline-none focus:border-emerald-500" />

            <div class="flex flex-wrap gap-3 justify-center">
                <button id="exportJsonBtn" class="hex-btn !w-auto !mt-0 px-5 py-3 rounded-2xl">Export JSON</button>
                <button id="exportMdBtn" class="hex-btn !w-auto !mt-0 px-5 py-3 rounded-2xl">Export MD</button>
                <button id="clearBtn" class="bg-slate-800 text-slate-200 font-black px-5 py-3 rounded-2xl border border-slate-700 hover:border-emerald-500 transition">Clear</button>
            </div>
        </div>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[2.5rem] md:rounded-[3.5rem] p-10 md:p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-8 transition-all">
            <p class="text-lg md:text-2xl text-slate-400 font-black uppercase italic tracking-widest text-center">
                THẢ <span class="text-emerald-500 underline uppercase italic">DUMP.CS</span> HOẶC BẤM ĐỂ CHỌN
            </p>
            <p class="text-slate-600 text-xs font-bold uppercase tracking-[0.3em] mt-4">
                Hỗ trợ .cs / .txt
            </p>
        </div>

        <div id="statsBar" class="mb-8 text-slate-400 text-sm font-bold"></div>
        <div id="resultsArea" class="space-y-10 text-left"></div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-emerald-500 text-black font-black px-5 py-3 rounded-xl opacity-0 pointer-events-none transition-all duration-300 z-50">
        Đã copy
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');
        const searchBox = document.getElementById('searchBox');
        const statsBar = document.getElementById('statsBar');
        const toast = document.getElementById('toast');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const exportMdBtn = document.getElementById('exportMdBtn');
        const clearBtn = document.getElementById('clearBtn');

        let lastRenderedData = {};
        let lastRawMethods = [];
        let lastMatchedMethods = [];

        const hexLibrary = {
            int: [
                { val: '1.000.000', hex: '00488852E001A072C0035FD6' },
                { val: '10.000', hex: '00E28452C0035FD6' },
                { val: '100', hex: '800C8052C0035FD6' },
                { val: '10', hex: '40018052C0035FD6' },
                { val: '1', hex: '20008052C0035FD6' },
                { val: '0', hex: '00008052C0035FD6' },
                { val: '-1', hex: '00008012C0035FD6' }
            ],
            float: [
                { val: '1.000.000', hex: '08808452882EA9720001271EC0035FD6' },
                { val: '10.000', hex: '0800885288C3A8720001271EC0035FD6' },
                { val: '100', hex: '0859A8520001271EC0035FD6' },
                { val: '10', hex: '0090241EC0035FD6' },
                { val: '1', hex: '00102E1EC0035FD6' },
                { val: '0.25', hex: '00102A1EC0035FD6' },
                { val: '0', hex: 'E003271EC0035FD6' }
            ],
            bool: [
                { val: 'TRUE', hex: '20008052C0035FD6' },
                { val: 'FALSE', hex: '00008052C0035FD6' }
            ],
            void: [
                { val: 'RET', hex: 'C0035FD6' }
            ]
        };

        const config = [
            { id: 'money', label: '💰 NHÓM TÀI NGUYÊN (INT)', keys: ['gold', 'coin', 'diamond', 'gem', 'money'], type: 'int' },
            { id: 'stats', label: '❤️ NHÓM SINH TỒN (INT)', keys: ['hp', 'health', 'life', 'mp', 'mana', 'energy'], type: 'int' },
            { id: 'combat', label: '⚔️ CHIẾN ĐẤU / TỐC ĐỘ (FLOAT)', keys: ['damage', 'attack', 'speed', 'multiplier', 'received', 'move'], type: 'float' },
            { id: 'vip', label: '🛒 MỞ KHÓA / ĐẶC QUYỀN (BOOL)', keys: ['vip', 'premium', 'unlocked', 'ispurchased', 'owned'], type: 'bool' },
            { id: 'action', label: '🚫 HÀNH ĐỘNG / XỬ LÝ (VOID)', keys: ['takedamage', 'spend', 'use', 'consume', 'cost'], type: 'void' },
            { id: 'safety', label: '🛡️ KIỂM TRA / XÁC MINH (BOOL)', keys: ['banned', 'detect', 'check', 'verify', 'security'], type: 'bool', single: false }
        ];

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 1500);
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function safeId(value) {
            return String(value).replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        function chunkHex(hex) {
            return String(hex || '').match(/.{1,8}/g) || [];
        }

        function typeLabel(type) {
            const t = String(type || '').toLowerCase();
            if (t === 'int' || t === 'int32') return 'số nguyên';
            if (t === 'float' || t === 'single') return 'số thực';
            if (t === 'bool' || t === 'boolean') return 'đúng / sai';
            if (t === 'void') return 'không trả về giá trị';
            return String(type || 'không rõ');
        }

        function getDetailedAnalysis(name, type) {
            const n = String(name || '').toLowerCase();
            const tLabel = typeLabel(type);

            const rules = [
                {
                    keys: ['gold', 'coin', 'money'],
                    title: 'Tài nguyên thường',
                    easy: 'Tên hàm này thường liên quan tới vàng, coin hoặc tiền cơ bản trong game.',
                    use: 'Nó thường dùng để đọc ra số lượng tài nguyên đang có.',
                    hint: 'Các tên như get_Gold, get_Coin, get_Money thường là các tên dễ hiểu nhất.'
                },
                {
                    keys: ['diamond', 'gem'],
                    title: 'Tài nguyên hiếm',
                    easy: 'Tên hàm này thường liên quan tới kim cương, gem hoặc tiền tệ cao cấp.',
                    use: 'Nhóm này thường gắn với shop, vật phẩm hiếm hoặc tính năng premium.',
                    hint: 'Nếu cùng có nhiều kết quả, ưu tiên tên ngắn và rõ nghĩa hơn.'
                },
                {
                    keys: ['hp', 'health', 'life'],
                    title: 'Máu / sinh tồn',
                    easy: 'Tên hàm này thường liên quan tới máu, lượng sống hoặc trạng thái sinh tồn.',
                    use: 'Nó thường tham gia vào phần hiển thị máu, tính toán sống/chết hoặc thông tin nhân vật.',
                    hint: 'Health thường là máu hiện tại hoặc máu tối đa; Life đôi khi là số mạng.'
                },
                {
                    keys: ['mp', 'mana', 'energy'],
                    title: 'Mana / năng lượng',
                    easy: 'Tên hàm này thường liên quan tới mana, stamina hoặc năng lượng dùng cho kỹ năng.',
                    use: 'Nó hay xuất hiện ở phần dùng skill, phép, hành động tiêu hao năng lượng.',
                    hint: 'Energy đôi khi không phải mana mà là thanh hành động hoặc thể lực.'
                },
                {
                    keys: ['damage', 'attack', 'atk'],
                    title: 'Sát thương / tấn công',
                    easy: 'Tên hàm này thường liên quan tới chỉ số tấn công hoặc lượng sát thương.',
                    use: 'Nó có thể là số damage cơ bản, hệ số damage hoặc thông số chiến đấu.',
                    hint: 'Attack và Damage thường là nhóm dễ nhận diện khi đọc dump.'
                },
                {
                    keys: ['speed', 'move', 'runspeed'],
                    title: 'Tốc độ',
                    easy: 'Tên hàm này thường liên quan tới tốc độ di chuyển hoặc tốc độ xử lý.',
                    use: 'Nó có thể tham gia vào chạy, di chuyển, animation hoặc tốc độ hành động.',
                    hint: 'Không phải Speed nào cũng là tốc độ chạy; đôi khi là tốc độ tổng quát.'
                },
                {
                    keys: ['received', 'taken', 'takedamage', 'hurt'],
                    title: 'Sát thương nhận vào',
                    easy: 'Tên hàm này thường liên quan tới việc nhân vật bị đánh hoặc nhận sát thương.',
                    use: 'Nó có thể nằm trong phần trừ máu, tính phòng thủ hoặc tính toán damage đầu vào.',
                    hint: 'Nếu kiểu trả về là void, nhiều khả năng đây là hàm xử lý hành động.'
                },
                {
                    keys: ['vip', 'premium', 'unlocked', 'ispurchased', 'owned'],
                    title: 'Mở khóa / đặc quyền',
                    easy: 'Tên hàm này thường dùng để kiểm tra đã mở khóa, đã mua hoặc có premium chưa.',
                    use: 'Các hàm bool ở nhóm này thường cho biết trạng thái bật / tắt của một quyền nào đó.',
                    hint: 'Các tên bắt đầu bằng is... thường dễ đọc vì nó giống câu hỏi đúng/sai.'
                },
                {
                    keys: ['banned', 'detect', 'check', 'verify', 'security'],
                    title: 'Kiểm tra / xác minh',
                    easy: 'Tên hàm này thường dùng để kiểm tra điều kiện, xác minh trạng thái hoặc logic nội bộ.',
                    use: 'Nó không phải lúc nào cũng là kiểm tra bảo mật; nhiều khi chỉ là check trạng thái bình thường.',
                    hint: 'Từ check hoặc detect khá chung, nên cần nhìn thêm tên đầy đủ để hiểu đúng.'
                },
                {
                    keys: ['spend', 'use', 'consume', 'cost'],
                    title: 'Tiêu hao / sử dụng',
                    easy: 'Tên hàm này thường liên quan tới việc dùng vật phẩm, trừ tài nguyên hoặc thực hiện hành động.',
                    use: 'Đây thường là hàm xử lý logic thay vì chỉ đơn giản đọc dữ liệu.',
                    hint: 'Nếu kiểu trả về là void thì rất có thể nó đang thực thi một hành động.'
                }
            ];

            let matched = null;
            for (const rule of rules) {
                if (rule.keys.some(k => n.includes(k))) {
                    matched = rule;
                    break;
                }
            }

            if (!matched) {
                return `
                    <div class="analysis-title">🎯 Phân tích dễ hiểu</div>
                    <div class="analysis-row"><b>Nhóm:</b> Chưa xác định rõ</div>
                    <div class="analysis-row"><b>Giải thích ngắn:</b> Hàm này hiện mới được nhận diện theo tên chung, chưa đủ từ khóa để xếp vào nhóm cụ thể.</div>
                    <div class="analysis-row"><b>Kiểu trả về:</b> ${escapeHtml(tLabel)}</div>
                    <div class="analysis-row"><b>Dễ hiểu hơn:</b> Bạn có thể xem đây là một hàm dùng để lấy dữ liệu hoặc kiểm tra trạng thái nào đó.</div>
                    <div class="analysis-row"><b>Lưu ý:</b> Muốn hiểu chính xác hơn thì nên đọc thêm các hàm gần nó trong dump.</div>
                `;
            }

            return `
                <div class="analysis-title">🎯 Phân tích dễ hiểu</div>
                <div class="analysis-row"><b>Nhóm:</b> ${matched.title}</div>
                <div class="analysis-row"><b>Giải thích ngắn:</b> ${matched.easy}</div>
                <div class="analysis-row"><b>Kiểu trả về:</b> ${escapeHtml(tLabel)}</div>
                <div class="analysis-row"><b>Nó thường dùng để làm gì:</b> ${matched.use}</div>
                <div class="analysis-row"><b>Dấu hiệu để nhận biết:</b> ${matched.hint}</div>
            `;
        }

        function downloadTextFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function exportJson() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }
            const payload = {
                version: '49.2',
                totalRawMethods: lastRawMethods.length,
                totalMatchedMethods: lastMatchedMethods.length,
                groups: lastRenderedData
            };
            downloadTextFile('visual-patcher-results.json', JSON.stringify(payload, null, 2), 'application/json');
            showToast('Đã export JSON');
        }

        function exportMarkdown() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }

            let md = '# Visual Patcher v49.2 Report\n\n';
            md += `- Total raw methods: ${lastRawMethods.length}\n`;
            md += `- Total matched methods: ${lastMatchedMethods.length}\n\n`;

            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items || !items.length) continue;

                md += `## ${group.label}\n\n`;
                for (const item of items) {
                    md += `- **${item.name}()**\n`;
                    md += `  - RVA: ${item.rva}\n`;
                    md += `  - Type: ${item.type}\n`;
                    md += `  - Access: ${item.access || 'public'}\n`;
                    md += `  - Static: ${item.isStatic ? 'Yes' : 'No'}\n`;
                    md += `  - Args: ${item.args || '(none)'}\n`;
                }
                md += '\n';
            }

            downloadTextFile('visual-patcher-results.md', md, 'text/markdown;charset=utf-8');
            showToast('Đã export MD');
        }

        function clearAll() {
            lastRenderedData = {};
            lastRawMethods = [];
            lastMatchedMethods = [];
            searchBox.value = '';
            statsBar.innerHTML = '';
            resultsArea.innerHTML = '';
            showToast('Đã clear');
        }

        function copyText(value, label) {
            navigator.clipboard.writeText(value).then(() => {
                showToast(`Đã copy ${label}`);
            }).catch(() => {
                showToast('Copy thất bại');
            });
        }

        function updateHexDisplay(selectId, displayId, gridId) {
            const select = document.getElementById(selectId);
            const display = document.getElementById(displayId);
            const grid = document.getElementById(gridId);
            if (!select || !display || !grid) return;

            const value = select.value;
            display.innerText = value;

            const parts = chunkHex(value);
            grid.innerHTML = parts.map(p => `<div class="hex-chunk">${escapeHtml(p)}</div>`).join('');
        }

        dropZone.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.cs,.txt';
            input.onchange = e => handleFile(e.target.files[0]);
            input.click();
        };

        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add('drop-active');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('drop-active');
            });
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        searchBox.addEventListener('input', () => {
            filterRendered(searchBox.value.trim().toLowerCase());
        });

        exportJsonBtn.addEventListener('click', exportJson);
        exportMdBtn.addEventListener('click', exportMarkdown);
        clearBtn.addEventListener('click', clearAll);

        function handleFile(file) {
            if (!file) return;
            const fileName = file.name.toLowerCase();
            if (!fileName.endsWith('.cs') && !fileName.endsWith('.txt')) {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        File không hợp lệ. Hãy chọn file .cs hoặc .txt
                    </div>
                `;
                resultsArea.innerHTML = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.onerror = () => {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        Không thể đọc file.
                    </div>
                `;
            };
            reader.readAsText(file);
        }

        function processDump(content) {
            const raw = [];
            const regex = /\/\/\s*RVA:\s*(0x[0-9A-Fa-f]+)[^\n]*\n\s*(public|private|protected|internal)\s+(static\s+)?([\w<>\[\],\.]+)\s+(\w+)\s*\(([^)]*)\)\s*\{\s*\}/g;

            let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({
                    rva: match[1],
                    access: match[2],
                    isStatic: !!match[3],
                    type: match[4],
                    name: match[5],
                    args: (match[6] || '').trim(),
                    nameL: match[5].toLowerCase()
                });
            }

            lastRawMethods = raw;

            if (!raw.length) {
                lastRenderedData = {};
                lastMatchedMethods = [];
                render({}, 0);
                return;
            }

            const results = {};
            const matchedFlat = [];

            config.forEach(group => {
                const candidates = raw.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    const typeOk =
                        (group.type === 'int' && (tL === 'int32' || tL === 'int')) ||
                        (group.type === 'bool' && (tL === 'bool' || tL === 'boolean')) ||
                        (group.type === 'float' && (tL === 'single' || tL === 'float')) ||
                        (group.type === 'void' && tL === 'void');

                    return nameOk && typeOk;
                });

                if (candidates.length > 0) {
                    if (group.single === false) {
                        results[group.id] = candidates;
                    } else {
                        const unique = [];
                        group.keys.forEach(k => {
                            let best =
                                candidates.find(c => c.nameL === 'get_' + k || c.nameL === 'is' + k) ||
                                candidates.find(c => c.nameL.includes(k));
                            if (best && !unique.some(u => u.nameL === best.nameL && u.rva === best.rva)) {
                                unique.push(best);
                            }
                        });
                        if (unique.length) results[group.id] = unique;
                    }
                }
            });

            Object.values(results).forEach(arr => arr.forEach(item => matchedFlat.push(item)));
            lastRenderedData = results;
            lastMatchedMethods = matchedFlat;

            render(results, raw.length);
        }

        function filterRendered(q) {
            if (!q) {
                render(lastRenderedData, lastRawMethods.length);
                return;
            }

            const filtered = {};
            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items) continue;

                const matched = items.filter(item =>
                    item.name.toLowerCase().includes(q) ||
                    item.type.toLowerCase().includes(q) ||
                    item.rva.toLowerCase().includes(q) ||
                    (item.access || '').toLowerCase().includes(q) ||
                    (item.args || '').toLowerCase().includes(q)
                );

                if (matched.length) filtered[group.id] = matched;
            }

            render(filtered, lastRawMethods.length, q);
        }

        function render(data, totalRaw = 0, query = '') {
            resultsArea.innerHTML = '';

            let totalMatched = 0;
            for (const group of config) {
                const items = data[group.id];
                if (items) totalMatched += items.length;
            }

            statsBar.innerHTML = `
                <div class="flex flex-wrap gap-3 justify-center">
                    <div class="stats-chip">Tổng method quét được: <span class="text-emerald-400">${totalRaw}</span></div>
                    <div class="stats-chip">Tổng method khớp: <span class="text-emerald-400">${totalMatched}</span></div>
                    ${query ? `<div class="stats-chip">Search: <span class="text-emerald-400">${escapeHtml(query)}</span></div>` : ''}
                </div>
            `;

            if (!totalRaw) {
                resultsArea.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-6 rounded-3xl text-center font-bold">
                        Không đọc được method nào từ file này.
                    </div>
                `;
                return;
            }

            if (!totalMatched) {
                resultsArea.innerHTML = `
                    <div class="bg-yellow-950/30 border border-yellow-800 text-yellow-300 p-6 rounded-3xl text-center font-bold">
                        Không tìm thấy method phù hợp với rule hiện tại.
                    </div>
                `;
                return;
            }

            for (const group of config) {
                const items = data[group.id];
                if (!items || !items.length) continue;

                const groupId = safeId(group.id);

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
                            <h2 class="text-2xl md:text-3xl font-black uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">
                                ${group.label}
                            </h2>
                            <div class="text-slate-500 text-sm font-bold">Số lượng: ${items.length}</div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid-${groupId}">
                            ${items.map(item => {
                                const options = hexLibrary[group.type] || [];
                                const description = getDetailedAnalysis(item.name, item.type);
                                const itemKey = safeId(item.rva + '_' + item.name);
                                const selectId = `sel_${itemKey}`;
                                const displayId = `display_${itemKey}`;
                                const gridId = `hexgrid_${itemKey}`;
                                const defaultHex = options[0] ? options[0].hex : '';
                                const chunks = chunkHex(defaultHex);

                                return `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${group.type}">${escapeHtml(item.type)}</span>

                                    <div class="mb-2 text-[13px] font-black text-white italic uppercase break-all leading-tight pr-20">
                                        ${escapeHtml(item.name)}()
                                    </div>

                                    <div class="flex gap-2 flex-wrap mb-3">
                                        <span class="pill">${escapeHtml(item.access || 'public')}</span>
                                        <span class="pill">${item.isStatic ? 'static' : 'instance'}</span>
                                        <span class="pill">${escapeHtml(item.args ? `args: ${item.args}` : 'no args')}</span>
                                    </div>

                                    <div class="analysis-box">${description}</div>

                                    ${options.length ? `
                                    <div class="mb-2">
                                        <div class="text-[10px] text-slate-500 font-black mb-2 uppercase tracking-[0.18em]">Giá trị mẫu</div>
                                        <select onchange="updateHexDisplay('${selectId}', '${displayId}', '${gridId}')" id="${selectId}" class="hex-select">
                                            ${options.map(o => `<option value="${escapeHtml(o.hex)}">${escapeHtml(o.val)}</option>`).join('')}
                                        </select>

                                        <div class="code-panel">
                                            <div class="code-label">Mã đầy đủ</div>
                                            <div class="hex-display" id="${displayId}">${escapeHtml(defaultHex)}</div>

                                            <div class="code-label mt-3">Hiển thị dễ đọc</div>
                                            <div class="hex-grid" id="${gridId}">
                                                ${chunks.map(p => `<div class="hex-chunk">${escapeHtml(p)}</div>`).join('')}
                                            </div>
                                        </div>
                                    </div>` : ''}

                                    <div class="rva-panel">
                                        <div class="code-label">RVA</div>
                                        <span class="rva-val">${escapeHtml(item.rva)}</span>
                                    </div>

                                    <div class="action-row">
                                        <button onclick="copyText('${escapeHtml(item.rva.replace('0x',''))}', 'RVA')" class="ghost-btn">Copy RVA</button>
                                        ${options.length ? `<button onclick="copyText(document.getElementById('${selectId}').value, 'mã hex')" class="hex-btn">Copy Mã Hex</button>` : `<button class="hex-btn" disabled>Không có mã</button>`}
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            }
        }
    </script>
</body>
</html>
