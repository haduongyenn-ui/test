<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v13.0 - The Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; background: #0f172a; border: 2px solid rgba(255,255,255,0.05); }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.25rem; position: relative; transition: 0.3s; }
        .rva-val { font-family: monospace; color: #f43f5e; font-size: 1.2rem; font-weight: 900; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #312e81; text-align: center; display: block; width: 100%; }
        .hex-hint { font-family: monospace; color: #818cf8; background: rgba(99, 102, 241, 0.1); padding: 6px; border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px dashed #312e81; text-align: center; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1500px] mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black text-white uppercase italic tracking-tighter">SNIPER <span class="text-indigo-500">v13.0</span></h1>
            <p class="text-slate-500 font-bold text-sm mt-3 uppercase tracking-[0.6em]">Chỉ Quét RVA Tỉ Lệ Thành Công Cao Nhất</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-indigo-500 transition-all cursor-pointer mb-12 group">
            <p class="text-2xl text-slate-500 group-hover:text-indigo-400 font-black uppercase italic tracking-widest">Thả file <span class="text-indigo-500 underline">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="space-y-16"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const highSuccessGroups = [
            { id: 'money', label: '💰 NHÓM TIỀN TỆ (VÀNG/KIM CƯƠNG)', color: 'text-yellow-500', keys: ['get_gold', 'get_coin', 'get_diamond', 'get_gem', 'get_ruby'], hex: "00 E1 00 D2 C0 03 5F D6 (999.999)" },
            { id: 'hpmp', label: '❤️ NHÓM HP & MP (BẤT TỬ/VÔ HẠN)', color: 'text-rose-500', keys: ['get_maxhp', 'get_maxhealth', 'get_maxmp', 'get_maxmana', 'takedamage'], hex: "HP/MP: 00 E1 00 D2... | TakeDamage: C0 03 5F D6" },
            { id: 'antiban', label: '🛡️ NHÓM ANTIBAN (BYPASS/BẢO MẬT)', color: 'text-orange-500', keys: ['isbanned', 'detectcheat', 'checkintegrity', 'isjailbroken', 'isroot'], hex: "00 00 80 D2 C0 03 5F D6 (FALSE)" },
            { id: 'iap', label: '🛒 NHÓM IAP (FREE SHOP/VIP)', color: 'text-purple-500', keys: ['isvip', 'ispremium', 'ispurchased', 'isunlocked', 'get_price', 'get_cost'], hex: "20 00 80 D2 C0 03 5F D6 (TRUE)" },
            { id: 'combat', label: '⚔️ NHÓM DAMAGE & HỒI CHIÊU', color: 'text-sky-500', keys: ['get_damagemultiplier', 'get_attackpower', 'get_cooldown', 'get_skilldelay'], hex: "Dame: 00 00 C8 42... | CD: 00 00 20 D2..." },
            { id: 'ads', label: '🚫 NHÓM BỎ ADS (QUẢNG CÁO)', color: 'text-slate-400', keys: ['hasads', 'showads', 'isadavailable'], hex: "00 00 80 D2 C0 03 5F D6 (FALSE)" }
        ];

        // Lọc cực gắt để bỏ hàm rác
        const blacklist = ['compare', 'tostring', 'equals', 'gethashcode', 'gettype', 'clone', 'dispose', 'width', 'height', 'color', 'particle'];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1];
                const type = match[2];
                const name = match[3];
                const nameL = name.toLowerCase();

                if (blacklist.some(b => nameL.includes(b)) || nameL.length < 4) continue;

                highSuccessGroups.forEach(group => {
                    if (group.keys.some(k => nameL === k || (nameL.includes(k) && nameL.startsWith('get_')) || (group.id === 'hpmp' && nameL === 'takedamage'))) {
                        const key = group.id + rva;
                        winners[key] = { rva, name, type, ...group };
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.innerHTML = '';
            highSuccessGroups.forEach(group => {
                const items = data.filter(d => d.id === group.id);
                if (items.length === 0) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest ${group.color}">${group.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                            ${items.map(item => `
                                <div class="card p-6 shadow-2xl flex flex-col justify-between">
                                    <div class="mb-6">
                                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Target Function:</p>
                                        <h3 class="text-[14px] font-black text-white leading-tight break-all">${item.name}</h3>
                                        <span class="text-[9px] text-indigo-400 font-mono">${item.type}</span>
                                    </div>
                                    <div class="mb-6">
                                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 text-center">RVA OFFSET</p>
                                        <span class="rva-val">${item.rva}</span>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800">
                                        <p class="text-[9px] text-indigo-400 font-black mb-2 uppercase text-center">Patch Hex Code:</p>
                                        <div class="hex-hint mb-4">${item.hex}</div>
                                        <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')" class="w-full bg-indigo-600 hover:bg-white hover:text-black text-white font-black py-3 rounded-xl transition-all uppercase text-[10px]">Copy RVA</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
