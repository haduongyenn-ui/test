<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v41.0 - Universal Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .desc-box { background: rgba(16, 185, 129, 0.05); border-left: 4px solid #10b981; padding: 12px; margin: 15px 0; border-radius: 4px; font-size: 12px; line-height: 1.6; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 14px; border-radius: 12px; }
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter">UNIVERSAL <span class="text-emerald-500">TRANSLATOR</span> v41.0</h1>
            <p class="text-slate-500 font-bold text-xs mt-4 uppercase tracking-[0.5em]">Tự Động Phân Tích & Dịch Thuật Mọi Hàm Tử Huyệt</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[4rem] p-20 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-16 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> VÀO ĐỂ DỊCH HÀM</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // HÀM DỊCH THUẬT VÀ PHÂN TÍCH TỰ ĐỘNG
        function translateFunction(name, type) {
            const n = name.toLowerCase();
            const t = type.toLowerCase();
            
            // 1. Phân tích theo từ khóa cụ thể (Từ điển ưu tiên)
            const dictionary = {
                'gold': 'TIỀN VÀNG', 'gem': 'KIM CƯƠNG', 'diamond': 'KIM CƯƠNG', 'coin': 'TIỀN XU',
                'hp': 'MÁU', 'health': 'MÁU', 'mp': 'NĂNG LƯỢNG', 'mana': 'PHÁP LỰC',
                'damage': 'SÁT THƯƠNG', 'attack': 'TẤN CÔNG', 'speed': 'TỐC ĐỘ',
                'multiplier': 'HỆ SỐ NHÂN', 'received': 'NHẬN VÀO', 'persecond': 'MỖI GIÂY',
                'isvip': 'TRẠNG THÁI VIP', 'ispurchased': 'TRẠNG THÁI MUA', 'unlocked': 'MỞ KHÓA'
            };

            let mainSubject = "";
            for (let key in dictionary) {
                if (n.includes(key)) { mainSubject = dictionary[key]; break; }
            }

            // 2. Logic giải thích theo kiểu dữ liệu và cấu trúc hàm
            let actionText = "";
            if (t.includes('int')) {
                actionText = `Khi Patch: Ép chỉ số ${mainSubject || 'này'} lên mức tối đa (999.999).`;
            } else if (t.includes('bool')) {
                if (n.includes('ban') || n.includes('cheat')) {
                    actionText = `Khi Patch (False): Vô hiệu hóa tính năng ${mainSubject || 'kiểm tra'} này để tránh bị phát hiện.`;
                } else {
                    actionText = `Khi Patch (True): Kích hoạt vĩnh viễn tính năng ${mainSubject || 'này'}.`;
                }
            } else if (t.includes('void')) {
                actionText = `Khi Patch (RET): Chặn đứng hành động ${mainSubject || 'này'} (Ví dụ: Chặn bị quái đánh trúng).`;
            } else if (t.includes('float') || t.includes('single')) {
                if (n.includes('received')) {
                    actionText = `Khi Patch (0.0): Giảm hệ số ${mainSubject || 'này'} về 0 để được Bất Tử.`;
                } else {
                    actionText = `Khi Patch (100.0): Nhân hệ số ${mainSubject || 'này'} lên cực đại (Gấp 100 lần).`;
                }
            }

            return `⚡ <b>Công dụng:</b> Điều chỉnh <b>${mainSubject || name}</b>.<br>🎯 <b>Hậu quả:</b> ${actionText}`;
        }

        const catalog = [
            { id: 'all', label: '🚀 DANH SÁCH HÀM TỬ HUYỆT (ĐÃ PHÂN TÍCH)', keys: ['gold', 'coin', 'gem', 'diamond', 'money', 'hp', 'health', 'mp', 'mana', 'vip', 'premium', 'purchased', 'unlocked', 'damage', 'attack', 'speed', 'multiplier', 'persecond', 'takedamage', 'isbanned', 'detectcheat'], type: 'all' }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(\)\s*\{\s*\}/gi;
            let found = []; let match;
            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], type = match[2], name = match[3], nameL = name.toLowerCase();
                const isImportant = catalog[0].keys.some(k => nameL.includes(k));
                const isValidType = ['int32', 'int', 'bool', 'boolean', 'void', 'float', 'single'].some(t => type.toLowerCase() === t);
                
                if (isImportant && isValidType) {
                    found.push({ rva, type, name, analysis: translateFunction(name, type) });
                }
            }
            render(found);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            if (data.length === 0) {
                resultsArea.innerHTML = '<p class="text-center text-rose-500 font-black">KHÔNG TÌM THẤY HÀM NÀO KHỚP VỚI CẤU TRÚC TỬ HUYỆT!</p>';
                return;
            }

            resultsArea.insertAdjacentHTML('beforeend', `
                <div class="group-box">
                    <h2 class="text-3xl font-black mb-10 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">PHÂN TÍCH TẤT CẢ CÁC HÀM TÌM THẤY</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${data.map(item => `
                            <div class="card p-6 shadow-2xl">
                                <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float'))}">${item.type}</span>
                                <div class="mb-4 text-[13px] font-black text-white italic uppercase break-all leading-tight">${item.name}()</div>
                                <div class="desc-box">${item.analysis}</div>
                                <div class="my-6">
                                    <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center italic">Địa chỉ Address Filza:</div>
                                    <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')">${item.rva}</span>
                                </div>
                                <button onclick="navigator.clipboard.writeText('00 E1 00 D2 C0 03 5F D6'); alert('Đã Copy Hex!')" class="hex-btn active:scale-95 text-[10px] uppercase tracking-widest">Copy Hex Patch</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        }
    </script>
</body>
</html>
