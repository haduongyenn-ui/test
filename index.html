<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v23.0 - The Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .judge-container { border-radius: 2.5rem; padding: 2rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .target-card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; border-left: 5px solid #10b981; }
        .target-card:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .hex-fill-btn { background: #10b981; color: #000; font-weight: 900; }
        .rva-final { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #10b981; text-align: center; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1400px] mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter">THE JUDGE <span class="text-emerald-500">v23.0</span></h1>
            <p class="text-slate-500 font-bold text-sm mt-3 uppercase tracking-[0.5em]">Lọc 100 Lấy 1 • Chỉ Gửi RVA Hoạt Động Chính</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-12 transition-all">
            <p class="text-2xl text-slate-400 font-black uppercase italic tracking-widest">Thả file <span class="text-emerald-500 underline uppercase">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="space-y-12 text-center"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // CHỈ ĐỊNH CÁC HÀM "TỬ HUYỆT" CHUẨN NHẤT
        const judgeRules = [
            { id: 'gold', label: 'VÀNG (Gold)', priority: ['get_gold', 'get_coin', 'get_money'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'gem', label: 'KIM CƯƠNG (Gem)', priority: ['get_diamond', 'get_gem', 'get_ruby'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'hp', label: 'MÁU (HP)', priority: ['get_maxhp', 'get_maxhealth'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'mp', label: 'MP', priority: ['get_maxmp', 'get_maxmana'], hex: "00 E1 00 D2 C0 03 5F D6" },
            { id: 'vip', label: 'VIP/PREMIUM', priority: ['isvip', 'ispremium', 'ispurchased'], hex: "20 00 80 D2 C0 03 5F D6" },
            { id: 'antiban', label: 'ANTIBAN', priority: ['isbanned', 'detectcheat'], hex: "00 00 80 D2 C0 03 5F D6" },
            { id: 'ads', label: 'TẮT ADS', priority: ['hasads', 'isadavailable'], hex: "00 00 80 D2 C0 03 5F D6" },
            { id: 'freeshop', label: 'FREE SHOP', priority: ['get_price', 'get_cost'], hex: "00 00 80 D2 C0 03 5F D6" }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let rawMatches = [];
            let match;

            while ((match = regex.exec(content)) !== null) {
                rawMatches.push({ rva: match[1], name: match[3], nameL: match[3].toLowerCase() });
            }

            let finalWinners = [];

            judgeRules.forEach(rule => {
                // Lọc trong 100 RVA để tìm cái chuẩn nhất theo thứ tự ưu tiên
                for (let key of rule.priority) {
                    let found = rawMatches.find(m => m.nameL === key || m.nameL.includes(key));
                    if (found) {
                        finalWinners.push({ ...found, label: rule.label, hex: rule.hex });
                        break; // Đã tìm thấy 1 cái chuẩn nhất thì dừng lại
                    }
                }
            });

            render(finalWinners);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            if (data.length === 0) {
                resultsArea.innerHTML = '<p class="text-rose-500 font-black">KHÔNG TÌM THẤY RVA CHUẨN NÀO TRONG FILE DUMP!</p>';
                return;
            }

            resultsArea.insertAdjacentHTML('beforeend', `
                <div class="judge-container">
                    <h2 class="text-2xl font-black text-emerald-500 mb-8 uppercase italic tracking-widest">--- DANH SÁCH RVA CHUẨN NHẤT ---</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${data.map(item => `
                            <div class="target-card p-6 text-left">
                                <div class="mb-4">
                                    <h3 class="text-xl font-black text-white italic uppercase">${item.label}</h3>
                                    <p class="text-[10px] text-slate-500 font-mono">Hàm xác định: ${item.name}</p>
                                </div>
                                <div class="mb-6">
                                    <div class="text-[9px] text-emerald-400 font-bold mb-2 uppercase">Địa chỉ RVA (Dán vào Filza):</div>
                                    <div class="rva-final cursor-pointer" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')">${item.rva}</div>
                                </div>
                                <div class="pt-4 border-t border-slate-800">
                                    <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Đã Copy Hex!')" 
                                        class="hex-fill-btn w-full py-4 rounded-xl text-xs shadow-lg active:scale-95 transition-all">
                                        COPY MÃ HEX DỨT ĐIỂM
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        }
    </script>
</body>
</html>
