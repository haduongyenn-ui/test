<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v7.5 - Color Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* Style cho từng nhóm màu */
        .group-security { border: 2px solid #a855f7; background: rgba(168, 85, 247, 0.05); }
        .group-resources { border: 2px solid #10b981; background: rgba(16, 185, 129, 0.05); }
        .group-utility { border: 2px solid #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .group-combat { border: 2px solid #f43f5e; background: rgba(244, 63, 94, 0.05); }

        .card { background: #111827; border: 1px solid #374151; transition: 0.3s; }
        .hex-select { background: #000; color: #fbbf24; border: 1px solid #1e293b; font-family: monospace; font-size: 11px; width: 100%; padding: 8px; border-radius: 8px; outline: none; }
        .rva-box { font-family: 'Courier New', monospace; background: #000; color: #f43f5e; border: 1px solid #1e293b; }
        .copy-btn { @apply bg-slate-800 hover:bg-white hover:text-black px-3 py-1 rounded text-[10px] font-bold transition-all; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase italic tracking-tighter">Analyzer <span class="text-indigo-500">v7.5</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-2 uppercase tracking-[0.3em]">Phân Khu Màu Sắc • Đa Tài Nguyên • Bypass & Combat</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-indigo-500 transition-all cursor-pointer mb-12 shadow-2xl">
            <p class="text-xl text-slate-400 font-bold uppercase italic tracking-widest text-center">Thả file <span class="text-indigo-500 underline">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="space-y-10"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const hexLibrary = {
            bool: [
                { name: "TRUE (Bật/Bypass)", hex: "20 00 80 D2 C0 03 5F D6" },
                { name: "FALSE (Tắt/Vô hiệu)", hex: "00 00 80 D2 C0 03 5F D6" }
            ],
            int: [
                { name: "999.999 (Phổ biến)", hex: "00 E1 00 D2 C0 03 5F D6" },
                { name: "50.000 (An toàn)", hex: "00 6D 81 D2 C0 03 5F D6" },
                { name: "MAX (2 Tỷ+)", hex: "FF FF 8F D2 FF FF AF F2 C0 03 5F D6" },
                { name: "0 (Miễn phí)", hex: "00 00 80 D2 C0 03 5F D6" }
            ],
            float: [
                { name: "2.0f (Vừa)", hex: "00 00 A0 40 C0 03 5F D6" },
                { name: "10.0f (Mạnh)", hex: "00 00 20 41 C0 03 5F D6" },
                { name: "0.0f (Hồi chiêu 0s)", hex: "00 00 20 D2 00 00 28 1E C0 03 5F D6" }
            ]
        };

        const groupConfigs = [
            { id: 'security', label: '🛡️ KHU BẢO MẬT (BYPASS)', color: 'text-purple-400', borderClass: 'group-security', keys: ['checkintegrity', 'verifyfile', 'hashcheck', 'ismodified', 'anticheat', 'isbanned', 'jailbreak', 'detecthack'], type: 'bool' },
            { id: 'resources', label: '💰 KHU TÀI NGUYÊN (VÀNG/KIM CƯƠNG)', color: 'text-emerald-400', borderClass: 'group-resources', keys: ['gold', 'money', 'coin', 'gem', 'diamond', 'ruby', 'crystal', 'cash', 'emerald', 'sapphire', 'stone', 'soul', 'token'], type: 'int' },
            { id: 'utility', label: '🛒 KHU TIỆN ÍCH (SHOP/ADS/VIP)', color: 'text-yellow-400', borderClass: 'group-utility', keys: ['get_price', 'get_cost', 'isafford', 'showads', 'hasads', 'isvip', 'ispremium', 'isunlocked'], type: 'bool' },
            { id: 'combat', label: '⚔️ KHU CHIẾN ĐẤU (HP/MP/SPEED)', color: 'text-rose-400', borderClass: 'group-combat', keys: ['hp', 'health', 'mp', 'mana', 'energy', 'speed', 'movespeed', 'atk', 'damage', 'cooldown', 'attackspeed'], type: 'float' }
        ];

        const junk = ['pattern', 'decimal', 'separator', 'symbol', 'culture', 'format', 'digits', 'group', 'negative', 'positive'];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+((?:get_|is_|check_|verify_|show_)\w+)\(\)/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], name = match[2], nameLower = name.toLowerCase();
                if (junk.some(j => nameLower.includes(j)) || name.length > 32) continue;

                groupConfigs.forEach(group => {
                    if (group.keys.some(k => nameLower.includes(k))) {
                        const finalId = group.id === 'resources' ? 'res_' + nameLower : group.id;
                        if (!winners[finalId] || name.length < winners[finalId].name.length) {
                            winners[finalId] = { rva, name, groupId: group.id };
                        }
                    }
                });
            }
            renderGroups(Object.values(winners));
        }

        function renderGroups(data) {
            resultsArea.innerHTML = '';
            groupConfigs.forEach(group => {
                const items = data.filter(d => d.groupId === group.id);
                if (items.length === 0) return;

                const groupHtml = `
                    <div class="p-8 rounded-[2rem] ${group.borderClass} animate-in fade-in slide-in-from-bottom-5 duration-700">
                        <h2 class="text-2xl font-black mb-8 uppercase italic tracking-widest ${group.color}">${group.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${items.map(item => renderCard(item, group)).join('')}
                        </div>
                    </div>
                `;
                resultsArea.insertAdjacentHTML('beforeend', groupHtml);
            });
        }

        function renderCard(item, group) {
            const options = hexLibrary[group.type];
            return `
                <div class="card rounded-2xl p-5 shadow-2xl flex flex-col justify-between border-t-4 border-slate-700">
                    <div>
                        <h3 class="text-sm font-bold text-white break-all mb-4 italic leading-tight">${item.name}</h3>
                        <div class="mb-4">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">RVA ADDRESS</span>
                                <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')" class="copy-btn">COPY</button>
                            </div>
                            <div class="rva-box p-2 rounded-lg text-[11px] font-bold text-center tracking-widest shadow-inner">${item.rva}</div>
                        </div>
                    </div>
                    <div class="mt-2 border-t border-slate-800 pt-4">
                        <p class="text-[9px] text-slate-600 font-bold mb-2 uppercase italic tracking-widest">Level Hack</p>
                        <select class="hex-select mb-3" onchange="document.getElementById('hex-${item.rva}').innerText = this.value">
                            ${options.map(opt => `<option value="${opt.hex}">${opt.name}</option>`).join('')}
                        </select>
                        <div id="hex-${item.rva}" class="text-[10px] font-mono text-center text-indigo-400 mb-4 font-bold tracking-widest">${options[0].hex}</div>
                        <button onclick="navigator.clipboard.writeText(document.getElementById('hex-${item.rva}').innerText); alert('Copied Hex!')" class="w-full bg-indigo-700 hover:bg-white hover:text-black text-white font-black py-2 rounded-xl transition-all text-[10px] uppercase shadow-lg">SAO CHÉP HEX</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
