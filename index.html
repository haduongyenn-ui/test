<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyzer v49.0 - Visual Patcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        body { background: #020617; }
        .group-box { border-radius: 2.5rem; padding: 2.5rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: #10b981; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.15rem; font-weight: 900; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #10b981; text-align: center; display: block; cursor: pointer; word-break: break-all; }
        .analysis-box { background: rgba(16, 185, 129, 0.08); border-left: 4px solid #10b981; padding: 12px; margin: 15px 0; border-radius: 4px; font-size: 12px; line-height: 1.6; color: #fff; }
        .hex-select { background: #1e293b; color: #10b981; border: 1px solid #10b981; border-radius: 8px; padding: 10px; width: 100%; font-weight: bold; font-size: 12px; outline: none; }
        .hex-display { font-family: 'Courier New', monospace; background: #000; color: #34d399; padding: 10px; border-radius: 8px; font-size: 10px; border: 1px solid #1e293b; margin-top: 8px; word-break: break-all; text-align: center; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 14px; border-radius: 12px; text-transform: uppercase; margin-top: 10px; }
        .hex-btn:hover { filter: brightness(1.05); }
        .hex-btn:active { transform: scale(0.98); }
        .int { background: #059669; }
        .bool { background: #d97706; }
        .void { background: #7c3aed; }
        .float { background: #0891b2; }
        .drop-active { border-color: #10b981 !important; transform: scale(1.01); box-shadow: 0 0 0 4px rgba(16,185,129,0.12); }
        .pill { font-size: 10px; padding: 4px 9px; border-radius: 999px; background: #111827; color: #cbd5e1; border: 1px solid #334155; font-weight: 700; }
        .stats-chip { background: #0f172a; border: 1px solid #1e293b; border-radius: 999px; padding: 10px 14px; font-weight: 800; color: #cbd5e1; }
    </style>
</head>
<body class="text-slate-300 p-6 md:p-8 font-sans">
    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-10">
            <h1 class="text-5xl md:text-7xl font-black text-white italic uppercase tracking-tighter">
                VISUAL PATCHER <span class="text-emerald-500">v49.0</span>
            </h1>
            <p class="text-slate-500 font-bold text-[11px] mt-4 uppercase tracking-[0.45em]">
                Analyzer • Search • Export • Better UX
            </p>
        </header>

        <div class="mb-6 flex flex-col gap-4 items-center">
            <input id="searchBox" type="text" placeholder="Tìm theo tên hàm / type / RVA..."
                class="w-full max-w-3xl bg-slate-900 border border-slate-700 text-white px-5 py-4 rounded-2xl outline-none focus:border-emerald-500" />

            <div class="flex flex-wrap gap-3 justify-center">
                <button id="exportJsonBtn" class="hex-btn !w-auto !mt-0 px-5 py-3 rounded-2xl">Export JSON</button>
                <button id="exportMdBtn" class="hex-btn !w-auto !mt-0 px-5 py-3 rounded-2xl">Export MD</button>
                <button id="clearBtn" class="bg-slate-800 text-slate-200 font-black px-5 py-3 rounded-2xl border border-slate-700 hover:border-emerald-500 transition">Clear</button>
            </div>
        </div>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] md:rounded-[4rem] p-10 md:p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-10 transition-all">
            <p class="text-lg md:text-2xl text-slate-400 font-black uppercase italic tracking-widest text-center">
                THẢ <span class="text-emerald-500 underline uppercase italic">DUMP.CS</span> HOẶC BẤM ĐỂ CHỌN
            </p>
            <p class="text-slate-600 text-xs font-bold uppercase tracking-[0.3em] mt-4">
                Hỗ trợ .cs / .txt
            </p>
        </div>

        <div id="statsBar" class="mb-8 text-slate-400 text-sm font-bold"></div>
        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-emerald-500 text-black font-black px-5 py-3 rounded-xl opacity-0 pointer-events-none transition-all duration-300 z-50">
        Đã copy
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');
        const searchBox = document.getElementById('searchBox');
        const statsBar = document.getElementById('statsBar');
        const toast = document.getElementById('toast');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const exportMdBtn = document.getElementById('exportMdBtn');
        const clearBtn = document.getElementById('clearBtn');

        let lastRenderedData = {};
        let lastRawMethods = [];
        let lastMatchedMethods = [];

        const hexLibrary = {
            int: [
                { val: '1.000.000', hex: '00488852E001A072C0035FD6' },
                { val: '10.000', hex: '00E28452C0035FD6' },
                { val: '100', hex: '800C8052C0035FD6' },
                { val: '10', hex: '40018052C0035FD6' },
                { val: '1', hex: '20008052C0035FD6' },
                { val: '0', hex: '00008052C0035FD6' },
                { val: '-1', hex: '00008012C0035FD6' },
                { val: '-1.000', hex: 'E07C8012C0035FD6' }
            ],
            float: [
                { val: '1.000.000', hex: '08808452882EA9720001271EC0035FD6' },
                { val: '10.000', hex: '0800885288C3A8720001271EC0035FD6' },
                { val: '100', hex: '0859A8520001271EC0035FD6' },
                { val: '10', hex: '0090241EC0035FD6' },
                { val: '1', hex: '00102E1EC0035FD6' },
                { val: '0.25', hex: '00102A1EC0035FD6' },
                { val: '0', hex: 'E003271EC0035FD6' },
                { val: '-1.000', hex: '488FB8520001271EC0035FD6' }
            ],
            bool: [
                { val: 'TRUE (Kích hoạt)', hex: '20008052C0035FD6' },
                { val: 'FALSE (Tắt)', hex: '00008052C0035FD6' }
            ],
            void: [
                { val: 'RET (Bỏ qua hành động)', hex: 'C0035FD6' }
            ]
        };

        const config = [
            { id: 'money', label: '💰 NHÓM TÀI NGUYÊN (INT)', keys: ['gold', 'coin', 'diamond', 'gem', 'money'], type: 'int' },
            { id: 'stats', label: '❤️ NHÓM SINH TỒN (INT)', keys: ['hp', 'health', 'life', 'mp', 'mana'], type: 'int' },
            { id: 'combat', label: '⚔️ SỨC MẠNH & TỐC ĐỘ (FLOAT)', keys: ['damage', 'attack', 'speed', 'multiplier', 'received'], type: 'float' },
            { id: 'vip', label: '🛒 ĐẶC QUYỀN VIP (BOOL)', keys: ['vip', 'premium', 'unlocked', 'ispurchased'], type: 'bool' },
            { id: 'action', label: '🚫 HÀNH ĐỘNG (VOID)', keys: ['takedamage', 'spend', 'use'], type: 'void' },
            { id: 'safety', label: '🛡️ SAFETY / CHECK (BOOL)', keys: ['banned', 'detect', 'check'], type: 'bool', single: false }
        ];

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 1500);
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function safeId(value) {
            return String(value).replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        function getDetailedAnalysis(name, type) {
            const n = String(name || '').toLowerCase();
            const mapping = {
                'gold': 'Getter tài nguyên chính trong game.',
                'gem': 'Getter tài nguyên premium / vật phẩm hiếm.',
                'diamond': 'Getter tài nguyên premium / vật phẩm hiếm.',
                'hp': 'Getter chỉ số máu / sinh tồn.',
                'health': 'Getter chỉ số máu / sinh tồn.',
                'mp': 'Getter chỉ số mana / năng lượng.',
                'mana': 'Getter chỉ số mana / năng lượng.',
                'vip': 'Hàm kiểm tra trạng thái VIP / mở khóa.',
                'premium': 'Hàm kiểm tra đặc quyền premium.',
                'damage': 'Getter hoặc hệ số liên quan tới sát thương.',
                'attack': 'Getter chỉ số tấn công / damage.',
                'speed': 'Getter tốc độ / hệ số di chuyển.',
                'received': 'Giá trị liên quan damage nhận vào.',
                'takedamage': 'Hàm xử lý nhận sát thương / hành động.',
                'spend': 'Hàm xử lý trừ tài nguyên / tiêu hao.',
                'use': 'Hàm xử lý hành động sử dụng vật phẩm / kỹ năng.',
                'isbanned': 'Hàm kiểm tra trạng thái tài khoản / an toàn.',
                'detect': 'Hàm phát hiện hoặc kiểm tra điều kiện nội bộ.',
                'check': 'Hàm xác minh / kiểm tra logic.'
            };
            for (const key in mapping) {
                if (n.includes(key)) return mapping[key];
            }
            return `Phương thức <b>${escapeHtml(name)}</b> có kiểu trả về <b>${escapeHtml(type)}</b>.`;
        }

        function downloadTextFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function exportJson() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }
            const payload = {
                version: '49.0',
                totalRawMethods: lastRawMethods.length,
                totalMatchedMethods: lastMatchedMethods.length,
                groups: lastRenderedData
            };
            downloadTextFile('visual-patcher-results.json', JSON.stringify(payload, null, 2), 'application/json');
            showToast('Đã export JSON');
        }

        function exportMarkdown() {
            if (!lastMatchedMethods.length) {
                showToast('Chưa có dữ liệu để export');
                return;
            }

            let md = '# Visual Patcher v49.0 Report\n\n';
            md += `- Total raw methods: ${lastRawMethods.length}\n`;
            md += `- Total matched methods: ${lastMatchedMethods.length}\n\n`;

            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items || !items.length) continue;

                md += `## ${group.label}\n\n`;
                for (const item of items) {
                    md += `- **${item.name}()**\n`;
                    md += `  - RVA: ${item.rva}\n`;
                    md += `  - Type: ${item.type}\n`;
                    md += `  - Access: ${item.access || 'public'}\n`;
                    md += `  - Static: ${item.isStatic ? 'Yes' : 'No'}\n`;
                    md += `  - Args: ${item.args || '(none)'}\n`;
                }
                md += '\n';
            }

            downloadTextFile('visual-patcher-results.md', md, 'text/markdown;charset=utf-8');
            showToast('Đã export MD');
        }

        function clearAll() {
            lastRenderedData = {};
            lastRawMethods = [];
            lastMatchedMethods = [];
            searchBox.value = '';
            statsBar.innerHTML = '';
            resultsArea.innerHTML = '';
            showToast('Đã clear');
        }

        function copyText(value, label) {
            navigator.clipboard.writeText(value).then(() => {
                showToast(`Đã copy ${label}`);
            }).catch(() => {
                showToast('Copy thất bại');
            });
        }

        function updateHexDisplay(selectId, displayId) {
            const select = document.getElementById(selectId);
            const display = document.getElementById(displayId);
            if (select && display) display.innerText = select.value;
        }

        dropZone.onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.cs,.txt';
            input.onchange = e => handleFile(e.target.files[0]);
            input.click();
        };

        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.add('drop-active');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
                dropZone.classList.remove('drop-active');
            });
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            handleFile(file);
        });

        searchBox.addEventListener('input', () => {
            filterRendered(searchBox.value.trim().toLowerCase());
        });

        exportJsonBtn.addEventListener('click', exportJson);
        exportMdBtn.addEventListener('click', exportMarkdown);
        clearBtn.addEventListener('click', clearAll);

        function handleFile(file) {
            if (!file) return;
            const fileName = file.name.toLowerCase();
            if (!fileName.endsWith('.cs') && !fileName.endsWith('.txt')) {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        File không hợp lệ. Hãy chọn file .cs hoặc .txt
                    </div>
                `;
                resultsArea.innerHTML = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.onerror = () => {
                statsBar.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-4 rounded-2xl text-center font-bold">
                        Không thể đọc file.
                    </div>
                `;
            };
            reader.readAsText(file);
        }

        function processDump(content) {
            const raw = [];
            const regex = /\/\/\s*RVA:\s*(0x[0-9A-Fa-f]+)[^\n]*\n\s*(public|private|protected|internal)\s+(static\s+)?([\w<>\[\],\.]+)\s+(\w+)\s*\(([^)]*)\)\s*\{\s*\}/g;

            let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({
                    rva: match[1],
                    access: match[2],
                    isStatic: !!match[3],
                    type: match[4],
                    name: match[5],
                    args: (match[6] || '').trim(),
                    nameL: match[5].toLowerCase()
                });
            }

            lastRawMethods = raw;

            if (!raw.length) {
                lastRenderedData = {};
                lastMatchedMethods = [];
                render({}, 0);
                return;
            }

            const results = {};
            const matchedFlat = [];

            config.forEach(group => {
                const candidates = raw.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    const typeOk =
                        (group.type === 'int' && (tL === 'int32' || tL === 'int')) ||
                        (group.type === 'bool' && (tL === 'bool' || tL === 'boolean')) ||
                        (group.type === 'float' && (tL === 'single' || tL === 'float')) ||
                        (group.type === 'void' && tL === 'void');

                    return nameOk && typeOk;
                });

                if (candidates.length > 0) {
                    if (group.single === false) {
                        results[group.id] = candidates;
                    } else {
                        const unique = [];
                        group.keys.forEach(k => {
                            let best =
                                candidates.find(c => c.nameL === 'get_' + k || c.nameL === 'is' + k) ||
                                candidates.find(c => c.nameL.includes(k));
                            if (best && !unique.some(u => u.nameL === best.nameL && u.rva === best.rva)) {
                                unique.push(best);
                            }
                        });
                        if (unique.length) results[group.id] = unique;
                    }
                }
            });

            Object.values(results).forEach(arr => arr.forEach(item => matchedFlat.push(item)));
            lastRenderedData = results;
            lastMatchedMethods = matchedFlat;

            render(results, raw.length);
        }

        function filterRendered(q) {
            if (!q) {
                render(lastRenderedData, lastRawMethods.length);
                return;
            }

            const filtered = {};
            for (const group of config) {
                const items = lastRenderedData[group.id];
                if (!items) continue;

                const matched = items.filter(item =>
                    item.name.toLowerCase().includes(q) ||
                    item.type.toLowerCase().includes(q) ||
                    item.rva.toLowerCase().includes(q) ||
                    (item.access || '').toLowerCase().includes(q) ||
                    (item.args || '').toLowerCase().includes(q)
                );

                if (matched.length) filtered[group.id] = matched;
            }

            render(filtered, lastRawMethods.length, q);
        }

        function render(data, totalRaw = 0, query = '') {
            resultsArea.innerHTML = '';

            let totalMatched = 0;
            for (const group of config) {
                const items = data[group.id];
                if (items) totalMatched += items.length;
            }

            statsBar.innerHTML = `
                <div class="flex flex-wrap gap-3 justify-center">
                    <div class="stats-chip">Tổng method quét được: <span class="text-emerald-400">${totalRaw}</span></div>
                    <div class="stats-chip">Tổng method khớp: <span class="text-emerald-400">${totalMatched}</span></div>
                    ${query ? `<div class="stats-chip">Search: <span class="text-emerald-400">${escapeHtml(query)}</span></div>` : ''}
                </div>
            `;

            if (!totalRaw) {
                resultsArea.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800 text-red-300 p-6 rounded-3xl text-center font-bold">
                        Không đọc được method nào từ file này.
                    </div>
                `;
                return;
            }

            if (!totalMatched) {
                resultsArea.innerHTML = `
                    <div class="bg-yellow-950/30 border border-yellow-800 text-yellow-300 p-6 rounded-3xl text-center font-bold">
                        Không tìm thấy method phù hợp với rule hiện tại.
                    </div>
                `;
                return;
            }

            for (const group of config) {
                const items = data[group.id];
                if (!items || !items.length) continue;

                const groupId = safeId(group.id);

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
                            <h2 class="text-2xl md:text-3xl font-black uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">
                                ${group.label}
                            </h2>
                            <div class="text-slate-500 text-sm font-bold">Số lượng: ${items.length}</div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid-${groupId}">
                            ${items.map(item => {
                                const options = hexLibrary[group.type] || [];
                                const description = getDetailedAnalysis(item.name, item.type);
                                const itemKey = safeId(item.rva + '_' + item.name);
                                const selectId = `sel_${itemKey}`;
                                const displayId = `display_${itemKey}`;

                                return `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${group.type}">${escapeHtml(item.type)}</span>

                                    <div class="mb-2 text-[13px] font-black text-white italic uppercase break-all leading-tight">
                                        ${escapeHtml(item.name)}()
                                    </div>

                                    <div class="flex gap-2 flex-wrap mb-3">
                                        <span class="pill">${escapeHtml(item.access || 'public')}</span>
                                        <span class="pill">${item.isStatic ? 'static' : 'instance'}</span>
                                        <span class="pill">${escapeHtml(item.args ? `args: ${item.args}` : 'no args')}</span>
                                    </div>

                                    <div class="analysis-box">
                                        🎯 <b>Phân tích:</b><br>${description}
                                    </div>

                                    ${options.length ? `
                                    <div class="mb-4">
                                        <div class="text-[9px] text-slate-600 font-bold mb-2 uppercase">Giá trị mẫu:</div>
                                        <select onchange="updateHexDisplay('${selectId}', '${displayId}')" id="${selectId}" class="hex-select">
                                            ${options.map(o => `<option value="${escapeHtml(o.hex)}">${escapeHtml(o.val)}</option>`).join('')}
                                        </select>
                                        <div class="hex-display" id="${displayId}">${escapeHtml(options[0].hex)}</div>
                                    </div>` : ''}

                                    <div class="mb-3 text-center">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 italic">RVA:</div>
                                        <span class="rva-val" onclick="copyText('${escapeHtml(item.rva.replace('0x',''))}', 'RVA')">${escapeHtml(item.rva)}</span>
                                    </div>

                                    ${options.length ? `
                                    <button onclick="copyText(document.getElementById('${selectId}').value, 'mã hex')" class="hex-btn">
                                        Copy Mã Hex
                                    </button>` : ''}
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            }
        }
    </script>
</body>
</html>
