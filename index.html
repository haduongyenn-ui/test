<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v16.0 - Core Item Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; background: #0f172a; border: 2px solid rgba(255,255,255,0.05); }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.25rem; transition: 0.3s; position: relative; }
        .item-label { color: #2dd4bf; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: block; border-left: 3px solid #2dd4bf; padding-left: 10px; text-transform: uppercase; }
        .rva-box { font-family: monospace; color: #f43f5e; font-size: 1.2rem; font-weight: 900; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #312e81; text-align: center; display: block; }
        .hex-guide { font-family: monospace; color: #818cf8; background: rgba(99, 102, 241, 0.1); padding: 8px; border-radius: 8px; font-size: 10px; font-weight: bold; border: 1px dashed #4338ca; text-align: center; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1500px] mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-white uppercase italic tracking-tighter">ITEM SNIPER <span class="text-teal-500">v16.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Chỉ Tìm RVA Vật Phẩm & Tài Nguyên Cốt Lõi</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-teal-500 transition-all cursor-pointer mb-12">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">Thả file <span class="text-teal-500 underline">dump.cs</span> để quét vật phẩm</p>
        </div>

        <div id="resultsArea" class="space-y-16"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // DANH MỤC VẬT PHẨM CHÍNH (CORE ITEMS ONLY)
        const coreItems = [
            { id: 'money', label: '💰 TIỀN TỆ & TÀI NGUYÊN', color: 'text-yellow-500', 
                match: ['gold', 'coin', 'diamond', 'gem', 'ruby', 'crystal', 'money', 'stone', 'wood', 'iron'],
                desc: (n) => `Hack số lượng ${n.replace('get_', '')} (Tiền/Tài nguyên)` 
            },
            { id: 'hpmp', label: '❤️ CHỈ SỐ SINH TỒN', color: 'text-rose-500', 
                match: ['maxhp', 'maxhealth', 'maxmp', 'maxmana', 'hp_recovery', 'life'],
                desc: (n) => `Hack ${n.replace('get_', '')} (Bất tử/Vô hạn)` 
            },
            { id: 'combat', label: '⚔️ VẬT PHẨM CHIẾN ĐẤU', color: 'text-sky-500', 
                match: ['damage', 'attack', 'speed', 'cooldown', 'critical', 'pierce', 'accuracy'],
                desc: (n) => `Hack sức mạnh ${n.replace('get_', '')} (One Hit/Hồi chiêu)` 
            },
            { id: 'special', label: '🎁 ĐẶC QUYỀN & MỞ KHÓA', color: 'text-purple-500', 
                match: ['vip', 'premium', 'purchased', 'unlocked', 'price', 'cost', 'hasads'],
                desc: (n) => `Mở khóa ${n.replace('get_', '').replace('is', '')} (Free Shop/VIP)` 
            }
        ];

        // BLACKLIST CỰC GẮT (LOẠI BỎ RÁC 100%)
        const blacklist = ['compare', 'tostring', 'equals', 'gethashcode', 'gettype', 'clone', 'dispose', 'item', 'index', 'capacity', 'count', 'name', 'id', 'active', 'enabled'];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], type = match[2], name = match[3], nameL = name.toLowerCase();
                
                // 1. Chỉ lấy các hàm 'get_' hoặc hàm quan trọng như TakeDamage
                if (!nameL.startsWith('get_') && !nameL.includes('takedamage') && !nameL.startsWith('is')) continue;
                
                // 2. Loại bỏ danh sách đen
                if (blacklist.some(b => nameL.includes(b))) continue;

                coreItems.forEach(group => {
                    if (group.match.some(k => nameL.includes(k))) {
                        const key = group.id + rva;
                        winners[key] = { 
                            rva, name, type, 
                            label: group.label, 
                            color: group.color, 
                            desc: group.desc(nameL),
                            hex: nameL.includes('price') || nameL.includes('cost') ? "00 00 80 D2 (Gợi ý: 0)" : (type === 'bool' || nameL.startsWith('is') ? "20 00 80 D2 (Gợi ý: True)" : "00 E1 00 D2 (Gợi ý: 999k)")
                        };
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.innerHTML = '';
            const groups = [...new Set(data.map(d => d.label))];
            
            groups.forEach(label => {
                const items = data.filter(d => d.label === label);
                const colorClass = items[0].color;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest ${colorClass}">${label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${items.map(item => `
                                <div class="card p-6 shadow-2xl flex flex-col justify-between">
                                    <div>
                                        <span class="item-label">${item.desc}</span>
                                        <h3 class="text-[12px] font-black text-white break-all mb-4">${item.name}</h3>
                                    </div>
                                    <div class="mb-4">
                                        <span class="rva-box">${item.rva}</span>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800 text-center">
                                        <p class="text-[9px] text-teal-400 font-black mb-2 uppercase">Mã Hex 100%:</p>
                                        <div class="hex-guide mb-4">${item.hex}</div>
                                        <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied!')" class="w-full bg-teal-600 hover:bg-white hover:text-black text-white font-black py-3 rounded-xl transition-all uppercase text-[10px]">Copy RVA</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
