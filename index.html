<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v44.0 - The Master Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2.5rem; padding: 2rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .analysis-box { background: rgba(16, 185, 129, 0.08); border-left: 5px solid #10b981; padding: 15px; margin: 15px 0; border-radius: 6px; font-size: 13px; color: #fff; line-height: 1.6; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 14px; border-radius: 12px; }
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1500px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter italic">MASTER <span class="text-emerald-500">FILTER</span> v44.0</h1>
            <p class="text-slate-500 font-bold text-xs mt-4 uppercase tracking-[0.5em]">Chỉ 1 RVA Chuẩn Nhất Cho 1 Công Dụng • Phân Tích Chuyên Sâu</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[4rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-16 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> ĐỂ LẤY TỬ HUYỆT DUY NHẤT</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // ĐỊNH NGHĨA NHÓM VÀ LOGIC CHỌN HÀM DUY NHẤT
        const sniperLogic = [
            { id: 'gold', label: '💰 NHÓM TIỀN TỆ', keys: ['gold', 'coin', 'money'], type: 'int', hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Hack Tiền: Ép giá trị tiền lên tối đa để mua sắm không giới hạn.' },
            { id: 'gem', label: '💎 NHÓM KIM CƯƠNG', keys: ['gem', 'diamond', 'ruby', 'crystal'], type: 'int', hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Hack Kim Cương: Ép đá quý tối đa để quay hòm và mua đồ Premium.' },
            { id: 'hp', label: '❤️ NHÓM MÁU (HP)', keys: ['hp', 'health', 'life'], type: 'int', hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Hack Bất Tử: Ép lượng máu tối đa khiến nhân vật không thể bị tiêu diệt.' },
            { id: 'dame', label: '⚔️ SỨC MẠNH (DAME)', keys: ['damage', 'attack'], type: 'float', hex: '00 00 C8 42 C0 03 5F D6', desc: 'One Hit: Nhân sát thương lên x100 lần. Đánh phát chết luôn.' },
            { id: 'def', label: '🛡️ GIÁP BẤT TỬ', keys: ['received'], type: 'float', hex: '00 00 00 2D C0 03 5F D6', desc: 'Bất Tử: Giảm sát thương nhận vào về 0. Quái đánh không mất máu.' },
            { id: 'speed', label: '🏃 TỐC ĐỘ (SPEED)', keys: ['speed', 'movespeed'], type: 'float', hex: '00 00 A0 40 C0 03 5F D6', desc: 'Speed Hack: Chạy nhanh gấp 5 lần. Giúp di chuyển cực linh hoạt.' },
            { id: 'vip', label: '👑 ĐẶC QUYỀN VIP', keys: ['vip', 'premium', 'ispurchased'], type: 'bool', hex: '20 00 80 D2 C0 03 5F D6', desc: 'Mở Khóa VIP: Kích hoạt toàn bộ tính năng và vật phẩm dành cho người nạp tiền.' },
            { id: 'antiban', label: '🛡️ ANTIBAN', keys: ['isbanned', 'detectcheat', 'checkintegrity'], type: 'bool', hex: '00 00 80 D2 C0 03 5F D6', desc: 'Chống Khóa Acc: Làm mù trình quét hack của game để chơi an toàn.' }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(\)\s*\{\s*\}/gi;
            let rawMatches = []; let match;
            while ((match = regex.exec(content)) !== null) {
                rawMatches.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let finalWinners = [];
            // THUẬT TOÁN CHỈ CHỌN 1 HÀM DUY NHẤT CHO MỖI NHÓM CÔNG DỤNG
            sniperLogic.forEach(group => {
                let candidate = null;
                // Ưu tiên tìm hàm khớp chính xác từ khóa trước (Ví dụ: get_gold hơn get_goldmultiplier)
                for (let key of group.keys) {
                    candidate = rawMatches.find(m => m.nameL === 'get_' + key || m.nameL === 'is' + key);
                    if (!candidate) candidate = rawMatches.find(m => m.nameL.includes(key));
                    
                    if (candidate) {
                        // Kiểm tra kiểu dữ liệu
                        const tL = candidate.type.toLowerCase();
                        let typeOk = false;
                        if (group.type === 'int') typeOk = tL === 'int32' || tL === 'int';
                        if (group.type === 'bool') typeOk = tL === 'bool' || tL === 'boolean';
                        if (group.type === 'float') typeOk = tL === 'single' || tL === 'float';
                        
                        if (typeOk) {
                            finalWinners.push({ ...candidate, ...group });
                            break; // Dừng lại ngay khi tìm thấy 1 hàm chuẩn nhất cho nhóm này
                        }
                    }
                }
            });
            render(finalWinners);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            if (data.length === 0) {
                resultsArea.innerHTML = '<p class="text-center text-rose-500 font-black">KHÔNG TÌM THẤY TỬ HUYỆT NÀO!</p>';
                return;
            }

            resultsArea.insertAdjacentHTML('beforeend', `
                <div class="group-box">
                    <h2 class="text-3xl font-black mb-10 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">DANH SÁCH TỬ HUYỆT DUY NHẤT</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${data.map(item => `
                            <div class="card p-6 shadow-2xl">
                                <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float')}">${item.type}</span>
                                <h3 class="text-emerald-400 font-black text-lg mb-1 italic uppercase">${item.label}</h3>
                                <div class="text-[11px] font-bold text-slate-500 mb-4 break-all italic leading-tight">${item.name}()</div>
                                <div class="analysis-box">🎯 <b>Công dụng chi tiết:</b><br>${item.desc}</div>
                                <div class="my-6">
                                    <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center italic">Địa chỉ Address Filza:</div>
                                    <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</span>
                                </div>
                                <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Copied Hex!')" class="hex-btn active:scale-95 text-[10px]">Copy Mã Hex Dứt Điểm: ${item.hex}</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        }
    </script>
</body>
</html>
