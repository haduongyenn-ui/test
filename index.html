<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v46.0 - Ultimate Patcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2.5rem; padding: 2.5rem; margin-bottom: 3rem; background: #0f172a; border: 2px solid #10b981; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: #10b981; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #10b981; text-align: center; display: block; }
        .analysis-box { background: rgba(16, 185, 129, 0.05); border-left: 4px solid #10b981; padding: 12px; margin: 15px 0; border-radius: 4px; font-size: 12px; color: #fff; }
        .hex-select { background: #1e293b; color: #10b981; border: 1px solid #10b981; border-radius: 8px; padding: 8px; width: 100%; font-weight: bold; font-size: 12px; margin-bottom: 10px; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 12px; border-radius: 10px; text-transform: uppercase; }
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-7xl font-black text-white italic uppercase tracking-tighter">ULTIMATE <span class="text-emerald-500">PATCHER</span> v46.0</h1>
            <p class="text-slate-500 font-bold text-xs mt-4 uppercase tracking-[0.5em]">Tích Hợp Kho Mã Hex • Lọc 1 RVA Chuẩn Nhất</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[4rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-16 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> ĐỂ NHẬN MÃ HEX TƯƠNG ỨNG</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // KHO MÃ PATCH BẠN CUNG CẤP
        const hexLibrary = {
            int: [
                { val: '1.000.000', hex: '00488852E001A072C0035FD6' },
                { val: '10.000', hex: '00E28452C0035FD6' },
                { val: '100', hex: '800C8052C0035FD6' },
                { val: '10', hex: '40018052C0035FD6' },
                { val: '1', hex: '20008052C0035FD6' },
                { val: '0', hex: '00008052C0035FD6' },
                { val: '-1', hex: '00008012C0035FD6' }
            ],
            float: [
                { val: '1.000.000', hex: '08808452882EA9720001271EC0035FD6' },
                { val: '10.000', hex: '0800885288C3A8720001271EC0035FD6' },
                { val: '100', hex: '0859A8520001271EC0035FD6' },
                { val: '10', hex: '0090241EC0035FD6' },
                { val: '1', hex: '00102E1EC0035FD6' },
                { val: '0.25', hex: '00102A1EC0035FD6' },
                { val: '0', hex: 'E003271EC0035FD6' }
            ],
            bool: [
                { val: 'TRUE (Bật)', hex: '20008052C0035FD6' },
                { val: 'FALSE (Tắt)', hex: '00008052C0035FD6' }
            ],
            void: [
                { val: 'RET (Ngắt hàm)', hex: 'C0035FD6' }
            ]
        };

        const sniperConfig = [
            { id: 'money', label: '💰 NHÓM TÀI NGUYÊN (INT)', keys: ['gold', 'coin', 'diamond', 'gem', 'money'], type: 'int' },
            { id: 'stats', label: '❤️ NHÓM SINH TỒN (INT)', keys: ['hp', 'health', 'mp', 'mana'], type: 'int' },
            { id: 'combat', label: '⚔️ SỨC MẠNH/TỐC ĐỘ (FLOAT)', keys: ['damage', 'attack', 'speed', 'multiplier'], type: 'float' },
            { id: 'vip', label: '🛒 ĐẶC QUYỀN (BOOL)', keys: ['vip', 'premium', 'unlocked', 'purchased'], type: 'bool' },
            { id: 'action', label: '🚫 HÀNH ĐỘNG (VOID)', keys: ['takedamage', 'spend', 'use'], type: 'void' },
            { id: 'safety', label: '🛡️ ANTIBAN (GỬI TẤT CẢ)', keys: ['banned', 'detect', 'check'], type: 'bool', single: false }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(\)\s*\{\s*\}/gi;
            let raw = []; let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            sniperConfig.forEach(group => {
                let candidates = raw.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    let typeOk = (group.type === 'int' && (tL === 'int32' || tL === 'int')) ||
                                 (group.type === 'bool' && (tL === 'bool' || tL === 'boolean')) ||
                                 (group.type === 'float' && (tL === 'single' || tL === 'float')) ||
                                 (group.type === 'void' && tL === 'void');
                    return nameOk && typeOk;
                });

                if (candidates.length > 0) {
                    if (group.single === false) results[group.id] = candidates;
                    else {
                        let unique = [];
                        group.keys.forEach(k => {
                            let best = candidates.find(c => c.nameL === 'get_' + k) || candidates.find(c => c.nameL.includes(k));
                            if (best && !unique.some(u => u.rva === best.rva)) unique.push(best);
                        });
                        results[group.id] = unique;
                    }
                }
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            sniperConfig.forEach(group => {
                const items = data[group.id];
                if (!items) return;
                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">${group.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${items.map(item => {
                                const options = hexLibrary[group.type] || hexLibrary.void;
                                return `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${group.type}">${item.type}</span>
                                    <div class="mb-4 text-[13px] font-black text-white italic uppercase break-all leading-tight">${item.name}()</div>
                                    <div class="analysis-box">🎯 <b>Dữ liệu:</b> ${group.type.toUpperCase()}<br>💡 <b>Chọn giá trị muốn Patch:</b></div>
                                    <select id="sel-${item.rva}" class="hex-select">
                                        ${options.map(o => `<option value="${o.hex}">${o.val}</option>`).join('')}
                                    </select>
                                    <div class="my-4 text-center">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2">Address Filza:</div>
                                        <span class="rva-val cursor-pointer" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')">${item.rva}</span>
                                    </div>
                                    <button onclick="const h = document.getElementById('sel-${item.rva}').value; navigator.clipboard.writeText(h); alert('Copied Hex: ' + h)" class="hex-btn active:scale-95">Copy Mã Hex Đã Chọn</button>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
