<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v32.0 - Int32 Sniper Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .target-card { background: #020617; border: 2px solid #10b981; border-radius: 2rem; padding: 2rem; transition: 0.3s; position: relative; }
        .target-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.5rem; font-weight: 900; background: #000; padding: 12px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .hex-patch { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .type-badge { position: absolute; top: 15px; right: 20px; background: #059669; color: white; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1400px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase italic tracking-tighter">INT32 <span class="text-emerald-500">SNIPER</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Chỉ Quét Public Int32 • Bỏ Qua Hàm Phụ</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-12 transition-all">
            <p class="text-2xl text-slate-400 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> VÀO ĐÂY</p>
        </div>

        <div id="resultsArea" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // CHỈ LẤY CÁC HÀM GET QUAN TRỌNG VÀ PHẢI LÀ INT32
        const coreRules = [
            { id: 'gold', label: 'VÀNG (GOLD)', keys: ['get_gold', 'get_coin', 'get_money'] },
            { id: 'gem', label: 'KIM CƯƠNG (GEM)', keys: ['get_gem', 'get_diamond', 'get_ruby'] },
            { id: 'hp', label: 'MÁU (HP)', keys: ['get_hp', 'get_maxhp', 'get_health', 'get_maxhealth'] },
            { id: 'mp', label: 'NĂNG LƯỢNG (MP)', keys: ['get_mp', 'get_maxmp', 'get_mana'] },
            { id: 'level', label: 'CẤP ĐỘ (LEVEL)', keys: ['get_level', 'get_lvl'] }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(Int32|int)\s+(\w+)\s*\(/gi;
            let found = []; let match;
            
            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], type = match[2], name = match[3], nameL = name.toLowerCase();
                
                coreRules.forEach(rule => {
                    if (rule.keys.some(k => nameL === k || nameL.includes(k))) {
                        found.push({ rva, name, type, label: rule.label });
                    }
                });
            }
            render(found);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            if(data.length === 0) {
                resultsArea.innerHTML = '<p class="col-span-full text-center text-rose-500 font-black">KHÔNG TÌM THẤY HÀM PUBLIC INT32 NÀO!</p>';
                return;
            }
            data.forEach(item => {
                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="target-card shadow-2xl">
                        <span class="type-badge">${item.type}</span>
                        <h2 class="text-xl font-black text-white italic mb-1 uppercase tracking-tighter border-l-4 border-emerald-500 pl-4">${item.label}</h2>
                        <p class="text-[10px] text-slate-500 font-mono mb-4 italic break-all">Function: ${item.name}</p>
                        
                        <div class="space-y-4">
                            <div>
                                <span class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">Địa chỉ Address (Filza):</span>
                                <span class="rva-val cursor-pointer" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')">${item.rva}</span>
                            </div>
                            
                            <div class="pt-4 border-t border-slate-800">
                                <button onclick="navigator.clipboard.writeText('00 E1 00 D2 C0 03 5F D6'); alert('Đã Copy Mã Hex!')" class="hex-patch w-full py-4 rounded-xl text-xs uppercase tracking-[0.2em] active:scale-95">
                                    COPY MÃ PATCH MAX
                                </button>
                                <p class="text-center text-[9px] text-slate-600 mt-2 font-mono">Patch: 00 E1 00 D2 C0 03 5F D6 (Max)</p>
                            </div>
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
