<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v42.0 - The Final Judge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2.5rem; padding: 2.5rem; margin-bottom: 3.5rem; background: #0f172a; border: 2px solid #10b981; position: relative; }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.5rem; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: #10b981; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2); }
        .type-tag { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 6px; color: white; text-transform: uppercase; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.3rem; font-weight: 900; background: #000; padding: 12px; border-radius: 12px; border: 1px solid #10b981; text-align: center; display: block; }
        .analysis-box { background: rgba(16, 185, 129, 0.05); border-left: 4px solid #10b981; padding: 12px; margin: 15px 0; border-radius: 4px; font-size: 12px; line-height: 1.6; color: #34d399; }
        .hex-btn { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; width: 100%; padding: 14px; border-radius: 12px; text-transform: uppercase; }
        .int { background: #059669; } .bool { background: #d97706; } .void { background: #7c3aed; } .float { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-[1600px] mx-auto text-center">
        <header class="mb-12">
            <h1 class="text-7xl font-black text-white italic uppercase tracking-tighter italic">FINAL JUDGE <span class="text-emerald-500">v42.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-4 uppercase tracking-[0.6em]">Lọc 1 RVA Chuẩn Nhất • Phân Nhóm • Phân Tích Chi Tiết</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[4rem] p-20 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-16 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">THẢ <span class="text-emerald-500 underline uppercase">DUMP.CS</span> VÀO ĐỂ GIÁM ĐỊNH</p>
        </div>

        <div id="resultsArea" class="space-y-16 text-left"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        // BỘ NÃO PHÂN TÍCH VÀ GỢI Ý HEX
        const judgeBrain = {
            'gold': { desc: 'Hack Vàng: Ép chỉ số vàng tối đa. Patch xong mua đồ thoải mái.', hex: '00 E1 00 D2 C0 03 5F D6' },
            'gem': { desc: 'Hack Kim Cương: Ép đá quý tối đa. Dùng để quay tướng hoặc mở rương.', hex: '00 E1 00 D2 C0 03 5F D6' },
            'hp': { desc: 'Bất Tử Máu: Tăng máu tối đa lên cực đại. Bạn sẽ không bao giờ cạn máu.', hex: '00 E1 00 D2 C0 03 5F D6' },
            'mp': { desc: 'Mana Vô Hạn: Sử dụng kỹ năng liên tục không tốn năng lượng.', hex: '00 E1 00 D2 C0 03 5F D6' },
            'vip': { desc: 'Kích Hoạt VIP: Mở khóa các đặc quyền hội viên và skin giới hạn.', hex: '20 00 80 D2 C0 03 5F D6' },
            'damage': { desc: 'One Hit (x100): Nhân sát thương đầu ra gấp 100 lần. Đánh phát chết luôn.', hex: '00 00 C8 42 C0 03 5F D6' },
            'speed': { desc: 'Speed Hack: Chạy nhanh như chớp. Khuyên dùng mức x5 để tránh văng game.', hex: '00 00 A0 40 C0 03 5F D6' },
            'received': { desc: 'Giáp Bất Tử: Nhân sát thương nhận vào với 0. Kẻ địch đánh không mất máu.', hex: '00 00 00 2D C0 03 5F D6' },
            'takedamage': { desc: 'Chặn Sát Thương: Thoát hàm trừ máu ngay lập tức khi bị đánh.', hex: 'C0 03 5F D6' },
            'antiban': { desc: 'Antiban: Trả về kết quả Sạch để server không quét thấy bản Mod.', hex: '00 00 80 D2 C0 03 5F D6' }
        };

        const config = [
            { id: 'money', label: '💰 NHÓM TIỀN TỆ (Chuẩn Nhất)', keys: ['get_gold', 'get_coin', 'get_diamond', 'get_gem', 'get_money'], type: 'int' },
            { id: 'stats', label: '❤️ NHÓM SINH TỒN (Chuẩn Nhất)', keys: ['get_maxhp', 'get_maxhealth', 'get_maxmp', 'get_maxmana'], type: 'int' },
            { id: 'combat', label: '⚔️ NHÓM SỨC MẠNH (Chuẩn Nhất)', keys: ['get_damagemultiplier', 'get_damagereceivedmultiplier', 'get_speed', 'get_movespeed'], type: 'float' },
            { id: 'vip', label: '🛒 NHÓM ĐẶC QUYỀN (Chuẩn Nhất)', keys: ['isvip', 'ispremium', 'isunlocked', 'ispurchased'], type: 'bool' },
            { id: 'safety', label: '🛡️ NHÓM ANTIBAN (Gửi Tất Cả)', keys: ['isbanned', 'detectcheat', 'checkintegrity'], type: 'bool', single: false }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(\)\s*\{\s*\}/gi;
            let rawMatches = []; let match;
            while ((match = regex.exec(content)) !== null) {
                rawMatches.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            config.forEach(group => {
                let candidates = rawMatches.filter(m => {
                    const tL = m.type.toLowerCase();
                    const nameOk = group.keys.some(k => m.nameL.includes(k));
                    let typeOk = false;
                    if (group.type === 'int') typeOk = tL === 'int32' || tL === 'int';
                    if (group.type === 'bool') typeOk = tL === 'bool' || tL === 'boolean';
                    if (group.type === 'float') typeOk = tL === 'single' || tL === 'float';
                    return nameOk && typeOk;
                });

                if (candidates.length > 0) {
                    if (group.single === false) {
                        results[group.id] = candidates; // Giữ lại tất cả cho Antiban
                    } else {
                        // Lọc lấy 1 hàm chuẩn nhất cho mỗi từ khóa (Tránh trùng lặp)
                        let uniqueOnes = [];
                        group.keys.forEach(key => {
                            let best = candidates.find(c => c.nameL === key); // Ưu tiên hàm khớp 100%
                            if (!best) best = candidates.find(c => c.nameL.includes(key));
                            if (best && !uniqueOnes.some(u => u.rva === best.rva)) uniqueOnes.push(best);
                        });
                        results[group.id] = uniqueOnes;
                    }
                }
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            config.forEach(group => {
                const items = data[group.id];
                if (!items) return;
                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-10 uppercase italic tracking-widest text-emerald-500 border-l-8 border-emerald-500 pl-4">${group.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${items.map(item => {
                                let info = { desc: 'Hàm quan trọng điều chỉ chỉ số game.', hex: 'C0 03 5F D6' };
                                for (let k in judgeBrain) { if (item.nameL.includes(k)) info = judgeBrain[k]; }
                                return `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'float'))}">${item.type}</span>
                                    <div class="mb-2 text-[13px] font-black text-white italic uppercase break-all">${item.name}()</div>
                                    <div class="analysis-box">🎯 <b>Công dụng:</b> ${info.desc}<br>⚙️ <b>Mã Hex khuyên dùng:</b> ${info.hex}</div>
                                    <div class="my-6">
                                        <div class="text-[9px] text-slate-600 font-bold uppercase mb-2 text-center">Địa chỉ Address Filza:</div>
                                        <span class="rva-val cursor-pointer active:scale-95 transition-all" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')">${item.rva}</span>
                                    </div>
                                    <button onclick="navigator.clipboard.writeText('${info.hex}'); alert('Đã Copy Hex!')" class="hex-btn active:scale-95 text-[10px]">Copy Mã Hex Dứt Điểm</button>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
