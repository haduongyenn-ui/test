<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Analyzer v25.0 - The Final Sniper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .group-box { border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); }
        .card { background: #020617; border: 1px solid #1e293b; border-radius: 1.25rem; position: relative; transition: 0.3s; }
        .type-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 5px; color: white; }
        .rva-val { font-family: 'Courier New', monospace; color: #f43f5e; font-size: 1.2rem; font-weight: 900; background: #000; padding: 8px; border-radius: 10px; border: 1px solid #312e81; text-align: center; display: block; }
        .hex-copy { background: #10b981; color: #000; font-weight: 900; transition: 0.2s; }
        .hex-copy:active { transform: scale(0.95); }
        .int32 { background: #059669; } .void { background: #7c3aed; } .bool { background: #d97706; } .single { background: #0891b2; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-[1500px] mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black text-white italic uppercase tracking-tighter">SNIPER <span class="text-emerald-500">v25.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-3 uppercase tracking-[0.5em]">Tối Ưu 1 RVA • Antiban Liệt Kê Tất Cả</p>
        </header>

        <div id="dropZone" class="border-4 border-dashed border-slate-800 rounded-[3rem] p-16 text-center bg-slate-900/20 hover:border-emerald-500 cursor-pointer mb-12 transition-all">
            <p class="text-2xl text-slate-500 font-black uppercase italic tracking-widest">Thả <span class="text-emerald-500 underline uppercase">dump.cs</span> vào đây</p>
        </div>

        <div id="resultsArea" class="space-y-12"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('resultsArea');

        const rules = [
            { id: 'currency', label: '💰 TIỀN TỆ (Gold/Gem)', keys: ['get_gold', 'get_coin', 'get_diamond', 'get_gem', 'get_money'], hex: "00 E1 00 D2 C0 03 5F D6", single: true },
            { id: 'stats', label: '❤️ HP & MP', keys: ['get_maxhp', 'get_maxhealth', 'get_maxmp', 'get_maxmana'], hex: "00 E1 00 D2 C0 03 5F D6", single: true },
            { id: 'vip', label: '🛒 VIP & PREMIUM', keys: ['isvip', 'ispremium', 'ispurchased', 'isunlocked'], hex: "20 00 80 D2 C0 03 5F D6", single: true },
            { id: 'combat', label: '⏳ HỒI CHIÊU & DAME', keys: ['get_cooldown', 'get_skilldelay', 'get_damage'], hex: "00 00 20 D2 00 00 28 1E C0 03 5F D6", single: true },
            { id: 'ads', label: '🚫 XÓA QUẢNG CÁO', keys: ['hasads', 'showads', 'isadavailable'], hex: "00 00 80 D2 C0 03 5F D6", single: true },
            { id: 'antiban', label: '🛡️ ANTIBAN (Gửi tất cả)', keys: ['isbanned', 'detectcheat', 'checkintegrity', 'cheatdetect', 'integritycheck', 'isjailbroken', 'isroot'], hex: "00 00 80 D2 C0 03 5F D6", single: false }
        ];

        dropZone.onclick = () => { let i=document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?([\w<>[\]]+)\s+(\w+)\s*\(/gi;
            let raw = [];
            let match;
            while ((match = regex.exec(content)) !== null) {
                raw.push({ rva: match[1], type: match[2], name: match[3], nameL: match[3].toLowerCase() });
            }

            let results = {};
            rules.forEach(rule => {
                if (rule.single) {
                    for (let k of rule.keys) {
                        let f = raw.find(m => m.nameL === k || m.nameL.includes(k));
                        if (f) { results[rule.id] = [{...f, label: rule.label, hex: rule.hex}]; break; }
                    }
                } else {
                    let all = raw.filter(m => rule.keys.some(k => m.nameL.includes(k)));
                    if (all.length > 0) results[rule.id] = all.map(m => ({...m, label: rule.label, hex: rule.hex}));
                }
            });
            render(results);
        }

        function render(data) {
            resultsArea.innerHTML = '';
            rules.forEach(rule => {
                const items = data[rule.id];
                if (!items) return;

                resultsArea.insertAdjacentHTML('beforeend', `
                    <div class="group-box">
                        <h2 class="text-3xl font-black mb-8 uppercase italic tracking-widest text-emerald-500">${rule.label}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${items.map(item => `
                                <div class="card p-6 shadow-2xl">
                                    <span class="type-tag ${item.type.toLowerCase().includes('int') ? 'int32' : (item.type.toLowerCase().includes('void') ? 'void' : (item.type.toLowerCase().includes('bool') ? 'bool' : 'single'))}">${item.type}</span>
                                    <div class="mb-4">
                                        <div class="text-[10px] text-slate-500 font-bold uppercase mb-1 leading-tight break-all">Hàm: ${item.name}</div>
                                    </div>
                                    <div class="mb-6">
                                        <div class="text-[9px] text-slate-600 font-black uppercase mb-2 text-center">Offset Địa Chỉ:</div>
                                        <span class="rva-val cursor-pointer" onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copy RVA!')">${item.rva}</span>
                                    </div>
                                    <div class="pt-4 border-t border-slate-800">
                                        <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Copy Hex!')" 
                                            class="hex-copy w-full py-4 rounded-xl text-[10px] uppercase tracking-widest shadow-lg">
                                            Copy Mã Hex Dán
                                        </button>
                                        <div class="text-center text-[9px] text-slate-500 font-mono mt-3 italic">${item.hex}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
    </script>
</body>
</html>
