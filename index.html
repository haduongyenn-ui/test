<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Modder - Multi-Hex Selector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .card-bypass { border-left: 5px solid #a855f7; background: linear-gradient(to right, #2e1065, #0f172a); }
        .card-antiban { border-left: 5px solid #f87171; background: linear-gradient(to right, #450a0a, #0f172a); }
        .card-hack { border-left: 5px solid #10b981; }
        .hex-select { background: #000; color: #fbbf24; border: 1px solid #334155; font-family: monospace; font-size: 11px; }
        .rva-box { font-family: 'Courier New', monospace; background: #1e293b; color: #f43f5e; border: 1px solid #451a03; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase italic italic tracking-tighter">Hex Selector Engine <span class="text-emerald-500">v7.0</span></h1>
            <p class="text-slate-500 font-bold text-xs mt-2 uppercase tracking-[0.3em]">Tùy chọn giá trị Hack • Anti-Ban • Bypass Integrity</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-emerald-500 transition-all cursor-pointer mb-12 shadow-2xl group">
            <p class="text-xl text-slate-400 group-hover:text-emerald-400 transition-colors font-bold uppercase">Thả file <span class="underline">dump.cs</span> vào đây</p>
        </div>

        <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-5 duration-700"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('results');

        // DANH SÁCH MÃ HEX THEO CẤP ĐỘ
        const hexLibrary = {
            bool: [
                { name: "FALSE (Tắt/Vô hiệu)", hex: "00 00 80 D2 C0 03 5F D6" },
                { name: "TRUE (Bật/Kích hoạt)", hex: "20 00 80 D2 C0 03 5F D6" }
            ],
            int: [
                { name: "Giá trị: 0", hex: "00 00 80 D2 C0 03 5F D6" },
                { name: "Giá trị: 1.000", hex: "00 7D 80 D2 C0 03 5F D6" },
                { name: "Giá trị: 50.000", hex: "00 6D 81 D2 C0 03 5F D6" },
                { name: "Giá trị: 999.999", hex: "00 E1 00 D2 C0 03 5F D6" },
                { name: "Giá trị: MAX (2 Tỷ+)", hex: "FF FF 8F D2 FF FF AF F2 C0 03 5F D6" }
            ],
            float: [
                { name: "0.0f (Mặc định/Tắt)", hex: "00 00 20 D2 00 00 28 1E C0 03 5F D6" },
                { name: "1.5f (Nhẹ)", hex: "00 00 C0 3F C0 03 5F D6" },
                { name: "2.0f (Vừa)", hex: "00 00 A0 40 C0 03 5F D6" },
                { name: "10.0f (Mạnh)", hex: "00 00 20 41 C0 03 5F D6" },
                { name: "100.0f (Cực đại)", hex: "00 00 C8 42 C0 03 5F D6" }
            ]
        };

        const categories = [
            { id: 'bypass', label: '🛡️ INTEGRITY BYPASS', keys: ['checkintegrity', 'verifyfile', 'hashcheck', 'ismodified'], type: 'bool' },
            { id: 'antiban', label: '🔥 ANTI-BAN / DETECT', keys: ['anticheat', 'isbanned', 'jailbreak', 'detecthack'], type: 'bool' },
            { id: 'res_gold', label: '💰 VÀNG / KIM CƯƠNG', keys: ['gold', 'money', 'coin', 'gem', 'diamond', 'ruby', 'crystal'], type: 'int' },
            { id: 'combat', label: '⚔️ HP / SPEED / DAMAGE', keys: ['hp', 'health', 'speed', 'movespeed', 'atk', 'damage'], type: 'float' }
        ];

        const junk = ['pattern', 'decimal', 'separator', 'symbol', 'culture', 'format', 'digits', 'group', 'negative', 'positive'];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+(get_\w+|check\w+|is\w+|verify\w+)\(\)/gi;
            let match, winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1], name = match[2], nameLower = name.toLowerCase();
                if (junk.some(j => nameLower.includes(j)) || name.length > 30) continue;

                categories.forEach(cat => {
                    if (cat.keys.some(k => nameLower.includes(k))) {
                        if (!winners[cat.id] || name.length < winners[cat.id].name.length) {
                            winners[cat.id] = { rva, name, ...cat };
                        }
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.classList.remove('hidden');
            resultsArea.innerHTML = data.map(item => {
                const options = hexLibrary[item.type];
                return `
                <div class="card ${item.id === 'bypass' ? 'card-bypass' : (item.id === 'antiban' ? 'card-antiban' : 'card-hack')} rounded-2xl p-5 shadow-2xl flex flex-col">
                    <span class="text-[9px] font-black text-white bg-black/40 px-2 py-1 rounded uppercase tracking-widest border border-white/5 w-fit">${item.label}</span>
                    <h3 class="text-lg font-bold text-white mt-3 break-all italic leading-tight mb-4">${item.name}</h3>
                    
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-1 px-1">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Address RVA</span>
                            <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Copied RVA!')" class="text-[9px] text-indigo-400 font-bold hover:underline">COPY RVA</button>
                        </div>
                        <div class="rva-box p-2 rounded-lg text-xs font-bold text-center tracking-widest">${item.rva}</div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-white/5">
                        <p class="text-[9px] text-gray-500 font-bold mb-2 uppercase tracking-widest px-1 italic">Chọn cấp độ Hack</p>
                        <select class="hex-select w-full p-2 rounded-lg mb-3 outline-none" id="select-${item.rva}" onchange="updateHexDisplay('${item.rva}')">
                            ${options.map(opt => `<option value="${opt.hex}">${opt.name}</option>`).join('')}
                        </select>
                        <div class="hex-box p-2 rounded-lg text-[10px] font-bold text-center tracking-widest mb-3" id="display-${item.rva}">${options[0].hex}</div>
                        <button onclick="copyHex('${item.rva}')" class="w-full bg-emerald-600 hover:bg-white hover:text-black text-white font-bold py-2 rounded-xl transition-all shadow-lg text-[10px] uppercase tracking-widest">SAO CHÉP HEX</button>
                    </div>
                </div>
            `}).join('');
        }

        window.updateHexDisplay = (rva) => {
            const select = document.getElementById(`select-${rva}`);
            const display = document.getElementById(`display-${rva}`);
            display.innerText = select.value;
        };

        window.copyHex = (rva) => {
            const select = document.getElementById(`select-${rva}`);
            navigator.clipboard.writeText(select.value);
            alert('Đã sao chép mã Hex cấp độ bạn chọn!');
        };
    </script>
</body>
</html>
