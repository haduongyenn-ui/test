<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Modder Engine - Multi-Resource Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: #0f172a; border: 1px solid #1e293b; transition: 0.3s; }
        .card-antiban { border-left: 5px solid #f87171; background: linear-gradient(to right, #450a0a, #0f172a); }
        .card-shop { border-left: 5px solid #fbbf24; background: linear-gradient(to right, #422006, #0f172a); }
        .card-hack { border-left: 5px solid #10b981; }
        .hex-box { font-family: 'Courier New', monospace; background: #000; color: #fbbf24; border: 1px solid #334155; }
        .rva-box { font-family: 'Courier New', monospace; background: #1e293b; color: #f43f5e; border: 1px solid #451a03; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-white uppercase italic tracking-tighter">Ultimate Modder <span class="text-rose-500">v5.0</span></h1>
            <p class="text-emerald-500 font-bold text-xs mt-2 uppercase tracking-[0.3em]">Tách riêng từng loại tiền • Anti-Ban • Copy RVA Pro</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-12 text-center bg-slate-900/30 hover:bg-slate-900 hover:border-emerald-500 transition-all cursor-pointer mb-12 shadow-2xl group">
            <p class="text-xl text-slate-400 group-hover:text-emerald-400 transition-colors font-bold">Thả file <span class="underline">dump.cs</span> vào đây</p>
            <p class="text-[10px] text-slate-600 mt-4 uppercase font-bold tracking-widest italic">Tự động nhận diện đa tài nguyên (Vàng, Ruby, Kim cương...) và Anti-Ban</p>
        </div>

        <div id="results" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in slide-in-from-bottom-5 duration-700"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('results');

        // DANH SÁCH TỪ KHÓA TÀI NGUYÊN - SẼ TÁC RIÊNG THÀNH TỪNG THẺ
        const resourceKeys = ['gold', 'money', 'coin', 'gem', 'diamond', 'ruby', 'crystal', 'emerald', 'sapphire', 'cash', 'stone', 'soul', 'token', 'point', 'currency'];
        
        // CÁC NHÓM CHỨC NĂNG KHÁC
        const otherCategories = [
            { id: 'antiban', label: '🛡️ ANTI-BAN (BẢO MẬT)', keys: ['anticheat', 'integrity', 'detecthack', 'isbanned', 'jailbreak', 'checkintegrity'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Vô hiệu hóa quét gian lận.' },
            { id: 'shop', label: '🛒 FREE SHOP (MUA SẮM)', keys: ['get_price', 'get_cost', 'isafford', 'enoughmoney'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Mua đồ giá 0đ.' },
            { id: 'noads', label: '🚫 NO ADS (XÓA QUẢNG CÁO)', keys: ['showads', 'hasads', 'isads', 'advertisement'], hex: '00 00 80 D2 C0 03 5F D6', desc: 'Tắt toàn bộ quảng cáo.' },
            { id: 'health', label: '❤️ BẤT TỬ (GOD MODE)', keys: ['hp', 'health', 'maxhealth'], hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Khóa máu không bao giờ chết.' },
            { id: 'vip', label: '🌟 VIP/PREMIUM UNLOCKED', keys: ['isvip', 'ispremium', 'isunlocked'], hex: '20 00 80 D2 C0 03 5F D6', desc: 'Mở khóa đặc quyền trả phí.' }
        ];

        const junk = ['pattern', 'decimal', 'separator', 'symbol', 'culture', 'format', 'digits', 'group', 'negative', 'positive', 'string', 'array'];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => processDump(e.target.result);
            reader.readAsText(file);
        }

        function processDump(content) {
            const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+(get_\w+|check\w+|is\w+|show\w+)\(\)/gi;
            let match;
            let winners = {};

            while ((match = regex.exec(content)) !== null) {
                const rva = match[1];
                const name = match[2];
                const nameLower = name.toLowerCase();

                if (junk.some(j => nameLower.includes(j)) || name.length > 30) continue;

                // 1. XỬ LÝ TÀI NGUYÊN (TÁCH RIÊNG TỪNG TỪ KHÓA)
                resourceKeys.forEach(key => {
                    if (nameLower.includes(key)) {
                        const id = 'res_' + key;
                        if (!winners[id] || name.length < winners[id].name.length) {
                            winners[id] = { rva, name, label: '💰 ' + key.toUpperCase(), hex: '00 E1 00 D2 C0 03 5F D6', desc: 'Hack đơn vị tài nguyên: ' + key };
                        }
                    }
                });

                // 2. XỬ LÝ CÁC NHÓM KHÁC
                otherCategories.forEach(cat => {
                    if (cat.keys.some(k => nameLower.includes(k))) {
                        if (!winners[cat.id] || name.length < winners[cat.id].name.length) {
                            winners[cat.id] = { rva, name, ...cat };
                        }
                    }
                });
            }
            render(Object.values(winners));
        }

        function render(data) {
            resultsArea.classList.remove('hidden');
            resultsArea.innerHTML = data.map(item => `
                <div class="card ${item.id === 'antiban' ? 'card-antiban' : (item.id === 'shop' ? 'card-shop' : 'card-hack')} rounded-2xl p-6 shadow-2xl flex flex-col justify-between">
                    <div>
                        <span class="text-[10px] font-black text-white bg-black/40 px-3 py-1 rounded-full uppercase tracking-tighter border border-white/5">${item.label}</span>
                        <h3 class="text-xl font-bold text-white mt-4 break-all italic leading-tight">${item.name}</h3>
                        <p class="text-slate-500 text-[11px] mt-1 font-bold italic">→ ${item.desc}</p>
                        
                        <div class="mt-4">
                            <p class="text-[9px] text-gray-600 font-bold mb-1 uppercase tracking-widest">Địa chỉ RVA</p>
                            <div class="flex gap-2">
                                <div class="rva-box flex-1 p-2 rounded-lg text-xs font-bold text-center">${item.rva}</div>
                                <button onclick="navigator.clipboard.writeText('${item.rva}'); alert('Đã Copy RVA!')" class="bg-slate-800 hover:bg-rose-600 px-3 rounded-lg text-[10px] font-bold transition-all">COPY</button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-6 border-t border-white/5 pt-4">
                        <p class="text-[9px] text-gray-600 font-bold mb-1 uppercase tracking-widest">Mã Hex Patch (ARM64)</p>
                        <div class="hex-box p-3 rounded-lg text-xs font-bold mb-3 text-center tracking-widest shadow-inner">${item.hex}</div>
                        <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Đã Copy Hex!')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg text-[10px] uppercase tracking-widest active:scale-95">SAO CHÉP HEX</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
