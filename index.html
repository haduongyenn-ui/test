<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hex Patch Finder - Unity iOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hex-code { font-family: 'Courier New', monospace; color: #facc15; font-weight: bold; }
        .rva-addr { color: #fb7185; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 p-6">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black text-rose-500">HEX PATCH ANALYZER</h1>
            <p class="text-gray-400 italic">Tìm RVA và gợi ý mã máy (ARM64) để Hex Edit</p>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-gray-700 rounded-2xl p-12 text-center bg-gray-900 hover:bg-gray-800 cursor-pointer mb-8 transition-all">
            <p class="text-xl">Kéo file <span class="text-rose-400 font-bold">dump.cs</span> vào đây</p>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="overflow-x-auto rounded-xl border border-gray-800">
                <table class="w-full text-left">
                    <thead class="bg-gray-800">
                        <tr>
                            <th class="p-4">Tên Hàm (Method)</th>
                            <th class="p-4">Địa chỉ RVA</th>
                            <th class="p-4">Mã Hex để Patch (ARM64)</th>
                            <th class="p-4">Tác dụng</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-800 bg-gray-900/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const keywords = ['gold', 'money', 'hp', 'health', 'damage', 'atk', 'isvip', 'ispremium', 'energy', 'mana'];
        
        // Xử lý file
        document.getElementById('dropZone').onclick = () => {
            let i = document.createElement('input'); i.type = 'file';
            i.onchange = e => handleFile(e.target.files[0]); i.click();
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                // Regex tìm RVA và hàm ngay bên dưới
                const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*(?:public|private|static|virtual)*\s+(\w+)\s+(\w+)\s*\(/gi;
                let match, results = [];

                while ((match = regex.exec(content)) !== null) {
                    const rva = match[1];
                    const returnType = match[2];
                    const methodName = match[3];

                    if (keywords.some(k => methodName.toLowerCase().includes(k))) {
                        results.push({ rva, returnType, methodName });
                    }
                }
                render(results);
            };
            reader.readAsText(file);
        }

        function render(data) {
            document.getElementById('results').classList.remove('hidden');
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => {
                let patch = "00 00 80 D2 C0 03 5F D6"; // Mặc định: return 0
                let desc = "Trả về 0 (False)";

                if (item.returnType.toLowerCase().includes('int') || item.returnType.toLowerCase().includes('float')) {
                    patch = "00 E1 00 D2 C0 03 5F D6"; // Gợi ý return lớn (ví dụ 999)
                    desc = "Trả về số lớn (Max)";
                } else if (item.returnType.toLowerCase().includes('bool')) {
                    patch = "20 00 80 D2 C0 03 5F D6"; // return 1 (True)
                    desc = "Trả về TRUE (Bật)";
                }

                return `<tr>
                    <td class="p-4 font-bold text-blue-300">${item.methodName}</td>
                    <td class="p-4 rva-addr">${item.rva}</td>
                    <td class="p-4 hex-code">${patch}</td>
                    <td class="p-4 text-sm text-gray-400">${desc}</td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
