<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>100% Success Hex Logic Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hex-bg { background: #0f172a; border: 1px solid #1e293b; transition: all 0.3s; }
        .hex-bg:hover { border-color: #10b981; transform: translateY(-2px); }
        .rva-text { font-family: 'Courier New', monospace; color: #fb7185; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-white tracking-tighter uppercase">Verified Hex Logic Finder</h1>
            <p class="text-slate-500 mt-2">Phân tích hàm Getter và giải mã công dụng khi Patch Hex</p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-slate-800 rounded-3xl p-16 text-center bg-slate-900/40 hover:bg-slate-900 transition-all cursor-pointer mb-10 shadow-2xl">
            <p class="text-xl text-slate-400">Thả file <span class="text-emerald-500 font-bold underline">dump.cs</span> vào đây</p>
            <p class="text-xs text-slate-600 mt-4 uppercase tracking-[0.2em]">Hệ thống sẽ chỉ trích xuất các hàm Get_ chắc chắn hoạt động</p>
        </div>

        <div id="results" class="hidden grid grid-cols-1 gap-6">
            </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const resultsArea = document.getElementById('results');

        const rules = [
            { keys: ['gold', 'money', 'coin', 'currency', 'gem', 'diamond'], type: 'Tài nguyên', desc: 'Kiểm soát túi tiền. Khi Patch, giá trị hiển thị và giá trị sử dụng sẽ tăng vọt.', hex: '00 E1 00 D2 C0 03 5F D6', goal: 'Vô hạn tiền' },
            { keys: ['hp', 'health', 'maxhealth'], type: 'Sinh tồn', desc: 'Kiểm soát máu nhân vật. Patch sẽ giúp máu không bao giờ giảm hoặc luôn đầy.', hex: '00 E1 00 D2 C0 03 5F D6', goal: 'Bất tử (God Mode)' },
            { keys: ['damage', 'atk', 'attack'], type: 'Sức mạnh', desc: 'Sát thương đầu ra. Patch sẽ giúp nhân vật tiêu diệt kẻ địch chỉ với 1 đòn.', hex: '00 E1 00 D2 C0 03 5F D6', goal: 'One-Hit Kill' },
            { keys: ['isvip', 'ispremium', 'isunlocked', 'haspaid', 'isbought'], type: 'Đặc quyền', desc: 'Kiểm tra trạng thái tài khoản. Patch sẽ đánh lừa game rằng bạn đã mua tất cả.', hex: '20 00 80 D2 C0 03 5F D6', goal: 'Mở khóa VIP' },
            { keys: ['speed', 'velocity', 'movespeed'], type: 'Di chuyển', desc: 'Tốc độ chạy hoặc hành động. Patch giúp nhân vật di chuyển như Flash.', hex: '00 E1 00 D2 C0 03 5F D6', goal: 'Siêu tốc độ' }
        ];

        dropZone.onclick = () => { let i = document.createElement('input'); i.type='file'; i.onchange=e=>handleFile(e.target.files[0]); i.click(); };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                const regex = /\/\/ RVA:\s+(0x[0-9A-F]+)\s*\n\s*public\s+(?:static\s+)?(?:\w+)\s+(get_\w+)\(\)/gi;
                let match, found = [];
                while ((match = regex.exec(content)) !== null) {
                    const rva = match[1];
                    const name = match[2];
                    rules.forEach(rule => {
                        if(rule.keys.some(k => name.toLowerCase().includes(k))) {
                            found.push({ rva, name, ...rule });
                        }
                    });
                }
                render(found);
            };
            reader.readAsText(file);
        }

        function render(data) {
            resultsArea.classList.remove('hidden');
            resultsArea.innerHTML = data.map(item => `
                <div class="hex-bg rounded-2xl p-6 flex flex-col md:flex-row gap-6 items-start md:items-center shadow-lg">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-emerald-500/10 text-emerald-500 text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter border border-emerald-500/20">${item.type}</span>
                            <h3 class="text-xl font-bold text-white">${item.name}</h3>
                        </div>
                        <p class="text-slate-400 text-sm leading-relaxed">${item.desc}</p>
                        <div class="mt-4 flex items-center gap-4">
                            <span class="rva-text text-sm">RVA: ${item.rva}</span>
                            <span class="text-emerald-400 text-xs font-bold uppercase">→ Kết quả: ${item.goal}</span>
                        </div>
                    </div>
                    <div class="w-full md:w-auto bg-black/40 p-4 rounded-xl border border-slate-800 text-center">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-widest">Mã Hex Patch (ARM64)</p>
                        <code class="text-amber-400 font-bold text-sm block mb-3">${item.hex}</code>
                        <button onclick="navigator.clipboard.writeText('${item.hex}'); alert('Đã Copy Hex!')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-bold py-2 px-6 rounded-lg transition-all shadow-lg">SAO CHÉP MÃ</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
